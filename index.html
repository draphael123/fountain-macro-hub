cel the charge will be run automatically going forward. Please let us know if you have any questions.", "a": "", "cat": "General"}, {"n": "Legacy Pricing", "c": "Hello, \nI understand you'd like to resume your subscription on the previous plan you were on. I completely understand that, but it's not a plan we are continuing to offer to patients in our care. You would need to start a new plan with us with the current pricing. \n\n", "a": "", "cat": "General"}, {"n": "Legacy T Cream $199 (old)", "c": "We just set up your subscription! Please note this subscription is billed at $199 monthly. The subscription covers the costs of medication, shipping, consultation, and support. Unless you indicate that you need to pause/cancel, the charge will be run automatically going forward. Please let us know if you have any questions", "a": "", "cat": "General"}, {"n": "Legacy T Cream $449 (old)", "c": "We just set up your subscription! Please note this subscription is billed at $449 every three months. The subscription covers the costs of medication, shipping, consultation, and support. Unless you indicate that you need to pause/cancel, the charge will be run automatically going forward. Please let us know if you have any questions.", "a": "", "cat": "General"}, {"n": "Legacy T Cyp $399 (old)", "c": "We just set up your subscription! Please note that this subscription is billed at $399 and recurs every ten weeks. The subscription covers the costs of medication, shipping, consultation, and support. Unless you indicate that you need to pause/cancel the charge will be run automatically going forward. Please let us know if you have any questions.", "a": "", "cat": "General"}, {"n": "Lindsay Burden", "c": "- Lindsay Burden, NP", "a": "", "cat": "General"}, {"n": "MA - Order Clarification", "c": "Hello from Fountain! I see that order # needs clarification. Can you please provide the necessary clarification? Thank you!", "a": "", "cat": "General"}, {"n": "MI DL Number", "c": "Good Morning! This is Fountain Vitality. We are working on processing your next order however the state of Michigan has updated its requirements for certain medications. They are now requiring our pharmacy to have the patients Driver\u2019s License number to be listed on the order for controlled medications. Can you please provide this so we can have your order processed as quickly as possible?", "a": "", "cat": "General"}, {"n": "Macro test: DR", "c": "Hi {{first_name}} \u2013 I received your message and have forwarded it to the appropriate team. They will follow up with you as soon as they can.\n\u200b\nThanks! - {{message.author.first_name}}, Medical Assistant", "a": "", "cat": "General"}, {"n": "Martin Van Dongen", "c": "- Martin Van Dongen, NP", "a": "", "cat": "General"}, {"n": "Medical Records request (labs)", "c": "Hi there, we will relay your request for medical records to the appropriate team. Please note there is an expected window for processing medical records. However, we will get these to you as swiftly as possible. Thank you for your patience!", "a": "", "cat": "Labs"}, {"n": "Medication sent without labs", "c": "Our partner pharmacies ship orders continuously as long as you have a valid prescription and an active subscription. This helps ensure that patients under our care don\u2019t run out of medication.\nIf any dosage adjustments are needed based on lab results, we can absolutely account for that in our system.", "a": "", "cat": "Labs"}, {"n": "Michelle Dymond", "c": "- Michelle Dymond, NP", "a": "", "cat": "General"}, {"n": "Missed Call", "c": "We apologize for missing your call. We attempted to return your call; however, we were unable to reach you. How can we assist you at this time?", "a": "", "cat": "General"}, {"n": "Monitoring Labs Email", "c": "Hello from Fountain!\nWe're reaching out because you're just about due for your required monitoring lab work. Please 'REPLY' to this email or text us at: 833 967-3100 with some dates and times that would work for you so we can get you scheduled.\nPLEASE NOTE: Our providers request that patients on T injections get labs drawn at least 24 hours after an injection, and patients on T cream should apply the cream as usual and gets labs drawn 2-4 hours after application.\n\nIf you're not using either of these, you can schedule any time of day.", "a": "", "cat": "Labs"}, {"n": "Monitoring Labs TRT", "c": "Hey - this is Fountain. Your required routine monitoring labs are just about due. Please utilize the following link to schedule your  lab appointment.\nPLEASE NOTE: Our providers request that patients on T injections get labs drawn at least 24 hours after an injection, and patients on T cream should apply the cream as usual and gets labs drawn 2-4 hours after application.\nIf you're not using either of these, you can schedule any time of day.", "a": "", "cat": "TRT"}, {"n": "NDC codes for insurance", "c": "Hello, \nSince the medication is bioidentical hormone therapy that is custom-compounded for each patient rather than manufactured, it does not have an NDC number. Without an NDC number, most insurance plans, unfortunately, will not cover compounded medications, including bioidentical hormones. ", "a": "", "cat": "General"}, {"n": "NT", "c": "Nicole Tormos-Colon, RMA", "a": "", "cat": "General"}, {"n": "NY HRT Price", "c": "It was a pleasure meeting you today. We offer the following plans and all plans cover all meds, all labs, video visits, shipping, and 24/7 customer service.\n12 weeks for $499.00 \n48 weeks for $1799.00\nLet me know if you have any questions and if any of these plans work for you.  We also have a number of add-on products that you might be interested in and those can be found here: https://blog.fountaintrt.com/add-on-products/", "a": "", "cat": "HRT"}, {"n": "NY, NJ, RI Labcorp/Quest: Will my insurance cover the visit?", "c": "Most insurance plans cover the majority of the cost for lab work, but you may encounter a copay depending on your specific insurance. We recommend reaching out to the location you will be visiting, and request they have labs preapproved by your insurance company. That should allow you to confirm the portion you are responsible for prior to receiving the service. ", "a": "", "cat": "Labs"}, {"n": "NY/NJ Getlabs - Policy", "c": "We partner with a mobile Phlebotomy lab, Getlabs. They can perform the bloodwork at your home/office. Your state of residence does not allow client billing for in-person office visits but given that Getlabs performs the bloodwork at your home/office this does not apply.", "a": "", "cat": "Labs"}, {"n": "NY/NJ/RI: Insurance Policy", "c": "In all states other than New York, Rhode Island, and New Jersey lab orders are submitted under client billing, meaning they should charge our account. Your state has special rules in place which require patients to use their insurance for lab visits. We (Fountain), do not participate with insurance ourselves. We certainly understand the reasons to try to find an insurance-based program. However, it doesn't work for Fountain's model for a few reasons. T therapy is frequently not well covered or covered only after a large deductible is paid each year. Treatment decisions are often directed by insurance companies and instead of the shared decisions of patients and providers. Fountain's billing model is based on an all-inclusive fee that recurs periodically and covers most aspects of service (medication, supplies, shipping costs, taxes, provider visits, and 24/7 direct access to providers and support team via our text messages platform). We are able to give more personalized attention and time to fewer individual patients.", "a": "", "cat": "General"}, {"n": "NY/NJ/RI: Lab Fees While Travelling", "c": "We can cover lab fees in all states outside of New York, New Jersey, and Rhode Island. ", "a": "", "cat": "Labs"}, {"n": "NY/NJ/RI: Lab Scheduling 2", "c": "Understood. Are you traveling to another state outside of NY, NJ, or RI soon? We can schedule you for bloodwork in any other state at no charge.", "a": "", "cat": "Labs"}, {"n": "NY/NJ: Can I use my insurance plan to cover the bloodwork?", "c": "We can't comment on your specific insurance plan - but most patients have been able to get the majority of the cost for bloodwork covered through their insurance plan but may have a small-copay.\nThe tests ordered are: Testosterone, Testosterone, Free, Direct, Prostate-Specific Ag, Luteinizing Hormone (LH), CBC, Platelet, No Differential, Estradiol.\nWe'd recommend reaching out to your insurance provider or calling LabCorp at: 800-845-6167.", "a": "", "cat": "General"}, {"n": "NY/NJ: New Signup who hasn't moved forward", "c": "Hey - hope you're doing well. We're just checking in to see if you're still interested in moving forward. Please let us know if you have any questions.", "a": "", "cat": "General"}, {"n": "NY/NJ: No Insurance", "c": "Understood. We'll refund your assessment fee. The refund will take between 3-5 business days to go through. Wishing you the best in your wellness journey.", "a": "", "cat": "General"}, {"n": "NY/NJ: No insurance but wants blood tests", "c": "We asked our Labcorp rep what the costs of these tests would be if paid out of pocket last year. The costs were around $250 at the time - but the costs may have since changed. Please be aware that these are the costs for the initial set. Our providers periodically order monitoring labs for patients on treatment to make it's safe and effective. The cost of these tests may be higher.", "a": "", "cat": "General"}, {"n": "NY/NJ: Onboarding New Signup", "c": "Welcome to Fountain TRT! Thanks for completing the assessment! The first step is getting bloodwork done. Due to your state's laws, you'll need to use insurance for your blood draw at Labcorp. Please let us know if this works for you. If not, we can explore additional options.", "a": "", "cat": "General"}, {"n": "NY/NJ: TRT Assessment Fee", "c": "The assessment fee covers the cost of labwork (outside of NY, NJ, RI, MA, and MD), consultation, and support. Your state has special rules for in-person lab visits which prevent us from covering the cost of in-person lab work. You'll need to use your insurance for the visit, or go to another state where we can cover the fees.", "a": "", "cat": "TRT"}, {"n": "NY/NJ: Why can't you cover the cost of labs in my state?", "c": "Our providers submit lab orders over to Labcorp or Quest. In all states other than New York, Maryland, Massachusetts Rhode Island, and New Jersey these are submitted under client billing, meaning they should charge our account. Your state has special rules for in-person lab visits requiring patients to use insurance.", "a": "", "cat": "Labs"}, {"n": "Needles - after emailing pharmacy", "c": "Our partner pharmacy confirmed that they will process an order with the missing needles. We will update you as soon as we can. Hope you have a great day.", "a": "", "cat": "General"}, {"n": "Needs VV for refill", "c": "Hi xxx,\nTo process your next refills, you will need to schedule a video visit with a provider. Please use the link below to book your appointment. [link]", "a": "", "cat": "General"}, {"n": "Needs VV for refill final reminder", "c": "Hi {{first_name}}- you're due for a refill. You'll need to speak with a provider in a quick video visit to process the prescription. You can use this link to schedule your visit:\n\nPlease update our team here via text message once you have successfully scheduled your video visit, so we may ensure our team monitors for any services (such as medication orders) necessary surrounding your visit.", "a": "", "cat": "General"}, {"n": "New Add-On Products at Fountain!", "c": "Here is some information about some additional treatments we offer:\nhttps://blog.fountaintrt.com/add-on-products/", "a": "", "cat": "General"}, {"n": "New Labs: Labs Expired", "c": "We're glad to hear you'd like to move forward. \n\u200b\nYou're welcome to go ahead with your consultation, but since it's been more than six months since you've done labs, we highly suggest you get new ones. They may be needed for us to prescribe. They will be covered by us (unless you're in NY, NJ, RI.) You can use this link if you'd like to schedule lab work: \n\u200b\nIf you'd like to schedule the consultation, regardless, you can - just let us know and we can send you the link. Thanks! ", "a": "", "cat": "Labs"}, {"n": "Next Refill Date", "c": "Hello, \nYour next refill should begin processing on:   \nTypically, refills are processed within one week by our partner pharmacies. Please let us know if you have any questions!", "a": "", "cat": "General"}, {"n": "Nicole Tormos-Colon", "c": "Nicole Tormos-Colon, Medical Assistant", "a": "", "cat": "General"}, {"n": "OHMD: Sharing Patient's Info 1", "c": "We can send you a copy of: securely through a different number. Would that work for you?", "a": "", "cat": "General"}, {"n": "OHMD: Sharing Patient's Info 2", "c": "We just sent over your: if you have issues accessing the document please let us know.", "a": "", "cat": "General"}, {"n": "Olfactory SE HRT (RN)", "c": "Hi there, if you have noticed increased sensitivity to your olfactory senses our HRT director has advised that this may be a rare side effect of estrogen on the central nervous system. On occasion, a patient will notice changes in food preferences or scents. This may be temporary, and improve as we define your optimal dose. However it could also persist as long as you are on HRT.", "a": "", "cat": "HRT"}, {"n": "Onboarding: Already has prescription", "c": "Glad to hear! You can get started by completing the assessment on our website using this link: trytrt.joinftn.com\nOur providers prescribe to our pharmacy partners. If you already on treatment but if you are already on treatment/have labs you can submit prior labs/treatment info after completing the assessment to expedite this process.", "a": "", "cat": "General"}, {"n": "Onboarding: Already on TRT", "c": "Hi - welcome to Fountain TRT. I see that you indicated you are already on TRT.\nDo you have a recent prescription label with the date, your name, and the dose prescribed? Do you have any recent lab results that include at least a T level? If you do, can you email those over to support@fountaintrt.com? Please make sure your lab results have your name and DOB on them.\nOnce we receive those, we\u2019ll send you a link to schedule a visit with a provider. Thank you.", "a": "", "cat": "TRT"}, {"n": "Onboarding: Getlabs", "c": "Hi - welcome to Fountain TRT. Glad to have you here. The next step is getting labs done.\nThrough our mobile phlebotomy partner, Getlabs, you can have a specialist sent to your home to perform the bloodwork. Please let us know what times/dates would work for you, and we will assist you with scheduling your appointment.", "a": "", "cat": "Labs"}, {"n": "Onboarding: Getlabs Preferred Time Available", "c": "Hey - Welcome to Fountain! Here are your appointment details: \nWe booked your appointment with Getlabs. You should receive a text with confirmation. If there are any issues please notify us. We look forward to working with you!", "a": "", "cat": "Labs"}, {"n": "Onboarding: Getlabs Preferred Time Not Available", "c": "Hey - welcome to Fountain! We tried booking your visit with Getlabs within your preferred parameters, but the appointment wasn't available. Are there any other times/dates that would work for you?", "a": "", "cat": "Labs"}, {"n": "Onboarding: Has lab results", "c": "Thanks for sending your lab results over. Here's your link to schedule your video visit with a Fountain Provider licensed in your state. Please select the 'New Patient' option: [insert State-Based Scheduling Link].", "a": "", "cat": "Labs"}, {"n": "Onboarding: LC Preferred Time Available", "c": "Welcome to Fountain! We booked your lab appointment. Here are your appointment details:\nYour lab order will be electronically submitted before your appointment and should be in their system by the time of the appointment.\nLab orders are submitted under client billing, meaning Labcorp should charge our account in most states. However, if you are in New York, New Jersey, or Rhode Island you will need to use your insurance.\nPLEASE NOTE: Sometimes, the office needs help finding the lab order. If they encounter any issues, please notify us immediately. We'll get that addressed immediately.\nWe should receive your report within 5-9 days of the blood draw. We'll contact you once we receive the full report. Please reach out if you have any questions!", "a": "", "cat": "Labs"}, {"n": "Onboarding: LC Preferred Time Not Available", "c": "Hey - welcome to Fountain! We tried booking your visit within your preferred parameters, but the appointment wasn't available. Are there any other times/dates that would work for you?", "a": "", "cat": "Labs"}, {"n": "Onboarding: Labcorp", "c": "Hi - welcome to Fountain TRT. Glad to have you here! What times/dates would be good for you to go into a nearby LabCorp for a blood test?", "a": "", "cat": "Labs"}, {"n": "Onboarding: Patients who live in states that we don't service", "c": "Hi - welcome to Fountain TRT. Thanks for completing the assessment! Unfortunately, we do not yet operate in your state. Do you happen to have a residence in another state?", "a": "", "cat": "General"}, {"n": "OnceHub: Bill Carbonneau", "c": "https://go.oncehub.com/FountainBill", "a": "", "cat": "General"}, {"n": "OnceHub: Doron Stember", "c": "https://go.oncehub.com/FountainDoron", "a": "", "cat": "General"}, {"n": "OnceHub: Josh Faucett", "c": "https://go.oncehub.com/JoshFaucett", "a": "", "cat": "General"}, {"n": "OnceHub: Martin Van Dongen", "c": "https://go.oncehub.com/MartinVanDongen", "a": "", "cat": "General"}, {"n": "OnceHub: Rachel Recore", "c": "https://go.oncehub.com/RachelRecore", "a": "", "cat": "General"}, {"n": "OnceHub: Summer Denny", "c": "https://go.oncehub.com/SummerDenny", "a": "", "cat": "General"}, {"n": "OnceHub: Timothy Mack", "c": "https://go.oncehub.com/TimothyMack", "a": "", "cat": "General"}, {"n": "OnceHub: Victor Lopez", "c": "https://go.oncehub.com/FountainVictorL", "a": "", "cat": "General"}, {"n": "Oncehub: Frankie", "c": "https://go.oncehub.com/FrankieFrieda", "a": "", "cat": "General"}, {"n": "Options of delivery methods for controlled substances to Wisconsin HRT patients", "c": "Hi there, the state of Wisconsin requires a legal signature from the patient in order to deliver controlled substance prescriptions. In these cases Wisconsin patients have three options:", "a": "", "cat": "HRT"}, {"n": "Order Cadence/Billing", "c": "Patients on four-week plans typically receive 28 days of medication, except for patients on Tcyp. The pharmacy dispensing T cyp ships a different supply based on the state patients are in and dosing, but that supply will not match the billing plan. Please let us know if you have any questions.\n\n\n ", "a": "", "cat": "Billing"}, {"n": "Order delay - technical issues", "c": "Hi - I checked with the team and it looks like your order did not go out due to a technical issue. We'll get that addressed, and ask the pharmacy to get your order out as soon as possible. Thanks for your patience.", "a": "", "cat": "General"}, {"n": "Order delayed due to tech issue/no api call generated", "c": "I checked our records and an order should been processed around: We did ask our partner pharmacy to process an order at that time, but it looks like it didn't go out due to a technical issue. We're asking them to process a new order for you, and have adjusted your next billing cycle so that it is set for ten weeks from today. We also added a $50 credit to your account which will be applied to your next charge.", "a": "", "cat": "General"}, {"n": "Orders: Are refills processed automatically?", "c": "As long as your subscription is up to date and you have valid refills on file, your refills will be processed automatically. Please let us know if you have any other questions.\n", "a": "", "cat": "General"}, {"n": "Orders: Can anyone pick up the order at Walgreens for me?", "c": "To our knowledge, anyone over 18 with a valid ID can pick up the order on your behalf. Please note that the order will be available at the FedEx pick-up site in the store\u2014not the pharmacy.", "a": "", "cat": "General"}, {"n": "Orders: Can anyone sign for the package?", "c": "Yes, anyone over the age of 18 can sign for the package. It does not specifically have to be you.", "a": "", "cat": "General"}, {"n": "Orders: Can the prescription be sent to a local pharmacy?", "c": "The membership plan that you have bundles multiple costs, including the cost of testosterone medication, labs, doctor visits, taxes, shipping, supplies, etc. Your provider would be happy to prescribe testosterone medication to a local pharmacy if preferred. We would be happy to offer a small discount for a membership fee that does not include testosterone medication - but you would still need to pay for the elements of care (labs, support, consultation, etc.) ", "a": "", "cat": "General"}, {"n": "Orders: Can you deliver to PO boxes?", "c": "Our current setup with our pharmacy partners prevents them from sending orders to PO boxes or lock boxes. The shipping address must be a residential address. ", "a": "", "cat": "General"}, {"n": "Orders: Can you send orders abroad?", "c": "Our partner pharmacies are unable to send orders overseas on our behalf, outside of US military bases and territories.", "a": "", "cat": "General"}, {"n": "Orders: Can you ship medication to X country?", "c": "Our partner pharmacies are unable to ship outside of US territory.", "a": "", "cat": "General"}, {"n": "Orders: Can you write the order for x person?", "c": "Due to the way our backend is set up our medical team cannot write orders for patients who have not registered.", "a": "", "cat": "General"}, {"n": "Orders: Canceling an outgoing order that already has a tracking link", "c": "Got it, we'll cancel your subscription per your request. Your order is already being prepared by the carrier, but we'll reach out to the pharmacy to see if we can cancel the outgoing order.", "a": "", "cat": "Cancellation"}, {"n": "Orders: Changing address to Walgreens", "c": "Would the Walgreens located at (Walgreens address) work for you? Please note that Walgreens will only hold the shipment for up to seven days after delivery, after which it would be returned to the sender (the pharmacy.)", "a": "", "cat": "General"}, {"n": "Orders: Confirm patient's current address", "c": "We can ask our partner pharmacy to see if they can ship there. Can you confirm the current address you're staying at?", "a": "", "cat": "General"}, {"n": "Orders: Confirming signer's name upon delivery", "c": "Upon checking, it appears that the shipment was signed for by a person named (signer's name) according to the tracking link: (tracking link). Do you happen to know someone who might have signed for this package on your behalf?", "a": "", "cat": "General"}, {"n": "Orders: Confirming that a patient is okay with us sending over a TRT script to a local pharmacy", "c": "Okay no problem. We're happy to set this up for you. Please note that you may have to pay a small fee to pick up the prescription if it is submitted to a local pharmacy.", "a": "", "cat": "TRT"}, {"n": "Orders: Cost for orders filled at a local pharmacy", "c": "The pharmacy may charge you for a small fee to pick up the order. If you have insurance the cost may be covered through your insurance provider.", "a": "", "cat": "General"}, {"n": "Orders: Credit for needles at a local pharmacy", "c": "Yes, we can credit you the value of what you pay for the needles of your next subscription charge. Please just let us know how much you pay. Thanks!", "a": "", "cat": "General"}, {"n": "Orders: Delayed but in process", "c": "Hi - I see the order is still being processed. We will follow up with our pharmacy and update you as soon as possible. ", "a": "", "cat": "General"}, {"n": "Orders: Delayed due to pharmacy issue", "c": "Hello - this order was delayed due to a pharmacy issue. We will follow up with the pharmacy and work with them to get this order out as soon as possible.", "a": "", "cat": "General"}, {"n": "Orders: Delivered to Walgreens", "c": "Hello - I can see your package was delivered and signed for by [Recipient\u2019s Name] on [Date Delivered]. Please note Walgreens only holds the shipment for up to seven days, after which it\u2019s returned to the sender (the pharmacy.).", "a": "", "cat": "General"}, {"n": "Orders: Does the package come in a non-descript box?", "c": "The package should come in a non-descript box.", "a": "", "cat": "General"}, {"n": "Orders: Dose Adjustment Refill", "c": "If your dose is adjusted, that can be factored into our system. We would ask our partner pharmacy to ship your next order sooner to account for a change in dose. ", "a": "", "cat": "General"}, {"n": "Orders: FedEx proof of delivery", "c": "Upon checking, we have confirmed that the package was delivered to your home address, as indicated by the tracking link: (tracking link). There should be a photo attached of where FedEx placed your shipment.", "a": "", "cat": "General"}, {"n": "Orders: Fedex Delivery Manager", "c": "We can ask Fedex to see if they can accomodate this request - but it's unlikely that they'd be able to do this on an ongoing basis. That being said, you can download the fedex delivery manager app here: https://www.fedex.com/en-us/delivery-manager.html and provide specific instructions for delivery. Fedex should follow those instructions going forward. Please let us know if you have any questions.", "a": "", "cat": "General"}, {"n": "Orders: Fedex case number", "c": "We reached out to FedEx and the representative confirmed that _____ and provided us with the case number _____.\nPlease let us know if there's anything we can do on our end to assist.", "a": "", "cat": "General"}, {"n": "Orders: Fedex sites", "c": "You can find the list of available locations near you using this link: https://local.fedex.com/en/delivery-sites", "a": "", "cat": "General"}, {"n": "Orders: Filled improperly", "c": "Got it - we'll get certainly get this addressed. Can you send over a photo of what you received please? we'll forward it to our medical team. Thank you.", "a": "", "cat": "General"}, {"n": "Orders: Follow-up date for patients who want orders sooner", "c": "We can try to get our partner pharmacy to get the order out to you sooner than their anticipated shipping window, but we cannot guarantee that they can do this. The best option here would probably be to set up your subscription during a window in which you could receive the orders. Does that work for you?", "a": "", "cat": "General"}, {"n": "Orders: How long till I receive my order?", "c": "First, you need to consult with a provider. If prescribed, patients typically receive the medication within a week.", "a": "", "cat": "General"}, {"n": "Orders: How many days after payment do shipments go out?", "c": "Orders typically go out within a week. Please let us know if you have any questions. ", "a": "", "cat": "General"}, {"n": "Orders: If a patient asks why the shipping cadence will change for early refills", "c": "This means that future orders will be processed in line with the new order. For instance - patients receiving monthly cream on a 30 day cycle would have that cycle restart based on the early refill - and it would recur 30 days from the new order going out. This is not necessarily in line with charge dates or past orders.", "a": "", "cat": "General"}, {"n": "Orders: New Schedule for Early Refills", "c": "This means that your orders will be processed on a new schedule, in line with the early refill. This does not change the cadence of your charges or anything else.", "a": "", "cat": "General"}, {"n": "Orders: Offer Walgreens", "c": "We can find a nearby Walgreens address that will accept the shipments (Walgreens acts as holding centers for FedEx.) Would that work for you?", "a": "", "cat": "General"}, {"n": "Orders: Overseas Shipping", "c": "Most of our partner pharmacies can only ship to US states. ", "a": "", "cat": "General"}, {"n": "Orders: Patient wants us to ship sooner", "c": "We can try to get our partner pharmacy to get the order out to you sooner than their anticipated shipping window, but we cannot guarantee that they can do this. The best option here would probably be to set up your subscription during a window in which you could receive the orders. Does that work for you?", "a": "", "cat": "General"}, {"n": "Orders: Processing Replacement", "c": "We'll work on processing a replacement for you as soon as possible at our own expense.", "a": "", "cat": "General"}, {"n": "Orders: Request for Additional Needles", "c": "Due to the way our partner pharmacy processes orders, they wouldn't be able to send you more needles - unless a package was filled incorrectly. We're working on ways to make this more seamless - but in the meantime we do have two other options available.\nYou may be able to purchase the needles our partner pharmacy sends out off amazon. Here's the link: https://www.amazon.com/EasyTouch-Insulin-Syringe-Needle-2-Inch/dp/B081VV1PN3?crid=3JSBNF4TPCUCV&keywords=insulin+syringe+ez+27&qid=1697226980&s=hpc&sprefix=insulin+syringe+ez+27%2Chpc%2C65&sr=1-1\nPlease note that they are not able to process these orders in every state. If you encounter an issue purchasing the syringes please let us know, and we can ask our medical team to submit an order for syringes to a local pharmacy. Please just let us know the pharmacy name and phone number, and we'll get right on that.\nPlease note we can add an equal credit to your account if you use either option which would apply to your next subscription charge.", "a": "", "cat": "General"}, {"n": "Orders: Ship to Office", "c": "That's no problem. We can ask the pharmacy to ship to your work location. Can you please provide that address?", "a": "", "cat": "General"}, {"n": "Orders: Shipping Delays", "c": "We're partnered with third-party pharmacies and delivery services. Issues may come up occasionally which will be outside of our control, but we do our best to keep patients in the loop if there are major issues that will cause delays. Thank you for your patience.", "a": "", "cat": "General"}, {"n": "Orders: Shipping Timeframe", "c": "Upon starting a membership plan, you can expect to receive your order within a week.", "a": "", "cat": "General"}, {"n": "Orders: Shipping to CVS", "c": "Walgreens has a partnership with Fedex which allows it to serve as a Fedex pick-up site, but CVS does not at this time.\nAny Fedex pick up site will work though. If you plug in your zip code to this site: https://local.fedex.com/en/delivery-sites you can find a nearby Fedex pick-up site that works for you. Please let us know what pick up location would work best for you.", "a": "", "cat": "General"}, {"n": "Orders: UPS Delivery Manager", "c": "We can ask UPS to see if they can accomodate this request - but it's unlikely that they'd be able to do this on an ongoing basis. That being said, you can sign up for UPS Choice here: https://www.ups.com/us/en/track/ups-my-choice.page and provide specific instructions for delivery. UPS should follow those instructions going forward. Please let us know if you have any questions.", "a": "", "cat": "General"}, {"n": "Orders: Update shipping address for existing patient", "c": "The shipping address we currently have on file is: . Would you still like to have all future orders be sent there, or would you like to update your default shipping address?", "a": "", "cat": "General"}, {"n": "Orders: Update shipping address for new patient", "c": "Great! We just updated the shipping address on file to: Your prescriptions will be sent there.", "a": "", "cat": "General"}, {"n": "Orders: What is my address?", "c": "Hello - the address we have on file is: Is that the correct address?", "a": "", "cat": "General"}, {"n": "Orders: Why can't you ship more quickly?", "c": "Depending on the partner pharmacy your medication is processed, it may take up to a week for it to go out. We certainly would prefer the pharmacies we work with to get orders out more quickly - and we push them to do so.", "a": "", "cat": "General"}, {"n": "Overriden Information", "c": "Hi - thanks for your patience. I reviewed your account and I believe we identified the issue here.\n\u200b\nIt looks like you and your partner may have overridden each other's account information, which caused this problem. We'd be happy to fix this for you.\n\u200b\nCan you please provide me with the following:\n\u200b\nYour name\nYour dob\nYour email\nYour active phone number\n\u200b\nWe'll need to update the account on file with that information, and then your partner can register through our website: fountain.net. \n\u200b\nPlease let us know if we can clarify anything.\n\u200b\nThanks!\n\u200b", "a": "", "cat": "General"}, {"n": "PDE5i tadalafil/sildenafil information for patients", "c": "We offer sildenafil (generic Viagra) and tadalafil (generic Cialis) to improve erectile function. Tadalafil has a much longer duration of action than sildenafil and does not interact with food. Its extended effect allows for daily use at lower doses, which reduces the risk of side effects while enhancing blood flow and oxygen delivery to the tissue. Daily low-dose tadalafil may also help relieve symptoms of urinary retention.\nDo not take these medications with other similar nitrate medications. Common side effects include dizziness due to lowered blood pressure, heartburn, back discomfort, facial flushing, and nasal congestion. Rare but serious side effects-such as sudden vision changes or an erection lasting longer than four hours-require immediate medical attention.\nThese medications cost $99 for a 12 week supply. Let us know if you are interested in a trial and we will alert your medical provider.", "a": "", "cat": "General"}, {"n": "Patient is set to run out of medication early", "c": "This patient is low on medication, and their next charge date is: Can you please confirm they are using the medication correctly?", "a": "", "cat": "General"}, {"n": "Patient late for VV meeting - login troubles", "c": "Let me know if you have any issues logging into the video link: https://fountain.doxy.me/bill", "a": "", "cat": "General"}, {"n": "Patient needs earlier visit", "c": "Hello - this patient: located in: is requesting an earlier appointment.", "a": "", "cat": "General"}, {"n": "Patient request to cancel, but inquires about retrieving labs, visit, or future shipments", "c": "Hi there, we understand you would like to cancel your subscription. In order to receive services such as lab work, video visits, and future shipments(if due for any prior to cancellation) your subscription will need to remain active. \nYou can either choose to keep your subscription active at this time, and reach out at a later date. To avoid another charge we recommend reaching out prior to your next charge date, which is:    . The other option is we may set your subscription to remain active, and automatically cancel prior to your next charge date. Either of these options allow you to receive the remainder of services you have already paid for. Please confirm here how you would like to proceed.", "a": "", "cat": "Labs"}, {"n": "Patient request to see female provider only", "c": "We want you to feel comfortable with your care. When selecting your appointment, you will be able to see the name of the provider you will be meeting with for your patient-provider visit.\nChanging providers may require backing out of your current appointment and selecting a different date and time. You may also reach out to us directly for assistance, or you may select a new appointment that better fits your preference.", "a": "", "cat": "General"}, {"n": "Patient requests info to submit insurance claim", "c": "Thank you for reaching out. Fountain does not work directly with insurance companies, and our providers are not credentialed with insurance plans. For this reason, claims sent to insurance are unlikely to be approved.\nWe are happy to provide the provider\u2019s name and NPI number so you may submit any documentation you need. However, please note that we cannot provide a billing address for insurance purposes since we do not bill insurance and are not in-network with any carriers.\nPlease let us know if you would like the provider\u2019s name and NPI, and we will be glad to share that with you.\nHave a great day!", "a": "", "cat": "General"}, {"n": "Patient states they did not sign up for auto renewing subscription at a rate of $1799 every 48 weeks", "c": "Please find attached the agreed-upon terms for your selected subscription that were accepted when your subscription began. If you have any questions or would like us to review them with you, please let us know.", "a": "", "cat": "General"}, {"n": "Patient states they did not sign up for auto renewing subscription at a rate of $199 every 4 weeks", "c": "Please find attached the agreed-upon terms for your selected subscription that were accepted when your subscription began. If you have any questions or would like us to review them with you, please let us know.", "a": "", "cat": "General"}, {"n": "Patient states they did not sign up for auto renewing subscription at a rate of $499 every 12 weeks", "c": "Please find the attached the agreed-upon terms for your selected subscription that were accepted when your subscription began. If you have any questions or would like us to review them with you, please let us know.", "a": "", "cat": "General"}, {"n": "Patient who is unable to receive text messages from us", "c": "We\u2019re happy to assist! Can you please also text our number (833)967-3100 \u201cSTART\u201d so you can receive texts from us again?\nIf you are still unable to receive messages, the issue may be tied to your phone carrier. We recommend you reach out to your cellular service carrier directly. It is possible they are blocking our number for unclear reasons.", "a": "", "cat": "General"}, {"n": "Payment Video: HRT", "c": "Hello - here's a link to the video we send out after you start your membership: https://HRT.fountain.net/success", "a": "", "cat": "HRT"}, {"n": "Pharmacies Used", "c": "Most prescriptions are filed through one of our partner pharmacies, Belmar, the Pharmacy Hub, or Curexa. ", "a": "", "cat": "General"}, {"n": "Pharmacy: Can I pick up the needles at a local pharmacy?", "c": "You may be able to pick up the needles at a local pharmacy, but we can't guarantee that they will be available.", "a": "", "cat": "General"}, {"n": "Pharmacy: Can the medication be filled at a pharmacy outside of the US?", "c": "Our providers cannot write prescriptions for pharmacies outside of the US.", "a": "", "cat": "General"}, {"n": "Pharmacy: Cannot ship to patient who is traveling", "c": "We reached out to our partner pharmacy, and they indicated that they are unable to ship to: at this time.", "a": "", "cat": "General"}, {"n": "Pharmacy: Contacting pharmacy about patient receiving fewer syringes than they should have", "c": "Hello - the patient who received OID: indicated that they were only sent ( ) syringes. Can the patient be sent more syringes please?", "a": "", "cat": "General"}, {"n": "Pharmacy: Conversion Back to Curexa", "c": "Hello from Fountain! You may have been informed at your last visit about a shortage with our main pharmacy partner, and that we\u2019d need to switch to a different pharmacy for the T cyp/DHEA combo. Good news \u2014 our main pharmacy now has a supply, and we\u2019ll continue sending your normal shipment. They do require a signature for delivery. If you expect it to be a problem to have someone at home to sign, please let us know.", "a": "", "cat": "General"}, {"n": "Pharmacy: Early Refill Confirmation", "c": "Hello from Fountain! We will ask our partner pharmacy to send out an early refill. This will be done at no additional cost. Please be aware that future refills will be processed at a new cadence based on this refill.", "a": "", "cat": "General"}, {"n": "Pharmacy: Extra Meds Travel 1", "c": "Hi - I understand you'll be traveling soon. We'll ask our partner pharmacy to process an early refill for you, as well as asking them to send out extra meds for travel. We'll just need to run a $75 charge to get this processed for you. Please let us know if that works for you.", "a": "", "cat": "General"}, {"n": "Pharmacy: How long will it take for them to process the script?", "c": "Generally, pharmacies will have the script processed within an hour or two of the script being submitted. They typically get the orders processed within a week of the order being submitted. ", "a": "", "cat": "General"}, {"n": "Pharmacy: If a patient asks for a script to be sent to a local pharmacy", "c": "We'll let your provider know that you would like the script submitted to a local pharmacy. Can you please confirm the name and address of that pharmacy, please?", "a": "", "cat": "General"}, {"n": "Pharmacy: If a patient had an order processed by another pharmacy recently", "c": "Hi - our pharmacy partner indicated that you had a TRT order filled by: on: Our providers can only prescribe if you're not filling other prescriptions for the same medication since this is a controlled substance. We would love to provide your treatment but need confirmation from you that we're going to be your only medical provider for TRT. We need your confirmation before the pharmacy can process this order. Please note that they may not be able to process it immediately since another RX was by an outside pharmacy. Thank you.", "a": "", "cat": "General"}, {"n": "Pharmacy: If a patient indicates they are unable to purchase the syringes", "c": "Got it. Thanks for letting us know. We can ask our medical team to submit a script to a local pharmacy. Can you please provide the name and the phone number of a local pharmacy you use?", "a": "", "cat": "General"}, {"n": "Pharmacy: If a patient indicates they need more syringes for another reason", "c": "Okay no problem. These are the syringes that our partner pharmacy ships with the medication:\nhttps://www.amazon.com/EasyTouch-Insulin-Syringe-Needle-2-Inch/dp/B081VV1PN3/ref=sr_1_1?crid=3JSBNF4TPCUCV&keywords=insulin+syringe+ez+27&qid=1697226980&s=hpc&sprefix=insulin+syringe+ez+27%2Chpc%2C65&sr=1-1\nPlease let us know if you purchase them and we'll credit you the value you paid off your next subscription charge. If you are unable to purchase them please let us know.", "a": "", "cat": "General"}, {"n": "Pharmacy: If the patient simply provide the location/ address of the pharmacy", "c": "Got it, we'll let your provider know and ask them to submit the script to:", "a": "", "cat": "General"}, {"n": "Pharmacy: Patient received fewer syringes than they should have", "c": "Hello,\nThe patient who received order # indicated that they received fewer syringes than they should have in the package. Is it possible to process a new order of syringes for them? Thank you!", "a": "", "cat": "General"}, {"n": "Pharmacy: Sending patient's temporary address", "c": "Hello,\nWould you be able to ship to this address:\nA patient in our care is temporarily staying there. Thank you!", "a": "", "cat": "General"}, {"n": "Pharmacy: Switching from Belmar to Curexa", "c": "At your last visit, your provider may have mentioned a national medication shortage and a potential switch to a new pharmacy. Thankfully, our current pharmacy partner has secured additional supply, so we\u2019ll continue working with them for now. Moving forward, refills will be shipped when you have about 10% left in your current vial, based on your dose. A signature will be required upon delivery, but you\u2019ll receive a tracking link via text so you\u2019ll know when to expect it. If signing for the shipment will be difficult, please let us know. Note that these vials will not contain DHEA.", "a": "", "cat": "General"}, {"n": "Pharmacy: Switching from Curexa to Empower", "c": "Hello from Fountain! We're working on getting you a new order sent out from our partner pharmacy, Empower. They do not have a signature requirement, but they need to send the order to your home address. Can you please confirm your current address? Thank you!", "a": "", "cat": "General"}, {"n": "Pharmacy: T Cyp Multiple Vials", "c": "Got it. Our partner pharmacy ships medication every ten weeks based on their recommendation. They indicated that patients should always have a fresh vial of medication (in other words, a vial that was first punctured fewer than 10 weeks ago). That being said, if you have extra vials we can adjust your next subscription charge date. Can you please confirm what you would like us to move your next charge to?", "a": "", "cat": "General"}, {"n": "Pharmacy: Transferring patients to Empower pushback", "c": "Thanks for your patience. This is a visit needed for compliance reasons so that we can process your medication through a more dependable source. It shouldn't take more than 15 minutes.", "a": "", "cat": "General"}, {"n": "Pharmacy: Transferring prescriptions back to Curexa", "c": "The pharmacy we've been using for injections (Belmar Pharmacy), has very high lead times. This was only further exasperated by the recent storm. We're in the process of moving away from them due to these lead times. But our other pharmacy partner has informed us that they have secured additional supply, so we\u2019ll continue working with them for now. A signature will be required upon delivery, but you\u2019ll receive a tracking link via text, so you\u2019ll know when to expect it. If signing for the shipment will be difficult, please let us know. Note that these vials will not contain DHEA. Please let us know if you would prefer us to send the prescription to that pharmacy.", "a": "", "cat": "General"}, {"n": "Pharmacy: Unable to ship to address", "c": "We reached out to our partner pharmacy, and they indicated that they are unable to ship to: at this time.", "a": "", "cat": "General"}, {"n": "Pharmacy: Which pharmacies do you work with?", "c": "We work with several pharmacies for different treatment options, such as Belmar Pharmacy, Empower Pharmacy, The Pharmacy Hub, Absolute Pharmacy, and Curexa Pharmacy.", "a": "", "cat": "General"}, {"n": "Pharmacy: Which pharmacy is sending out the order?", "c": "It would be processed by our partner pharmacy: ", "a": "", "cat": "General"}, {"n": "Pricing for HRT No lab program. NY patients on or after 12/17/25 and ALL States on or after 1/21/26", "c": "Fountain HRT is an all-inclusive membership.\nAll subscription plans cover the cost of medication, supplies, provider visits, shipping, taxes, and 24/7 support.\n\nHere's a breakdown of pricing for our HRT Program: https://fountain.net/hrt#pricing", "a": "", "cat": "HRT"}, {"n": "Priming UnoDose dispensers (Curexa) \"will not disperse medication after several attempts\"", "c": "Hi there, our partner pharmacy has advised that the unodose bottles need to be primed before use. This is done at the time of first use. The bottles are not pre primed because of the product risk. You should have received an insert of instructions on how to use your Unodose cream dispenser in your shipment. To prime the dispenser continue to turn the dosing knob until cream is dispensed. Once medication is dispensed from the container please follow the prescribed number of clicks.\n\nPlease let us know if you did not receive the insert with instructions. \nIf you have followed the provided instructions/primed the bottles, and are still having issues please provide a video of the issue per the pharmacy's request. Thank you!", "a": "", "cat": "General"}, {"n": "Progesterone decrease to 300mg", "c": "Our prescribing approach is based on evidence-based guidelines, and oral progesterone doses above 300 mg have not been shown to provide additional benefit. For this reason, the maximum dose of Progesterone is 300mg by mouth.\nIf 300 mg does not adequately control symptoms, increasing the dose further is unlikely to help and may increase side effects. Instead, we may consider changing the route of progesterone, such as switching to a sublingual formulation, which is absorbed directly into the bloodstream and often works effectively at a lower dose. We can also reassess estrogen dosing, as estrogen balance can impact symptoms.\nOur goal is always to use the lowest effective dose with the best tolerability and benefit.", "a": "", "cat": "General"}, {"n": "Promotion: Can you contact my referral?", "c": "They can email us at support@fountaintrt.com or text us at this number and we're happy to help them or address any questions they may have.", "a": "", "cat": "General"}, {"n": "Promotion: Discount for a review", "c": "We certainly appreciate your support, but we cannot offer any promotions or discounts for reviews.", "a": "", "cat": "General"}, {"n": "Promotion: Does this promotion expire?", "c": "No, this deal does not expire. This offer will still be valid. Please note that if you cancel now and choose to resume at a later date, you may need to schedule a new video visit for compliance purposes.", "a": "", "cat": "General"}, {"n": "Promotion: Evaluation Discount", "c": "Hi - thanks for reaching out. The 'evaluation discount', refers to the rate you will be paying, compared to the actual cost of the service. This covers the cost of labs (if needed), support, and consultation. We just ask for one small upfront payment", "a": "", "cat": "General"}, {"n": "Promotion: GLP Military Discount", "c": "We appreciate your service, but at this time we aren't able to offer a military discount. Our plans are already significantly discounted right now with our 3 and 6-month plan options.", "a": "", "cat": "GLP"}, {"n": "Promotion: GLP No Discounts", "c": "Thank you for your interest, but at this time we aren't able to offer a discount. Our plans are already significantly discounted right now with our 3 and 6-month plan options.", "a": "", "cat": "GLP"}, {"n": "Promotion: GLP Patient Referral", "c": "If you know anyone who might be interested in our service, please ask them to complete the assessment on our website: https://fountain.net/glp\nIf they qualify for treatment and choose to enroll in our program, we will apply a $100 credit to their account. They would just need to let us know they were referred when they sign up. Thank you for the support!", "a": "", "cat": "GLP"}, {"n": "Promotion: Holiday Referral", "c": "Thanks for sending that code over! We will apply a $100 credit to your first membership payment. Please note that you'll receive the standard payment confirmation message when the subscription is set up - but there will be a $100 credit applied.", "a": "", "cat": "General"}, {"n": "Promotion: Is there a referral link?", "c": "We do not have a referral link at this time. If you know anyone who might be interested in our service, please ask them to complete the assessment on our website: https://fountain.net. \nIf they qualify for treatment and choose to enroll in our program, we will apply a $100 credit to their account. They would just need to let us know they were referred when they sign up. Thank you for the support!", "a": "", "cat": "General"}, {"n": "Promotion: Money-Back Guarantee", "c": "We do not have a money-back guarantee for patients on treatment. Our providers work closely with patients to ensure their treatment is effective and safe, but we cannot guarantee that it will work for everyone. If you start a membership plan, you can cancel at any time you wish \u2014 there is no contract.", "a": "", "cat": "General"}, {"n": "Promotion: No Discount", "c": "We do not currently offer any discounts.", "a": "", "cat": "General"}, {"n": "Promotion: No Price-Matching", "c": "We do not offer price-matching.", "a": "", "cat": "General"}, {"n": "Promotion: No Valid Promo Code", "c": "Thanks for sending that over. I checked with our team and that's not a promo code we're currently accepting.", "a": "", "cat": "General"}, {"n": "Promotion: Patient referrals across any program", "c": "Yes! We apply a $100 credit to their account, regardless of which program they registered for. They'll just need to let us know they were referred for us to apply the credit.", "a": "", "cat": "General"}, {"n": "Promotion: Price Objections or Requests for Discounts Due to Competitor's Lower Pricing", "c": "Hello - I'm afraid we're not able to offer negotiated prices at this time. Our subscription fee is all-inclusive (there are no hidden charges.) There are other services that may quote lower prices - but they usually charge for labs/shipping/consultation separate from the price quoted.", "a": "", "cat": "General"}, {"n": "Promotion: Promo Codes", "c": "We don't typically use promo codes, although we have been accepting one promo code for a $100 credit off a new subscription for the holidays. If you saw that promo code, could you send that over to us? We can apply that as a one-time credit to your subscription.", "a": "", "cat": "General"}, {"n": "Promotion: Referral on Old Plan", "c": "Got it. We recently changed our referal policy - it's now only the referee who gets the $100 credit. That being said, I see that we did mention our old policy to you. We'll apply a $100 credit to your account. Please note that we won't be able to do this for any future referrals.", "a": "", "cat": "General"}, {"n": "Promotion: Referred a friend", "c": "We appreciate your support! At this time our current policy is to only apply a $100 credit to the referee, not the referrer.", "a": "", "cat": "General"}, {"n": "Promotion: Referred by an existing patient", "c": "I understand that you were referred to our program by an existing patient. Please note that you will receive a $100 credit on your account, which will be applied to your next subscription charge. Have a great day.", "a": "", "cat": "General"}, {"n": "Promotion: TRT Black Friday Link", "c": "Hi - not sure why that link isn't loading. You can try using this link though:  https://trt.fountain.net/?offer_id=black-friday&_ftn_id=MjU%3D  Please let us know if you still encounter the same issue.", "a": "", "cat": "TRT"}, {"n": "Promotion: Veteran's Discount", "c": "Hi - we appreciate your service, but at this time we do not offer a Veteran's discount.", "a": "", "cat": "General"}, {"n": "Quest Rep", "c": "Thank you for reaching out. I wanted to provide you with our Quest Representative\u2019s contact information. You can reach Katherine at 703-801-4378, and she can connect directly with the phlebotomist to resolve any issues right away.\nIf she is unavailable, you can also contact Quest Service Excellence at 866-226-8046 for immediate assistance.", "a": "", "cat": "General"}, {"n": "Quest: Bill Transfer", "c": "Thanks for sending that over. We'll ask our Quest rep to get this transferred over to our account. Please be aware that it can take between 30-90 days for the bill to be transferred over successfully to our account. During this time you may receive collection notices from Quest. Please disregard them. You will receive a notice from Quest once the bill has been transferred over.", "a": "", "cat": "General"}, {"n": "Quest: Emailing Quest for a Bill", "c": "Hi - this is ___ from Fountain's Customer Service Team. [Patient Name] received a bill from Quest. The PSC was: and the date of the appointment was: Please transfer this bill over to Fountain's Account (Account Number 73916923) Thank you very much!", "a": "", "cat": "General"}, {"n": "Quest: Option", "c": "You can certainly schedule an appointment with Quest. Here's the link: \n\u200b\nPlease note the following if you schedule an appointment with Quest:\n\u200b\nWe cover the costs for labs at Quest in most states (outside of NY, NJ, MD). Patients in the mentioned states can use their insurance to cover lab fees if they wish to proceed. \n\u200b\nWe will text you a link to schedule a visit with a provider once we receive your results from Quest. ", "a": "", "cat": "General"}, {"n": "Questions regarding transfer from LabCorp to Quest", "c": "Hi there, our company has recently transitioned to Quest Diagnostics as our primary lab facility to ensure we can continue to provide our patients with the highest quality of care. \n\nWe understand many of our patients may have been accustomed to LabCorp as our previous primary lab facility. If you prefer to continue scheduling your lab draw at LabCorp you may. Please note there is an additional charge of $37 for each lab appointment completed at LabCorp.\nIf you have any further questions or concerns, you may share them here. \n\u200b\nWe look forward to reviewing your lab results with you once they are available. Have a great day! \n\u200b", "a": "", "cat": "Labs"}, {"n": "RN / CS Expanded Labs Fasting", "c": "Our typical follow up lab work does not require fasting. However, for the most accurate results when expanded lab options are ordered patient's are recommended to have blood drawn while fasting. You should plan to stop eating after midnight and schedule your appointment for first thing in the morning when the lab facility opens. Fasting before a blood draw means you do not eat or drink anything except water. This fasting period helps ensure your blood work, especially lipid panels and other metabolic markers, will provide the most precise measurements of your health status. ", "a": "", "cat": "RN"}, {"n": "RN Anastrozole SE", "c": "Anastrozole is an oral pill that is taken 1-2 times per week. It is usually very well tolerated but may cause headache and/or mild GI side effects including upset stomach or loose stool.\n\nAnastrozole will decrease your estrogen and can cause symptoms that are similar to low testosterone. Monitor for decreased libido, erectile dysfunction (ED), fatigue, or changes in your mood. Please let us know if you are interested in starting Anastrozole or if you have any additional questions.", "a": "", "cat": "RN"}, {"n": "RN BD/TP next steps/follow up", "c": "I am reaching out regarding your recommended blood donation per your provider. The next step would be to find a blood donation location, such as the Red Cross. You can reach out to them here: 1-800-RED CROSS or redcross.org. Please eat and hydrate well before and after your donation. Please let us know when you have completed your donation or if you have questions about this.", "a": "", "cat": "RN"}, {"n": "RN CS please update", "c": "Please update ticket if patient responds. Thank you", "a": "", "cat": "RN"}, {"n": "RN Carol Signature", "c": "Please let us know if you have any other questions or concerns. Thank you, Carol Buckner, RN", "a": "", "cat": "RN"}, {"n": "RN ED Meds Info", "c": "We offer sildenafil on-demand (20 mg per dose) or tadalafil (20 mg per dose) with a 12-week supply (84 tablets) for $99. For daily use, we provide low-dose tadalafil at $99 per quarter (12 weeks). Let us know if you'd like to discuss further, and we can schedule you with a provider.", "a": "", "cat": "RN"}, {"n": "RN FDA ENC", "c": "The FDA oversees compounding pharmacies, but by definition compounded medications are never \"FDA-approved.\" \n\nClomiphene citrate (clomid) is a medication that's been FDA-approved for decades. Clomid is composed of 2 ingredients: enclomiphene and zuclomiphene. Clomid was originally intended to be used to improve female fertility, but it has been used for decades off-label to increase testosterone levels in men who wanted to preserve sperm production. The problem with using clomid for this purpose is that it doesn't raise T levels effectively. It was discovered that it's the enclomiphene part of clomid that effectively raises T levels so purified enclomiphene is much more effective than when it's combined with zuclomiphene. In short, enclomiphene is a component of an FDA-approved medication, and is produced by compounding pharmacies that are overseen by the FDA, but is not technically FDA-approved as a stand-alone medication.", "a": "", "cat": "RN"}, {"n": "RN Intro video and side effects", "c": "Thank you for your question. Per our Medical team: Exogenous use of testosterone, such as testosterone injections and testosterone cream, may possibly increase risks for gynecomastia, fluid retention, emotional swings, erythrocytosis, prostate issues, acne, exacerbation of male pattern baldness, elevation in cholesterol levels, testicular atrophy, and significantly reduces fertility. The level of risks may vary from patient to patient which is why we get baseline labs and a complete medical history during the initial evaluation. Your provider will go over any additional questions or concerns you have during your visit.\n\u200b\nPlease see video for more information: https://fountaintrt.wistia.com/medias/cfhv60f5iy", "a": "", "cat": "RN"}, {"n": "RN Labs: LH/PSA", "c": "Research suggests that amphetamines (Adderall and others) can inhibit luteinizing hormone thereby reducing testosterone levels. Here is a related study: https://www.ncbi.nlm.nih.gov/pmc/articles/PMC1909523/\n\u200b\nOur providers have advised that LH and PSA levels are obtained initially as baseline screening labs. PSA is then obtained yearly on patients over age 44 and as needed for patients under age 45. LH is used to determine if there are any concerns for pituitary gland effects on baseline testosterone levels. Once you start using testosterone replacement, your brain stops sending the LH signal to the testicles and labs will simply show undetectable levels leaving no value for monitoring LH.", "a": "", "cat": "RN"}, {"n": "RN New patient next steps/expectations", "c": "Thank you for reaching out. It\u2019s not unusual for the medication to take some time to be effective. Some people have an improvement in some symptoms and labs by 6 weeks, most can take 2-3 months of treatment before seeing significant improvement.\n\u200b\nThe next step is to continue treatment and then get follow-up labs about 6 weeks after starting treatment. Customer service will reach out then to assist with your next lab appointment. After your lab work has resulted, customer service will reach out and send you a follow-up provider video visit link. At your next appointment, your provider will discuss your lab results, symptoms, and dose adjustments as needed.", "a": "", "cat": "RN"}, {"n": "RN TRT Diet questions", "c": "Hi there, thank you for reaching out. Avoiding processed foods is a great start. Fresh, whole foods can be a wonderful foundation for your meals - think colorful vegetables, lean proteins, fruits, nuts, and whole grains. While this is a great starting point, everyone's nutritional needs are unique! A nutritionist can work with you to create a personalized eating plan that fits your lifestyle and health goals. It's also a good idea to check in with your primary care physician for blood work, including a lipid panel, to help monitor your overall health and ensure your nutritional choices are supporting your well-being.", "a": "", "cat": "RN"}, {"n": "RN infor to share for TRT patient's: Info After Treatment", "c": "Our providers prescribe TRT cream and TRT injections. We created these videos going over their usage:\nhttps://fountaintrt.wistia.com/medias/x1zsw1mu2i\n\u200bhttps://fountaintrt.wistia.com/medias/uqystijfwc\nIf prescribed, our team reaches out 6 weeks later to schedule labs. Patients then meet with a provider to review the labs and make any needed changes. The next set of labs would be 2-3 months later. Once an effective and safe dose is dialed in, labs are drawn every 5-6 months.\nDosing is customized to your unique needs as a patient.", "a": "", "cat": "RN"}, {"n": "RN- TRT trouble with vial", "c": "Hi there, here are some tips tht can help with the injections.\n-When withdrawing medication, inject air equal to your planned dose. This balances pressure\u2014skipping this step could prevent future withdrawals.\n-If the solution is thick, warm the vial in your hands or under warm water before use. Always clean with alcohol after warming.\n-When inverting the vial, keep the needle tip submerged in the medication.", "a": "", "cat": "TRT"}, {"n": "Rachel Recore", "c": "- Rachel Recore, NP", "a": "", "cat": "General"}, {"n": "Reason for subscription length(Rather than 1 month, 3 month, and annual )", "c": "Our program is organized in 4-week cycles because this timing works best with the way our clinical and scheduling systems are set up. The 4-week, 12-week, and 48-week plans all follow this same structure. Using 4-week intervals helps maintain consistent follow-ups, billing, and treatment check-ins.", "a": "", "cat": "General"}, {"n": "Reason to Not Apply HRT Cream to Inner Thigh", "c": "Application to the inner thighs is not recommended as the area varies in the amount of subcutaneous tissue. Subcutaneous tissue does not allow the medication to absorb properly or at a consistent rate. ", "a": "", "cat": "HRT"}, {"n": "Reason why sublingual SL progesterone may work better than oral capsule for some patient's HRT (RN) Part 1", "c": "Some patient's notice that taking progesterone capsules by mouth makes them feel sleepy or drowsy, while using it under the tongue does not cause as much drowsiness. Sublingual progesterone causes less drowsiness than oral capsules because it avoids the first big pass through the liver, so fewer of the byproducts that cause sleepiness are made right away. This makes sublingual progesterone a good option for people who want the benefits of progesterone without feeling as tired during the day. ", "a": "", "cat": "HRT"}, {"n": "Reason why sublingual SL progesterone may work better than oral capsule for some patient's HRT (RN) Part 2", "c": "Reasons why this happens:\n\u2022 When progesterone is swallowed as a capsule, it goes through the stomach and is absorbed into the bloodstream through the gut. Before it reaches the rest of the body, it passes through the liver. The liver changes much of the progesterone into other substances called metabolites. Some of these metabolites, especially one called allopregnanolone, can make people feel sleepy or dizzy because they act on the brain in a way similar to certain calming medications.\n\u2022 When progesterone is taken under the tongue (sublingual), it is absorbed directly into the bloodstream through the tissues in the mouth. This means it mostly skips the liver at first, so less of it is turned into those sleepiness-causing metabolites right away. As a result, people are less likely to feel drowsy or dizzy with sublingual progesterone compared to the oral capsule form. ", "a": "", "cat": "HRT"}, {"n": "Refills: Paused", "c": "Hello from Fountain!\nI understand you have extra medication that will last you until [insert date]. To ensure you continue receiving regular labs, monitoring, support, and consultations, your plan will remain active. However, we can have our partner pharmacy hold your medication shipments until you\u2019re ready for more.\nSince your shipments are paused, your prescription will expire when you are next due for a refill. Please reach out when you have about two weeks of medication left so we can unpause your shipments. If you are on testosterone, you\u2019ll also need to complete a new video visit so a provider can write a new prescription. This lead time helps make sure you don\u2019t run out of medication.\nWe have manually paused your current medications, so no refills will be sent while your account is on pause. Please note that pausing your medication refills does not pause your subscription, as the plan includes bundled services such as follow-up visits and routine monitoring labs in most states.\nIf you have any questions or are ready to resume shipments, just let us know \u2014 we\u2019re happy to help!\n\u200b", "a": "", "cat": "General"}, {"n": "Refunds:  Refund another card after the refund has been applied", "c": "Got it, thanks for letting us know. We already processed the refund to the card on file ending with: We cannot transfer that refund to another payment method ourselves. That being said, our payment processor sent you a receipt confirming the refund. You should be able to call your bank with the information provided and they should be able to process the refund to another card/account. If you need additional information, we can contact our payment processor.", "a": "", "cat": "General"}, {"n": "Refunds: Assessment Fee", "c": "No problem. We'll refund your assessment fee. You should receive a receipt from our payment processor, Stripe within the next 24 hours. If you don't receive it within 24 hours, please let us know. Please note  it may take a few days for the refund to be processed by your bank.  Wishing you the best.", "a": "", "cat": "General"}, {"n": "Refunds: Assessment Fee - Not Moving Forward", "c": "We can refund the assessment cost if you choose not to proceed after the visit. Please note that this only applies to the assessment fee you paid\u2014not the fees for expanded labs or Getlabs (if you chose those options).", "a": "", "cat": "General"}, {"n": "Refunds: Expanded Labs", "c": "Since you haven't gone in for the test yet, we can refund the charge for the expanded panel. You should receive an email from our payment processor, stripe, confirming the refund. Just so you know, we'll need to ask our medical team to submit a new order for the standard lab panel for you. We'll let you know when it's been submitted and provide you with the lab order ID.", "a": "", "cat": "Labs"}, {"n": "Refunds: How much notice do you need if I want to cancel?", "c": "You would simply need to let us know before your next charge is run. We can process a refund if your card is charged, but no order has gone out. If the order has been processed, we would be unable to process a refund.", "a": "", "cat": "Cancellation"}, {"n": "Refunds: How to Cancel", "c": "You can cancel at any time by texting us before your next billing cycle. There is no contract. You would just need to text before your next charge is run.", "a": "", "cat": "Cancellation"}, {"n": "Refunds: Patient left VM to refund assessment fee", "c": "Hello from Fountain! Thanks for calling us. \n\u200b\n We received your voicemail indicating that you would like a refund, and do not want to move forward. We're happy to call you back if you'd like - but we'll immediately refund your assessment fee. Please note it may take a few days for the refund to be processed by your bank. ", "a": "", "cat": "General"}, {"n": "Refunds: Patients who have extra meds", "c": "We just adjusted your charge date. Please note that we processed the refund for the charge that was run earlier. Please note the refund will take between 3-5 business days to process. Have a great day.", "a": "", "cat": "General"}, {"n": "Refunds: Refund Codes", "c": "Hi - we contacted our payment processor, and they provided us with the following information:\nIf you still need additional information, please don't hesitate to reach out. Have a great day.", "a": "", "cat": "General"}, {"n": "Refunds: Refund to another card", "c": "We ran the charge successfully on your new card, and processed the refund on your old card. Please note the refund typically takes 3-5 business days to go through. Hope you have a great day.", "a": "", "cat": "General"}, {"n": "Refunds: Refunding patient for extra syringes/medication", "c": "Thanks for sending that over. We'll process a refund equal to the amount charged right now. Please note it may take between 3-5 business days for the refund to go through.", "a": "", "cat": "General"}, {"n": "Refunds: Refunding to another card", "c": "We can process the payment on another card, and refund the charge on the original card. Please note that we'll need to run the charge on the new card before processing the refund on the original payment method. Please let us know if that works for you.", "a": "", "cat": "General"}, {"n": "Refunds: Terms for Longer Term Plans", "c": "If you are on a longer-term plan with us you would be refunded the remainder of the subscription. For instance, if you were on a 12-week plan and canceled 10 weeks into the plan we would process a refund equivalent to two weeks.", "a": "", "cat": "General"}, {"n": "Registration Requirements", "c": "Hello! At this time, our system requires the following for you to register:\n\n1. You need an active US-based phone number that can receive texts. \n2. An active email. \n3. A valid debit/credit card for paying the evaluation fee. \n4. You should be located in a state where we are currently operating. \n\nPlease let us know if you have any questions. \n\n\n\n", "a": "", "cat": "General"}, {"n": "Reorder Line HRT (RN)", "c": "Hi there, thank you for reaching out. You may disregard the reorder line, as this does not apply to our HRT patients. The reorder line indicates you have 10ml of cream remaining. At your current dose of one click(0.25ml daily) this should last you approximately 40 days. Your testosterone cream refill is set to begin processing around *ENTER REFILL DUE DATE*. ", "a": "", "cat": "HRT"}, {"n": "Response if a TRT patient is disqualified from assessment due to age (76 or greater)", "c": "Hi there, it seems our system has identified you are not eligible for treatment on our platform due to age restrictions set for patient safety. For our TRT program we currently do not accept patient's 76 years or greater. We recommend these patient's seek care via an in person platform.  ", "a": "", "cat": "TRT"}, {"n": "Restart Treatment Labs", "c": "We're so glad to hear you're ready to resume treatment! Since your last labs were done a while ago, we\u2019ll need to have you complete updated labwork and a quick consultation before restarting your plan.\nYou can schedule your lab visit using the link below:\n\n\nOnce we receive your results, we\u2019ll send over a link to book your consultation.\nLet us know if you have any questions \u2014 we're here to help!", "a": "", "cat": "Labs"}, {"n": "Restart Treatment VV", "c": "We're so glad to hear you're ready to resume treatment! You'll need to schedule a quick call with our medical team so we can resume your plan. Here's the link: \n\n\nLet us know if you have any questions \u2014 we're here to help!", "a": "", "cat": "General"}, {"n": "Restart: TRT, HCG, Enclomphine  (has labs done within the last 6 months)", "c": "Glad to hear you'd like to restart your subscription! We'll let your provider know.", "a": "", "cat": "TRT"}, {"n": "Restart: Tadalafil, Anastrozole, or Sildenafil", "c": "We have reinstated your subscription. Please be aware that the provider will need to issue a new prescription before the order can be processed, so there may be a short delay. We will send you the tracking information once the order has been dispatched. Have a great day", "a": "", "cat": "General"}, {"n": "SD", "c": "Sarah DuHaime, RN", "a": "", "cat": "General"}, {"n": "Sarah Schwartz", "c": "Sarah Schwartz, Medical Assistant", "a": "", "cat": "General"}, {"n": "Sending new TRT patient scripts to a local pharmacy", "c": "We can get this set up for you if you're ready. As mentioned, the subscription price remains the same if the prescription is submitted to a local pharmacy. Please confirm that you're okay with us running your subscription charge.", "a": "", "cat": "TRT"}, {"n": "Sharing lab results via OHMD", "c": "Akute does not currently have a web portal available for patients. To access the portal you would need to download the app.\nIf you're unable to do so we can still share your lab results with you securely via text. Due to the way our backend is configured it will come from a different number. Does that work for you?", "a": "", "cat": "Labs"}, {"n": "Shift Supervisor - Itemized Receipts", "c": "Hi there, thanks for your patience. We sent the itemized receipt to the current email on file. Please feel free to text us here if you have any issues accessing the document or if you need help with anything else. Please do not respond to the email (the inbox is not actively monitored.)  Have a great day!", "a": "", "cat": "General"}, {"n": "Shift Supervisor - emailing lab results/visit notes", "c": "Hi there, thanks for your patience. We just emailed the requested records to the current email on file. If you have any issues opening the document please text us here. Please do not respond to the email - the inbox is not actively monitored. Hope you have a great day. \n\u200b", "a": "", "cat": "Labs"}, {"n": "Shift Supervisor Intro", "c": "Hi there, I am one of our Shift Supervisors here at Fountain. We wanted to reach out to you regarding  ", "a": "", "cat": "General"}, {"n": "Shift Supervisor cancellation inquiry due to inactivity", "c": "We\u2019ve made a few attempts to reach you to schedule your required compliance video visit so we can move forward with your treatment.\nSince there hasn\u2019t been any recent activity on your account, we plan to process a cancellation of your subscription in 24 hours if we don\u2019t hear back from you.\nIf you\u2019d like to continue with your subscription, please just reply here and we\u2019ll be happy to assist you with the next steps. We look forward to hearing from you.", "a": "", "cat": "Cancellation"}, {"n": "Shift Supervisor response to patient that states \"Yes\" for transition to tirzepatide subcutaneous from Semaglutide subcutaneous", "c": "Ok great, thank you for confirming. Your next shipment will arrive at the same time as your usual shipment. Here\u2019s an overview:\n1) It\u2019s the same once-weekly injection.\n2) You can finish your current medication vial. Your next shipment will include tirzepatide.\n3) Safety considerations are the same as semaglutide. Many patients also find tirzepatide as or more tolerable with less nausea.\n4) Dosing for tirzepatide is different from semaglutide so make sure to pay careful attention to the instructions for how much medication to draw up and inject.", "a": "", "cat": "General"}, {"n": "Shift Supervisor- Emailing Lab Order", "c": "Hi there, thanks for your patience. We just emailed the requested lab order to the current email on file. If you have any issues opening the document please text us here. Please do not respond to the email - the inbox is not actively monitored. Hope you have a great day. ", "a": "", "cat": "Labs"}, {"n": "Shift Supervisor: Response to successful payment after failed payments", "c": "Hi {{first_name}}, Thank you for reaching out!\n\nWhen a payment is made after the original invoice date due to a failed charge, the subscription billing schedule continues to follow the original invoice date.\n\nAt this time, we\u2019re unable to adjust the billing date once the subscription schedule has been set. If you prefer not to continue with the subscription moving forward, you are always able to cancel prior to the next billing date.\n\nPlease let me know if you would like me to review your account or help with anything else.", "a": "", "cat": "General"}, {"n": "Shipped: No labs/visit", "c": "I understand your concerns. Depending on your prescription and billing plan, the date of shipment may not directly correspond to your next lab visit date. If there are dosage changes, those can be accounted for after your next visit with our medical team. Please let us know if there's anything else we can help with.\n\n", "a": "", "cat": "Labs"}, {"n": "Shipping Information", "c": "Orders typically ship within a week. Once your order ships, we will text you a tracking link. Please let us know if you have any questions.", "a": "", "cat": "Shipping"}, {"n": "Shipping delays - internal miscommunication", "c": "I checked with the team and it appears this order was delayed due to internal miscommunication. This issue has been addressed, and we're working on getting your order out as soon as possible. Thanks for your patience.", "a": "", "cat": "Shipping"}
