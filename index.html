 well. Just checking in to see if you are ready to start your weight loss plan.\n\nIf you start your membership today, we can arrange the necessary lab tests for you and we fully cover the cost. Lab results typically only take 24 hours and then a prescription can be delivered to you. If you have any questions, please let us know.", "a": "", "cat": "GLP"}, {"n": "GLP Follow-up: Check-in (No labs)", "c": "Hey,\n\nHope you're doing well. Just checking in to see if you are ready to start your weight loss plan.\n\nOnce we set up your membership, our medical team will send your prescription to the pharmacy and it is approximately 7 days until you receive your medication. If you have any questions, please let us know.", "a": "", "cat": "GLP"}, {"n": "GLP Forms: Great but Exercise", "c": "Hello, thank you for submitting your update form! We are happy to hear that you are not experiencing any side effects. Here is a link to some exercise motivation. Please feel free to reach out to us here if you have any questions or concerns. We are here to support you! If you would like to schedule a personalized weight loss consultation to further discuss lifestyle changes and tips for achieving your weight loss goals, you can use this link:xxx", "a": "", "cat": "GLP"}, {"n": "GLP Forms: Great but Nutrition", "c": "Hi there, thank you for submitting your update form! We are happy to hear that you are not experiencing any side effects. Here is a link to some nutrition motivation. Please feel free to reach out to us here if you have any questions or concerns. We are here to support you! If you have any questions or concerns, please reach out. ", "a": "", "cat": "GLP"}, {"n": "GLP Forms: Great but Sleep", "c": "Hi there, thank you for sending your update form! We are glad to hear that you are not having any side effects. Here is a link with some Sleep strategy. Please text us right here if you have any questions or concerns. We are rooting for you! If you have any questions or concerns, please reach out. ", "a": "", "cat": "GLP"}, {"n": "GLP Forms: Great but Stress", "c": "Hi there, thank you for sending your update form! We are glad to hear that you are not having any side effects. Here is a link with some Stress management strategy. Please text us right here if you have any questions or concerns. We are rooting for you! If you have any questions or concerns, please reach out. ", "a": "", "cat": "GLP"}, {"n": "GLP Forms: Great in all categories", "c": "Hi there, thank you for sending your update form! We are glad to hear that you are not having any side effects. Please text us right here if you have any questions or concerns. We are rooting for you!", "a": "", "cat": "GLP"}, {"n": "GLP Forms: Ok/Not Great in Nutrition", "c": "Hi there, thank you for sending your update form! We want to help you turn your \"Ok\" Nutrition plan into a \"GREAT!\" Nutrition plan. Here are some links related to nutrition and exercise to help assist with your weight loss progress: ", "a": "", "cat": "GLP"}, {"n": "GLP Forms: Ok/Not Great in Sleep", "c": "Hi there, thank you for sending your update form! We want to help you turn your \"Ok\" Sleep into \"GREAT!\" Sleep. Here is a link to review to help assist with your sleep pattents: ", "a": "", "cat": "GLP"}, {"n": "GLP Forms: Ok/Not Great in Stress", "c": "Hi there, thank you for sending your update form! We want to help you turn your \"Ok\" Stress management into \"GREAT!\" Stress management. Here is a link to review discussing stress reduction techniques: ", "a": "", "cat": "GLP"}, {"n": "GLP Forms: Ok/Not Great in more than one area", "c": "Hi there, thank you for sending your update form! We want to help you turn your \"Ok\" answers into \"GREAT!\" answers. Please use this link to make an appointment for your Personalized Weight Loss Call; this visit is included with our program. We will help you refine your current plan for the best of success! We look forward to seeing you soon!\nxxx", "a": "", "cat": "GLP"}, {"n": "GLP General: Articles", "c": "Our medical team is excited to share informative health articles with you. These articles cover various topics related to your well-being, providing insights and tips to support your health journey. Feel free to explore them at your convenience. Stay tuned for regular updates and valuable resources!", "a": "", "cat": "GLP"}, {"n": "GLP General: Insurance", "c": "FountainGLP does not accept insurance. Unfortunately, insurance companies are notorious for making it hard or impossible for many to access GLP-1 medications. And without insurance, brand-name medications can cost thousands of dollars. On top of that, we wouldn\u2019t be able to offer an all-inclusive model if we were to accept insurance.", "a": "", "cat": "GLP"}, {"n": "GLP Interest", "c": " Glad to hear you're interested in our GLP-1 weight loss program! To get started, please fill out this form:\nhttps://fountaintrt.akutehealth.com/forms/65a6821cc901723e0ee6baa5\n\u200b\nOnce that's done, our medical team will review the form and we'll give you an update within 24 hours.", "a": "", "cat": "GLP"}, {"n": "GLP Labs:  Need Lipids only", "c": "Hi there, I have reviewed the labs that you submitted to FountainGLP. For your Evaluation, you'll need a lipid panel completed within the past 12 months. A lipid panel lab test has been ordered, and our CS team will be in contact to schedule!", "a": "", "cat": "GLP"}, {"n": "GLP Labs: Jason Health Appointment", "c": "We booked your lab visit for a quick blood draw! There is no need to fast for these labs.\nHere are your appointment details: \n(Lab Address)\n(Appt Date and time)\nYour lab order PDF was just forwarded to your email. If possible, please print this out and bring it with you to your appointment.\nAfter your test, your results should be available within 24-48 hours!", "a": "", "cat": "GLP"}, {"n": "GLP Labs: Name on labs is wrong", "c": "Hi there, I have reviewed the labs that you submitted to FountainGLP. The name on the tests does not match the name that we are seeing in your communication; could you please confirm your full name and date of birth? Thank you!", "a": "", "cat": "GLP"}, {"n": "GLP Labs: Need CMP only", "c": "Hi there, I have reviewed the labs that you submitted to FountainGLP. For your Evaluation, you'll need a CMP (complete metabolic panel) completed within the past 12 months. A CMP lab test has been ordered, and our CS team will be in contact to schedule!", "a": "", "cat": "GLP"}, {"n": "GLP Labs: Need CMP, HgA1c only", "c": "Hi there, I have reviewed the labs that you submitted to FountainGLP. For your Evaluation, you'll need a CMP (complete metabolic panel) and HgA1c, completed within the past 12 months. I have ordered both lab tests, and our CS team will be in contact to schedule!", "a": "", "cat": "GLP"}, {"n": "GLP Labs: Need CMP, HgA1c, Lipids only", "c": "Hi there, I have reviewed the labs that you submitted to FountainGLP. For your Evaluation, you'll need a CMP (complete metabolic panel), lipid panel and HgA1c, completed within the past 12 months. These lab tests have been ordered, and our CS team will be in contact to schedule!", "a": "", "cat": "GLP"}, {"n": "GLP Labs: Need CMP, Lipids only", "c": "Hi there, I have reviewed the labs that you submitted to FountainGLP. For your Evaluation, you'll need a CMP (complete metabolic panel) and lipids, completed within the past 12 months. These lab tests have been ordered, and our CS team will be in contact to schedule!", "a": "", "cat": "GLP"}, {"n": "GLP Labs: Need CMP, TSH only", "c": "Hi there, I have reviewed the labs that you submitted to FountainGLP. For your Evaluation, you'll need a CMP (complete metabolic panel) and TSH, completed within the past 12 months. These lab tests have been ordered, and our CS team will be in contact to schedule!", "a": "", "cat": "GLP"}, {"n": "GLP Labs: Need CMP, TSH, HgA1c only", "c": "Hi there, I have reviewed the labs that you submitted to FountainGLP. For your Evaluation, you'll need a CMP (complete metabolic panel), TSH and HgA1c, completed within the past 12 months. I have ordered these tests, and our CS team will be in contact to schedule!", "a": "", "cat": "GLP"}, {"n": "GLP Labs: Need CMP, TSH, Lipids only", "c": "Hi there, I have reviewed the labs that you submitted to FountainGLP. For your Evaluation, you'll need a CMP (complete metabolic panel), TSH and lipid panel, completed within the past 12 months. These lab tests have been ordered, and our CS team will be in contact to schedule!", "a": "", "cat": "GLP"}, {"n": "GLP Labs: Need HgA1c only", "c": "Hi there, I have reviewed the labs that you submitted to FountainGLP. For your Evaluation, you'll need an HgA1c completed within the past 12 months. A HgA1c lab test has been ordered, and our CS team will be in contact to schedule!", "a": "", "cat": "GLP"}, {"n": "GLP Labs: Need HgA1c, Lipids only", "c": "Hi there, I have reviewed the labs that you submitted to FountainGLP. For your Evaluation, you'll need an HgA1c and lipid panel completed within the past 12 months. These lab tests have been ordered, and our CS team will be in contact to schedule!", "a": "", "cat": "GLP"}, {"n": "GLP Labs: Need TSH only", "c": "Hi there, I have reviewed the labs that you submitted to FountainGLP. For your Evaluation, you'll need a TSH completed within the past 12 months. A TSH lab test has been ordered, and our CS team will be in contact to schedule!", "a": "", "cat": "GLP"}, {"n": "GLP Labs: Need TSH, HgA1c only", "c": "Hi there, I have reviewed the labs that you submitted to FountainGLP. For your Evaluation, you'll need a TSH and HgA1c completed within the past 12 months. These lab tests have been ordered, and our CS team will be in contact to schedule!", "a": "", "cat": "GLP"}, {"n": "GLP Labs: Need TSH, HgA1c, Lipids only", "c": "Hi there, I have reviewed the labs that you submitted to FountainGLP. For your Evaluation, you'll need a TSH, HgA1c, lipid panel completed within the past 12 months. These lab tests have been ordered, and our CS team will be in contact to schedule!", "a": "", "cat": "GLP"}, {"n": "GLP Labs: Need all labs", "c": "Hi there, I have reviewed the labs that you submitted to FountainGLP. For your Evaluation, you'll need a CMP (complete metabolic panel), lipid panel, TSH and a HgA1c. These lab tests have been ordered, and our CS team will be in contact to schedule!", "a": "", "cat": "GLP"}, {"n": "GLP Labs: Need all labs because labs are > 12 months", "c": "Hi there, I have reviewed the labs that you submitted to FountainGLP, and see that all of the tests were completed prior to 1 year ago. For your Evaluation, you'll need an updated set of labs. These lab tests have been ordered, and our CS team will be in contact to schedule!", "a": "", "cat": "GLP"}, {"n": "GLP Labs: No date on labs", "c": "Hi there, I have reviewed the labs that you submitted to FountainGLP, and am not able to see the date that the labs were drawn. Please resubmit the labs, with the date, and if you have trouble please let us know.", "a": "", "cat": "GLP"}, {"n": "GLP Labs: Received labs/documentation from established patients", "c": "We have received your results from Labcorp. Our medical team will review them and follow up with you shortly.", "a": "", "cat": "GLP"}, {"n": "GLP MA: Has not sent an update form in few weeks", "c": "Hello! We have not received your update form in a few weeks, and are checking in to see how you are doing. If you are having any side effects, please let us know right away. Here is a link to the update form: https://fountaintrt.akutehealth.com/forms/64fae2a020b6430c2197295d", "a": "", "cat": "GLP"}, {"n": "GLP MA: No form in 2-3+ months", "c": "We hope you're doing well on your weight loss journey. We have not received an update from you recently. Completing the update is important for tracking and monitoring your progress. We're here to help you every step of the way!\n\nTo make things easy, we've included a link for you to complete the update: https://fountaintrt.akutehealth.com/forms/64fae2a020b6430c2197295d\n\nPlease complete this prior to your next scheduled refill for the providers to review. If you have any questions or concerns, please don't hesitate to reach out to us. Our customer support team is available 24/7 and we're always happy to help. Have a fantastic day!", "a": "", "cat": "GLP"}, {"n": "GLP MA: Reported \"Yes\" to side effects, did not list side effects", "c": "Hi there! Thank you for submitting your update form. We see you reported \"yes\" to having side effects, but did not list which side effects you are having. Can you please confirm if you are having active side effects, and if so, which side effects? Thank you!", "a": "", "cat": "GLP"}, {"n": "GLP MA: Update Form", "c": "[ ] Side effects \n[ ] Dose clarification \n[ ] Injection questions \n[ ] Other- please explain (example- needs early refill) ", "a": "", "cat": "GLP"}, {"n": "GLP MA: Weight Clarification", "c": "Hi there, thank you for submitting your update form. Can you please confirm your current weight? We want to make sure we have the correct weight reported for you?", "a": "", "cat": "GLP"}, {"n": "GLP MED: Injection Video", "c": "Hi there, we understand you have some questions regarding how to perform the injections. This video link goes over in detail how to do the injections. https://fountaintrt.wistia.com/medias/4gw9o1yjkz \n\nIf you have any further questions, you may reach out to us or you can schedule a follow up phone call using this link: xxx\n\u200b", "a": "", "cat": "GLP"}, {"n": "GLP MED: Injections Timing", "c": "Hi there,\nWe understand you have questions about when to administer your injections. You can perform the injections at any time of day; however, we recommend doing so after a meal. If you experience any side effects, you might find it helpful to adjust the timing\u2014many patients tolerate the injections better in the evening after dinner.\nPlease let us know if you have any questions or concerns.", "a": "", "cat": "GLP"}, {"n": "GLP Missing Labs", "c": "Hi! We\u2019re happy to help you get your labs scheduled, free of charge. This will be a quick test at a convenient location.\nWhat days and times work best for you this week?", "a": "", "cat": "GLP"}, {"n": "GLP NY/NJ: Different State", "c": "Sounds great! We\u2019ll schedule at the nearest possible location.\nWhat days and times work best for you this week?", "a": "", "cat": "GLP"}, {"n": "GLP Next Refill", "c": "Hi,\nOur medical team is scheduled to send your prescription refill to our pharmacy on (date) and it should arrive in approximately 7 days.", "a": "", "cat": "GLP"}, {"n": "GLP Options", "c": "Hi there! We currently offer both injectable semaglutide and oral Fast SL semaglutide options. If you have any questions about these treatment options, please don\u2019t hesitate to reach out.", "a": "", "cat": "GLP"}, {"n": "GLP Pricing", "c": "We offer the following GLP plans: \n\u200b\nTirzepatide(Subcutaneous Injections) billed at $399 every 4 weeks\nTirzepatide (Subcutaneous Injections) billed at $950 every 12 weeks\nTirzepatide (Subcutaneous Injections)billed at $1800 every 24 weeks\n\u200b\nSublingual Semaglutide billed at $749 every 12 weeks ($250/mo)", "a": "", "cat": "GLP"}, {"n": "GLP RN: Antibiotic use with GLP1", "c": "Hi there, we will confirm with the providers if it is recommend to continue on your xxx medication or if they recommend to hold it while you are on the antibiotic. We will be in contact with you soon with a response. Thank you!", "a": "", "cat": "GLP"}, {"n": "GLP RN: Bruising at the injection site", "c": "Bruising may occur at the injection site. To prevent this, we recommend rotating the injection site every week. Also, please ensure you are injecting two inches about from the belly button to the left or to the right. For the bruising, try applying heat or ice to the area, be sure to have a barrier between your skin and the heat or ice such as a cloth or towel. We suggest avoiding tight clothing for a few days. In most cases, the bruising should subside within a couple of days. If you have any additional questions or concerns, please don't hesitate to reach out to us. We are here to help!", "a": "", "cat": "GLP"}, {"n": "GLP RN: Clarification of weight", "c": "Hi there, thank you for submitting your update form. Can you please confirm your current weight? We want to make sure we have the correct weight reported for you?", "a": "", "cat": "GLP"}, {"n": "GLP RN: Concerns for fasting and restricting calories", "c": "Calorie restriction and skipping meals is not recommended as it can lower your metabolic rate. Your body therefore adapts by burning fewer calories to conserve energy. For optimal health and sustainable weight loss, focus on eating a balanced diet of nutritious foods rather than calorie restriction and timing limitations.", "a": "", "cat": "GLP"}, {"n": "GLP RN: Constipation", "c": "Hi there, we understand you're experiencing constipation while taking your semaglutide/tirzepatide medication. Please be sure to increase your water intake throughout the day including 1-2L of water and add more fiber to your diet by eating more fruits and vegetables. \n\nThese steps can help improve your bowel movements. If you continue to have concerns about constipation, please schedule a follow-up visit with a provider using this link: \n\nIf you have any questions, don't hesitate to reach out. \n", "a": "", "cat": "GLP"}, {"n": "GLP RN: Drug-drug-interactions", "c": "Hello, we understand you have concerns about your being on semaglutide and possible interactions with xxx. We will have the provider reach out to you to further discuss if there are any potential drug-drug interactions with your semaglutide and xxx.", "a": "", "cat": "GLP"}, {"n": "GLP RN: ETOH use while on GLP1", "c": "Hi there, we recommend avoiding alcohol while taking a GLP-1 medication. Alcohol can halt your weight loss progress and may cause low blood sugar (hypoglycemia) or worsen gastrointestinal side effects like nausea, vomiting, or diarrhea. If you have any further questions, please let us know. Thanks!", "a": "", "cat": "GLP"}, {"n": "GLP RN: Fatigue", "c": "Hi there, we understand that you are experiencing fatigue symptoms on the medication. Can you tell me a little more about your symptoms. Is this all the time or only a couple days after your injections? Has this be on-going since you starting on the medication or have you had this prior to starting on the medication? Are to experiencing any other associated symptoms like headaches or dizziness? Thank you!", "a": "", "cat": "GLP"}, {"n": "GLP RN: Fiber sources for when a patient reports constipation", "c": "Hi there, we see you reported you are having constipation. We would like to get you scheduled for a follow up visit to further discuss your side effects. You may use this link to schedule a follow up phone visit: xxx . In the meantime, you may want to try increasing your fiber intake through fruits and vegetables such as raspberries, apples, pears, berries, oranges, broccoli, carrots and sweet potatoes.", "a": "", "cat": "GLP"}, {"n": "GLP RN: GERD/GAS/ACID Reflux", "c": "Hi there, we understand that you are experiencing GERD/GAS symptoms. To help manage your symptoms while on semaglutide/tirzepatide, please follow these dietary guidelines: \n\n\u2022 Avoid fried, fatty, and greasy foods \n\u2022 Limit processed foods (canned, boxed, or bagged) \n\u2022 Stay well hydrated by drinking plenty of water \n\u2022 Increase your fiber intake \n\u2022 Remain upright for 45-60 minutes after eating \n\nThese recommendations can help reduce GERD symptoms and improve your overall comfort while on medication. \n\nIf you have any questions or concerns, please don't hesitate to contact our office.", "a": "", "cat": "GLP"}, {"n": "GLP RN: GLP review", "c": "We are so happy to hear you are having great results! If you're open to leaving our brand new program a review, we would really appreciate your support. You can post it anonymously on this website here:https://www.trustpilot.com/review/fountainglp.com. If you have any questions about your plan, please don't hesitate to reach out. We're cheering for you!!", "a": "", "cat": "GLP"}, {"n": "GLP RN: If more than 2 doses missed", "c": "Hi there, if more than 2 doses have been missed, you will need to schedule with a provider to discuss your next dose and dosing schedule. You may use this link to schedule a phone call with a provider: xxx", "a": "", "cat": "GLP"}, {"n": "GLP RN: Memberships", "c": "Our Memberships are all inclusive providing 24/7 customer service support, any future visits you may need with a nurse or provider, update forms that help to monitor your progress throughout the program and your medications being shipped directly to you via FedEx.", "a": "", "cat": "GLP"}, {"n": "GLP RN: Missed dose, less than 48 hours before next dose", "c": "Hi there, if you missed your dose and your next scheduled dose is in less than 48 hours, please wait until your next scheduled dose and resume your injections as scheduled. Please let us know if any questions about this.", "a": "", "cat": "GLP"}, {"n": "GLP RN: Missed dose, more than 48 hours before next dose", "c": "Hi there, if you missed your dose and there is more than 48 hours before the next scheduled dose, you may go ahead and take your missed dose and that day will becomes the new day of the week for dosing. Please let us know if you have any questions about this.", "a": "", "cat": "GLP"}, {"n": "GLP RN: N/V", "c": "Hi there, I understand that you are having nausea and vomiting. I would like to give you a call to further discuss your symptoms. Is now a good time to call? If now is not a good time, please use this link to schedule a phone call: Please note, if you are experiencing uncontrolled vomiting or acute abdominal pain, we recommend for you to go to the emergency department for an evaluation.", "a": "", "cat": "GLP"}, {"n": "GLP RN: Nausea w/o vomiting", "c": "Hi there, we understand that you are having nausea. Is this constant or does this come and go? Have you had any vomiting or abdominal pain? To help with the nausea, we recommend to avoid fried, fatty or greasy foods. Try to stay well hydrated with water (1-2L) per day. You may want to try changing the time of day you are performing the injection and be sure not to inject on an empty stomach. Also, some patients find that if they change their injection site, this can help with G.I. symptoms, such as nausea. Another injection site you can try is the upper outer thigh. Please let us know if you have any further questions or if you would like to schedule a follow up visit, you may use this link:", "a": "", "cat": "GLP"}, {"n": "GLP RN: Next scheduled dose", "c": "Hi there, your next scheduled dose is xxx as long as you are having no side effects and losing no more than 1.5 lbs per week. This will be confirmed by the prescribing provider at the time of your refill", "a": "", "cat": "GLP"}, {"n": "GLP RN: Not losing any weight", "c": "Hi there! We understand that you are concerned about your weight loss progress. I would like to get you scheduled for a personalized visit to further discuss your concerns and provide you with lifestyle recommendations that can help with your weight loss journey. You may use this link to get scheduled: xxx", "a": "", "cat": "GLP"}, {"n": "GLP RN: PCP appointments/clearance", "c": "Thank you for updating us on your upcoming appointment with your [Provider]. We will need to wait until you have been seen by this provider to obtain clearance/documentation to confirm if we can move forward with GLP-1 as requested during your initial evaluation. While we understand this can be time-consuming, we want to ensure you are safe to take these medications and there are no concerns regarding your starting on GLP-1 medications. Please let us know if you have any further questions or concerns.", "a": "", "cat": "GLP"}, {"n": "GLP RN: Patient having side effects    ,phonese", "c": "Hi there, I'd like to schedule a call with you to discuss your side effects and make sure you're ok.\n\nYou can use this link to schedule a quick phone call: XXX", "a": "", "cat": "GLP"}, {"n": "GLP RN: Patient increased the dose on their own", "c": "Hi there, your prescribed dose is xxx. Please stay on this dose as recommended by your provider. It is not recommended to increase the dose at faster intervals as this can lead to an increase in significant side effects/symptoms. If you have questions regarding your dosing schedule, you may use this link to schedule a follow up call: xxx", "a": "", "cat": "GLP"}, {"n": "GLP RN: Patient reporting increased hunger, due for dose change; not on max dose", "c": "Hi there, we understand you are having increased hunger. Your next refill is due on xxx and the providers plan is to increase the dose as long as you are not having side effects and losing no more than 1.5lbs per week. Once the dose is increased this should help with your appetite concerns. Please let us know if you have any further questions or concerns. Have a great day!", "a": "", "cat": "GLP"}, {"n": "GLP RN: Patient sick with flu, covid/ stomach virus", "c": "Hi there, it is recommend by the providers to hold your current injection until you are feeling better. Please stay well hydrated with water and try to eat bland foods. Once you are feeling better with no fevers you may resume your injection and that will be your new injection day. If uou miss more than 2 injections, please reach out so the providers can discuss if a possible adjustment is needed. Thank you and feel better soon!", "a": "", "cat": "GLP"}, {"n": "GLP RN: Patient still reporting hunger/increased appetite- on starting dose or 0.5mg", "c": "Hi there, we understand that you are still having an increased appetite. It takes a total of 5 months to get to the optimal dose on the GLP 1 medications. As the dose increases over time, you should begin to notice a decrease in appetite and feeling full faster when eating. Please make sure you are drinking plenty of water and eating at least 3 meals per day. If you would like to further discuss nutrition tips you may schedule a follow up call using this link:", "a": "", "cat": "GLP"}, {"n": "GLP RN: Pregnancy/suspected pregnancy", "c": "Hi there! We see that you reported that you are currently pregnant. While we understand this can be an exciting time for you, we will have to get you scheduled ASAP with a provider to further discuss stopping your semaglutide medication. You may use this link to schedule a follow up phone visit with a provider:xxx", "a": "", "cat": "GLP"}, {"n": "GLP RN: Process for refills", "c": "Hi there, your prescription will be refilled automatically based on when you are due for a refill as long as you are not having side effects and losing no more than 1.5lbs per week. You will be notified once your prescription is sent to the pharmacy regarding the details of your prescription. Please let us know if you have any further questions or concerns. Have a great day!", "a": "", "cat": "GLP"}, {"n": "GLP RN: Running out of medication early", "c": "Hi there, thank you for reaching out to us. We understand you are requesting a refill. We have that your next scheduled refill is on xxx. Your most recent prescription was sent to the pharmacy on xxx for semaglutide xxx units once weekly. This was a xx weeks supply of medication. Can you please confirm how many units you are injecting once weekly? What day was your last injection?", "a": "", "cat": "GLP"}, {"n": "GLP RN: Starting in week 6, not losing weight according to the update form (comparing weight in vitals section) or has weight loss concerns", "c": "Hello! We're pleased to hear that you're not experiencing any side effects. We'd like to offer you a follow-up visit with a provider to monitor and discuss your weight loss progress since you started the program. You may use this link to schedule a follow-up visit for a phone call visit with a provider at your convenience:", "a": "", "cat": "GLP"}, {"n": "GLP RN: Surgery", "c": "The providers recommend discussing this with your surgeon and medical provider.According to most surgeons, it is advised to discontinue the medication 2-3 weeks before surgery because it can cause delayed gastric emptying and affects on anesthesia.", "a": "", "cat": "GLP"}, {"n": "GLP RN: The patient is requesting to change from one GLP to another", "c": "Hi there, I understand you would like to discuss possibly changing from your current medication to another GLP1 medication. Please use this link to schedule a follow up phone call with a provider to further discuss: xxx", "a": "", "cat": "GLP"}, {"n": "GLP RN: Tirzepatide dosing questions", "c": "Hi there, your next scheduled tirzepatide dose is xxx as long as you are having no side effects and losing no more than 1.5lbs per week. This will be confirmed by the prescribing provider at the time of your refill. We hope you have a great day!", "a": "", "cat": "GLP"}, {"n": "GLP RN: Traveling via plane", "c": "Hi there, When traveling with semaglutide including your syringes, this is allowed as long as there is a label. We recommend traveling with a cold pack kit, which can be purchased online via Amazon. You will want to make sure this is TSA approved. It is also recommended to check ahead of time with your hotel or where you will be staying to make sure there is a refrigerator.", "a": "", "cat": "GLP"}, {"n": "GLP RN: Weight loss expectations first 4 weeks", "c": "Hi there! We do not expect weight loss with the semaglutide 0.25mg dose; this dose is used to get your body used to the medication and make sure you are not having side effects. Please stay on this dose for 4 weeks as prescribed. Please let us know if you have any questions or concerns.", "a": "", "cat": "GLP"}, {"n": "GLP RN: What should I be eating, how much should I be exercising or any lifestyle questions", "c": "Hi there! I understand that you have some concerns regarding xxx. I would like to arrange a Personalized Weight Loss call to further discuss your concerns and answer any questions that you may have. You may use this link to schedule for a day and time that works for you:xxx \nHave a great day! \n", "a": "", "cat": "GLP"}, {"n": "GLP RN: When a patient inquires about sublingual semaglutide", "c": "Sublingual semaglutide is a fantastic alternative to the injectable form! By simply placing the medication under your tongue, it bypasses the usual metabolic process and goes straight into your system through the mucous membranes. This not only makes it easier for your body to process, but also eliminates the need for injections. If you have any additional questions, please don't hesitate to let us know. We're here to help!", "a": "", "cat": "GLP"}, {"n": "GLP RN: nausea reported on form or via message", "c": "Hi there, thank you completing your update form. I understand you are having nausea. Is this constant or does this come and go? Any associated vomiting?", "a": "", "cat": "GLP"}, {"n": "GLP RN: side effects ,se", "c": "I understand that you are having some medication side effects. I would like to call you to discuss. Is this a good time to call you? If not, please let us know when might be a good time. We, at Fountain GLP, are concerned and would like to talk with you as soon as possible. Thanks!", "a": "", "cat": "GLP"}, {"n": "GLP Registration Form", "c": "Glad to hear you're interested in our GLP-1 weight loss program! To get started please fill out this form:\nhttps://fountaintrt.akutehealth.com/forms/65a6821cc901723e0ee6baa5\n\u200b\nOnce that's done, our medical team will review the form and give you an update. \n\nPlease let us know if you have any questions.\n", "a": "", "cat": "GLP"}, {"n": "GLP Restart Treatment (Needs form)", "c": "We\u2019re happy to hear that you want to restart your membership. To proceed, please fill out this form: https://fountaintrt.akutehealth.com/forms/65a6821cc901723e0ee6baa5\n\u200b\nOnce that's done, our medical team will review the form and we'll give you an update within 24 hours.", "a": "", "cat": "GLP"}, {"n": "GLP Restart Treatment (No form)", "c": "We\u2019re happy to hear that you want to restart your membership. Could you please confirm which plan you prefer?\n\n6-MONTH PRO PLAN\n$1800 every 24 weeks\n3-MONTH STANDARD PLAN\n$950 every 12 weeks\n1-MONTH STARTER PLAN\n$399 every 4 weeks", "a": "", "cat": "GLP"}, {"n": "GLP Titration off treatment", "c": "If using the 12.5 mg/2.5 mL concentration:", "a": "", "cat": "GLP"}, {"n": "GLP TrustPilot Request", "c": "I'm very happy with your improvement. We'd greatly appreciate a review from you so people can hear about the experience from a patient. Here's the link: https://www.trustpilot.com/review/fountainglp.com You can post under a made-up name if you prefer. Thanks so much!  ", "a": "", "cat": "GLP"}, {"n": "GLP Visits: After second visit", "c": "Hi there, it was so nice speaking with you! You now have a personalized weight loss program in place to help you get the greatest results from your medication.\n\nIf you have any questions, please don't hesitate to reach out. We're cheering for you!!", "a": "", "cat": "GLP"}, {"n": "GLP Visits: Discuss results", "c": "Hi there, I have reviewed the labs that you submitted to FountainGLP, and I would like to call you to discuss them. Is this a good time to call you? \n\nIf not, you may use this link to schedule a call with a provider to discuss your labs: xxx Thanks!", "a": "", "cat": "GLP"}, {"n": "GLP Visits: Documentation reviewed", "c": "Thank you for submitting documentation from your medical evaluation, to FountainGLP. I have reviewed the documentation and we are ready to proceed to scheduling your appointment with one of our Fountain Providers. \nPlease use the following link to schedule your appointment: XXX", "a": "", "cat": "GLP"}, {"n": "GLP Visits: Labs reviewed", "c": "Hi there, I have reviewed the labs that you submitted to FountainGLP and we have everything that we need to proceed to scheduling your appointment! \n\nPlease use the following link to schedule: XXX", "a": "", "cat": "GLP"}, {"n": "GLP Visits: Labs reviewed, Abnormal labs", "c": "Hi there, I've reviewed your labs and before we can send your FountainGLP prescription, we need to discuss your results. \n\nPlease use the following link to schedule a quick phone call: XXX", "a": "", "cat": "GLP"}, {"n": "GLP Visits: Labs reviewed, Send RX", "c": "Hi there, I have reviewed your labs and everything looks good for us to send your prescription to the pharmacy. I will start processing this now and will notify you once it has been sent to the pharmacy. We recommend for you to follow with your primary care provider for lab management and recommendations. If you have any questions or would like to review your labs in detail you may schedule a phone call using this link: XXX", "a": "", "cat": "GLP"}, {"n": "GLP Visits: Loved second visit", "c": "Hi there, it was so nice speaking with you! I'm so thrilled for all the results you're about to receive with your medication and your new personalized weight loss plan!\n\nIf you're open to leaving our brand new program a review, we would really appreciate your support. You can post it anonymously on this website here: \n\nhttps://www.trustpilot.com/review/fountainglp.com\n\nIf you have any questions about your plan, please don't hesitate to reach out. We're cheering for you!!", "a": "", "cat": "GLP"}, {"n": "GLP Visits: No Show on Initial VV", "c": "I am sorry that we were not able to connect for your initial appointment with FountainGLP, today. Please use the following link to reschedule: XXX", "a": "", "cat": "GLP"}, {"n": "GLP Visits: No Show on Second VV", "c": "Hi there, It looks like we weren't able to connect for your appointment with FountainGLP today.\n\nThis meeting is not required but is important for getting the most out of your treatment!\n\nPlease use the following link to reschedule: XXX", "a": "", "cat": "GLP"}, {"n": "GLP Visits: Ready for phone visit", "c": "Hello from Fountain GLP! Are you ready for our scheduled phone call visit?", "a": "", "cat": "GLP"}, {"n": "GLP Visits: Ready for video visit", "c": "Hello from Fountain GLP! I would like to send you a link for our video visit. Are you ready for our video visit?", "a": "", "cat": "GLP"}, {"n": "GLP Visits: Side Effects", "c": "I understand that you are having some medication side effects. I would like to call you to discuss. Is this a good time to call you? If not, please let us know when might be a good time. We, at FountainGLP, are concerned and would like to talk with you as soon as possible. Thanks!", "a": "", "cat": "GLP"}, {"n": "GLP Visits: Side Effects F/U", "c": "Hi there, I'd like to schedule a call with you to discuss your side effects and make sure you're ok.\n\nYou can use this link to schedule a quick phone call: XXX", "a": "", "cat": "GLP"}, {"n": "GLP Visits: Spanish Patient", "c": "Hola, gracias por conectarse a la visita por video. He solicitado un int\u00e9rprete para que se una a la visita. Es posible que el v\u00eddeo se vuelva a cargar durante unos segundos mientras el int\u00e9rprete se une. \u00a1Mant\u00e9ngase conectado y comenzaremos con su visita en breve!", "a": "", "cat": "GLP"}, {"n": "GLP Visits: Video Required", "c": "For your initial visit, we highly recommend and prefer a video appointment. Video visits allow our medical team to conduct a thorough evaluation and provide the best possible care. In cases where this is not possible due to external circumstances, our providers can conduct the consultation via a phone call, but a video visit is highly recommended. Please ensure you\u2019re in a safe place and not driving during the call.", "a": "", "cat": "GLP"}, {"n": "GLP dose clarification", "c": "Hi there! Thank you for completing your update form. We noticed you reported xxx for your dose on your update form. Your most recent prescription was for xxxmg. Can you please clarify which dose you are on?", "a": "", "cat": "GLP"}, {"n": "GLP from TRT/HRT: Not qualified - Age", "c": "Hi there, thank you for answering our pre-qualification questions for the GLP program. Unfortunately, your age is outside our prescribing age range. We recommend that you see your PCP for evaluation as GLP prescribing may still be possible for you. We wish you all the best on your wellness journey!", "a": "", "cat": "GLP"}, {"n": "GLP from TRT/HRT: Not qualified - BMI", "c": "Hi there, thank you for answering our pre-qualification questions for the GLP program. Your BMI is too low (below 27) for you to meet prescribing criteria for GLP medication. We recommend that you see your PCP about your weight loss goals as other options might be possible. We wish you all the best on your wellness journey!", "a": "", "cat": "GLP"}, {"n": "GLP from TRT/HRT: Not qualified - Diabetes", "c": "Hi there, thank you for answering our pre-qualification questions for the GLP program. Unfortunately, type 1 diabetes is a contraindication to GLP medication prescribing. We recommend that you see your PCP or Endocrinologist about your weight loss goals as there might be alternative options for you. We wish you all the best on your wellness journey!", "a": "", "cat": "GLP"}, {"n": "GLP from TRT/HRT: Not qualified - Medullary", "c": "Hi there, thank you for answering our pre-qualification questions for the GLP program. Unfortunately, your family history puts you at increased risk to develop thyroid cancer should you take a GLP medication. Therefore this medication is not safe for you. We recommend that you see your PCP about your weight loss goals as there might be alternative options for you. We wish you all the best on your wellness journey!", "a": "", "cat": "GLP"}, {"n": "GLP from TRT/HRT: Not qualified - Pancreatitis", "c": "Hi there, thank you for answering our pre-qualification questions for the GLP program. Unfortunately, your history of pancreatitis means that a GLP medication would not be safe for you. We wish you all the best on your wellness journey!", "a": "", "cat": "GLP"}, {"n": "GLP side effects on form, not listed", "c": "Hi there! Thank you for completing your update form. We noticed you reported \"yes\" to having side effects but did not list any actual side effects. Can you please verify if you are having any active side effects and if so, which side effects are you experiencing?", "a": "", "cat": "GLP"}, {"n": "GLP stop treatment (5mg/2mL)", "c": "If using the 5 mg/2 mL concentration:", "a": "", "cat": "GLP"}, {"n": "GLP stop tx (12.5m/2.5mL)", "c": "If using the 12.5 mg/2.5 mL concentration:", "a": "", "cat": "GLP"}, {"n": "GLP: Already Have Labs", "c": "Great, please fax your labs to (202) 998-4218 or email them to support@fountain.net\n\nWe recommend sending over all of the labs you have, but the tests we specifically need are: CMP (Complete Metabolic Panel), TSH, HgA1c, Lipid panel (Cholesterol).\nIf you\u2019re missing any of these, no problem \u2014 we can still help you get these labs!\nPlease make sure the lab results have your name, date of birth and collection date on them.", "a": "", "cat": "GLP"}, {"n": "GLP: Assessment Link", "c": "Hey,\n\nThanks for your interest in FountainGLP! Please complete the assessment on our website: https://try.fountainglp.com, to get started. Once you sign up for your semaglutide evaluation, you'll be able to speak to one of our medical providers over a video call. If prescribed, medication can be shipped right to you.", "a": "", "cat": "GLP"}, {"n": "GLP: Check-in Form Update", "c": "Hi there!\nThank you for reaching out to us. As patients progress through their weight loss journey and are tolerating the medication well, the frequency of the update form is adjusted. You can always message us right here if you have any questions or concerns. \nWe hope you have a great day!", "a": "", "cat": "GLP"}, {"n": "GLP: TPH Tracking Link", "c": "Hello from Fountain!\nHere's the tracking link for your GLP medication: (LINK)\nPlease closely monitor your tracking link to ensure you receive it as soon as it's delivered.\nYour medication is stable for 60 days below 94\u00b0F and 5 days below 104\u00b0F. Please refrigerate it upon arrival.", "a": "", "cat": "GLP"}, {"n": "Gender Affirming Care", "c": "At this time, we do not offer gender-affirming care. We appreciate you reaching out. Have a great day!", "a": "", "cat": "General"}, {"n": "General CS: Can I call you?", "c": "Sure. Please feel free to call us at 1213-237-1454.", "a": "", "cat": "General"}, {"n": "General CS: Can I receive a free sample?", "c": "We are not allowed legally to provide samples, especially for controlled substances.", "a": "", "cat": "General"}, {"n": "General CS: Can I speak with a provider in another language, or use an interpreter?", "c": "Our medical team can connect with an interpreter who should be able to assist without any issues.", "a": "", "cat": "General"}, {"n": "General CS: Can I speak with someone being moving forward?", "c": "Sure, a member of our team would be happy to call you. Are you available right now?", "a": "", "cat": "General"}, {"n": "General CS: Can you contact my friend who's interested in your program?", "c": "They can email us at support@fountaintrt.com or text us at this number and we're happy to help them or address any questions they may have.", "a": "", "cat": "General"}, {"n": "General CS: Cancel - moved to a state where we do not operate", "c": "Got it. Unfortunately, we'll need to cancel your subscription since we don't operate there. We're happy to share medical records with you, or any other information you'd like. Please just let us know if you need anything. Wishing you the best in your wellness journey.", "a": "", "cat": "Cancellation"}, {"n": "General CS: Cancelling with shipment notification", "c": "Your subscription has been cancelled. Unfortunately, your most recent order has already been processed and shipped by the pharmacy, so it will still arrive as intended. We have contacted the pharmacy, and you will not receive any future charges or shipments. ", "a": "", "cat": "Cancellation"}, {"n": "General CS: Client Billing", "c": "Our providers submit all lab orders under client billing in all states outside of New York, New Jersey, and Rhode Island. This means they should charge us (not you) unless you go to an office located in one of these states.", "a": "", "cat": "Billing"}, {"n": "General CS: Compliance Video Visits", "c": "For any testosterone-related visits, a video visit is required for compliance purposes.", "a": "", "cat": "General"}, {"n": "General CS: Controlled substance video visit refills", "c": "This visit is to get your refill processed. In most cases - the cadence of labs coincides with new RXs and refills. If they do not, though, our system sends this message out thirty days before the refill is due, so you do not run out of medication.", "a": "", "cat": "General"}, {"n": "General CS: Curexa Overnight Shipping Request", "c": "Since your order is already being processed by the pharmacy, requesting overnight shipping would require us to cancel the current order and submit a new one with the updated shipping method. This may result in additional delays in receiving your medication.\n\nPlease note that overnight shipping also results in an additional $50 fee. To help you receive your medication as quickly as possible, our team recommends an alternative option at no extra cost. We can request that the pharmacy expedite the processing of your existing order on their end. This will prioritize your order while maintaining 2-day shipping.\n\nPlease let us know how you would like to proceed.", "a": "", "cat": "General"}, {"n": "General CS: DEA Laws", "c": "We are awaiting the final rule from the DEA. Fountain will work with our partners and patients to adapt to any new requirements once that rule is issued.", "a": "", "cat": "General"}, {"n": "General CS: Do you prescribe ED meds?", "c": "Yes, our providers can prescribe either sildenafil or tadalafil.", "a": "", "cat": "General"}, {"n": "General CS: Do you prescribe HRT injections?", "c": "Our medical team does not prescribe injections for patients in our HRT program at this time. ", "a": "", "cat": "HRT"}, {"n": "General CS: Do you prescribe patches or pellets?", "c": "Our providers do not currently prescribe patches or pellets. \nFor TRT patient's, we prescribe Enclomiphene, TRT Cream, and TRT Injections.\nFor HRT patient's, we offer testosterone and estradiol cream and progesterone capsules. ", "a": "", "cat": "General"}, {"n": "General CS: Do you prescribe peptides?", "c": "Our providers do not prescribe peptides at this time.", "a": "", "cat": "General"}, {"n": "General CS: Email and phone number verification", "c": "Hi! Thank you for your message.\n\nIt looks like the phone number or email you contacted us from isn\u2019t associated with an active account. To better assist you, can you please verify the following information:\n\nFirst and Last Name\nEmail address used in registartion\nOriginal phone number associate with your account\n\nIf you need to update your contact information, we can help you do that once you\u2019re connected through your account.", "a": "", "cat": "General"}, {"n": "General CS: Existing Patient Sends Email", "c": "Hi, this is Fountain. We received your email indicating: (paraphrase content of email message). Please note we primarily operate over SMS/text through our secure HIPAA-compliant messaging platform, Intercom.", "a": "", "cat": "General"}, {"n": "General CS: FDA approval of TRT medications", "c": "Here's an article from one of our partner pharmacies that can help answer your question:  https://www.belmarpharmasolutions.com/resources/patient-resources/patients-blog/understanding-the-fdas-role-in-compounded-medications/ ", "a": "", "cat": "TRT"}, {"n": "General CS: Fax Number", "c": "Our fax number is: (202) 998-4218.", "a": "", "cat": "General"}, {"n": "General CS: GLP medications", "c": "Our providers prescribe Tirzepatide(subcutaneous injections) and sublingual semaglutide.", "a": "", "cat": "GLP"}, {"n": "General CS: Highest Dose", "c": "Our medical team has indicated the following:\nFountain TRT has a maximum dosage of 200 mg/week, and a dose up to 200mg/week would be included in the cost. Your provider determines your specific dose at the time of consultation, considering your symptoms, medical history, and lab results. Please let us know if you have any further questions. ", "a": "", "cat": "General"}, {"n": "General CS: How long will it take before a patient can start treatment?", "c": "It typically takes around 2 weeks for a patient to get started on treatment after registering, if they qualify. Please note this is not a fixed timeline, it depends on how quickly they get in for labs, and consultation.", "a": "", "cat": "General"}, {"n": "General CS: I read online that you participate with insurance.", "c": "Thanks for letting us know. We\u2019re aware of several articles created by third parties indicating that we take insurance. Unfortunately, that is incorrect, and we\u2019re not sure where they got that information from. Insurance companies make it extremely difficult for both patients and prescribers to get any coverage for this condition. We also prefer to not participate with insurance because we can spend more time with fewer patients and give more personalized attention, including always being available to communicate.", "a": "", "cat": "General"}, {"n": "General CS: If a patient wants to attempt to use their insurance", "c": "Since we don't participate with insurance, it may be difficult for your insurer to cover our services. That being said, we can try to help you out with this. If there are specific documents needed/information you need, we can certainly try to provide you with them, but we can\u2019t guarantee that you\u2019ll get covered.", "a": "", "cat": "General"}, {"n": "General CS: If we don't operate in the state a patient is attempting to register in", "c": "Got it. At this time we do not operate in your state. We hope to expand there soon!", "a": "", "cat": "General"}, {"n": "General CS: Interested in Fountain TRT", "c": "Thank you for your interest in our program! If you would like to learn more, please feel free check us out at fountain.net! If you have any questions please feel free to reach out.\n", "a": "", "cat": "TRT"}, {"n": "General CS: Is there a contract?", "c": "We do not have a contract. You can reach out at any point before your next scheduled subscription charge to cancel the service.", "a": "", "cat": "General"}, {"n": "General CS: Is your program a scam?", "c": "Fountain is over 5  years old, and we have over 8000 active members. All of our providers are U.S-licensed. Our program is LegitScript certified, and our partner pharmacies are US-licensed. For more info, you can check us out at Fountain.net", "a": "", "cat": "General"}, {"n": "General CS: Itemized Receipt No CPT Codes", "c": "Hi xxx, since Fountain is a subscription-based service, we do not provide procedures or CPT codes because we do not work directly with insurance companies and do not submit claims or billing codes to insurance companies.", "a": "", "cat": "General"}, {"n": "General CS: Lab Order Email Request", "c": "Hi there! We will be happy to send you the lab order via email once you schedule through the following link:\n\u200b\nThis will ensure we are creating the correct lab order based on which facility you plan on visiting. Please note LabCorp recently raised its testing prices. Fountain members can complete labs at no added cost through Quest, our new primary lab partner. If you would prefer to continue using Labcorp, please note there will be an additional fee.", "a": "", "cat": "Labs"}, {"n": "General CS: Lab Scheduling Link Error", "c": "Hello  , our team is aware that there is a tech issue with scheduling at this time. We are actively monitoring the issue and hope for this to be resolved soon. We recommend trying the link again later today or tomorrow:\nWe apologize for the inconvenience and appreciate your patience in this matter. ", "a": "", "cat": "Labs"}, {"n": "General CS: Lead Feedback", "c": "Hi {{first_name}}, our team sincerely appreciates your feedback and will keep this in mind when considering how to improve future patient experiences.\n\nWe wish you the best on your wellness journey!", "a": "", "cat": "General"}, {"n": "General CS: Message from email that differs from the one on file", "c": "Hi there{{first_name}}. I noticed the email you are messaging us from does not match the email we have on file for you. Can you please verify the following information so we can better assist you:\n\nFirst and Last Name\nDate of Birth\nPhone Number on File\nPlease also let us know which email address you would like to keep on file and we will have it updated.", "a": "", "cat": "General"}, {"n": "General CS: Moving to a state where we do not operate", "c": "Got it - thanks for letting us know. Unfortunately, we don't operate in the state you're moving to. Will this be your permanent address moving forward? If so, we would need to cancel your subscription.", "a": "", "cat": "General"}, {"n": "General CS: NY, NJ, RI Uncovered Lab Costs", "c": "Hi there! While we are not able to cover the cost of NY, NJ or RI labs due to state regulations, you can utilize your insurance plan. Please note that while most insurance plans cover the majority of the cost, it is at the discretion of your plan and you will be responsible for paying any uncovered costs. Please let us know if you have any additional questions.\n\n", "a": "", "cat": "Labs"}, {"n": "General CS: Patient concerned that a shipment is received prior to f/u vv or labs", "c": "Hi there {{first_name}}, we completely understand your concern about receiving a new shipment before completing your video visit.\n\nOur shipments are automated/continuous to help prevent any lapse in treatment, so it is not uncommon for a refill to be sent before your visit. The good news is that your provider can easily adjust your dose at your video visit by simply updating the dosing instructions for the amount you use daily with the supply you have on hand. Then we can make updates to your next shipment if needed.\nAlso, since the program is subscription-based, you will not be charged extra if a new or early shipment is required due to a provider-recommended dose change.\n\nYour upcoming visit and labs are still important so the provider can review your progress and make sure your treatment plan stays optimized. Please let us know if you have any other questions \u2014 we\u2019re happy to help!", "a": "", "cat": "Labs"}, {"n": "General CS: Patient doesn't want to move forward after labs", "c": "No problem - there's no commitment to move forward if you're not interested. Please feel free to contact us in the future if you'd like to move forward with our program. Wishing you the best.", "a": "", "cat": "Labs"}, {"n": "General CS: Periodic Check Ins Resume Treatment", "c": "Hi {{first_name}}, we hope you are doing well! Our system no longer supports periodic check ins to resume treatment as you previously requested. Please note you may reach out here at any time if you decide you would like to resume treatment. We wish you the best in your wellness journey! ", "a": "", "cat": "General"}, {"n": "General CS: Relay message to medical team", "c": "Hi - We received your message. We'll pass this along to the medical team.", "a": "", "cat": "General"}, {"n": "General CS: Relay message to team", "c": "Thanks for sending this over! I\u2019ll pass it along to a member of our team who can better address this for you, and we\u2019ll be in touch soon.\n\u200b\n\u200b", "a": "", "cat": "General"}, {"n": "General CS: Relay to MAs", "c": "We'll check on your order status and update you as soon as possible. ", "a": "", "cat": "General"}, {"n": "General CS: Request for contact from active email or phone number", "c": "Hi! Thank you for your message.\n\nIt looks like the phone number or email you contacted us from isn\u2019t associated with an active account. Please reach out using the email address or phone number registered with Fountain, and we\u2019ll be happy to assist you.\n\nIf you need to update your contact information, we can help you do that once you\u2019re connected through your account.", "a": "", "cat": "General"}, {"n": "General CS: Sending documents to Fountain", "c": "Thanks for letting us know! You can send these over to support@fountain.net. \n\nPlease make sure you email us using the email we have on file for you. Thanks so much!\n\n", "a": "", "cat": "General"}, {"n": "General CS: Successful payment after failed payments", "c": "Hi {{first_name}}, we understand how receiving charges close together can be concerning, and we're happy to clarify.\n\nWhen a scheduled payment is unsuccessful, our system automatically retries the charge. If the payment is later completed after the original billing date, the subscription billing schedule still follows the original invoice date rather than the date the late payment was processed. Because of this, charges can occasionally occur closer together when a previous payment was delayed.\n\nThe recent charge you\u2019re seeing is for the next scheduled billing cycle, not a duplicate charge for the same invoice.\n\nIf you would like, I can also review your account to confirm the billing details with you. Please let me know if there\u2019s anything else I can assist with.", "a": "", "cat": "General"}, {"n": "General CS: Switch plans", "c": "Yes, you can switch your membership plan anytime before your subscription renews.", "a": "", "cat": "General"}, {"n": "General CS: TRT Registration Link", "c": "Sure! Here\u2019s the link: https://fountaintrt.com/", "a": "", "cat": "TRT"}, {"n": "General CS: TRT/Enc Resuming Subscriptions", "c": "We're glad to hear you'd like to resume treatment! You'll need to speak with a provider to resume your subscription. Please use this link to schedule a visit with them: Have a great day!", "a": "", "cat": "TRT"}, {"n": "General CS: Thanksgiving Shipping Delays", "c": "We sincerely apologize for the inconvenience. Due to the holiday, the pharmacy will be closed on Thanksgiving and the following day, so prescription processing will resume once it reopens. As soon as a tracking link becomes available, we will share it with you. Please don\u2019t hesitate to reach out if you have any questions in the meantime. Happy Holidays!", "a": "", "cat": "General"}, {"n": "General CS: Timeline to start treatment", "c": "The timeline to start treatment is not fixed since it depends on how soon you get your labs, see a provider, and start your subscription, but typically the timeline is within 2-3 weeks of registering. \n\n", "a": "", "cat": "General"}, {"n": "General CS: Traveling with medication", "c": "You can always contact the airport to be completely sure, but we've never heard of a problem when traveling with medications - domestically or internationally - as long as the prescription label with your name is available.", "a": "", "cat": "General"}, {"n": "General CS: Update patient's address - starting treatment", "c": "Great! We just updated the shipping address on file to: Your prescriptions will be sent there.", "a": "", "cat": "General"}, {"n": "General CS: Valid phone number", "c": "Due to our backend structure, you will need a valid US phone number to register. You would need the phone number to receive texts. ", "a": "", "cat": "General"}, {"n": "General CS: Wait for link", "c": "Thanks for letting us know that you received your results! Once they sync with our system, you should receive a message from us with a scheduling link to schedule your visit. ", "a": "", "cat": "General"}, {"n": "General CS: Website", "c": "\nMore information is available on our website, fountain.net. Please let us know if you have any questions!", "a": "", "cat": "General"}, {"n": "General CS: What brand is the HCG?", "c": "The brand of HCG is Pregnyl.", "a": "", "cat": "General"}, {"n": "General CS: What lab companies do you partner with? What states can I schedule lab work in? Are the cost covered?", "c": "We currently partner with LabCorp and Quest. Our national account with these facilities allow patient's to complete their lab work at any Quest/LabCorp location across the US. We can cover the cost of lab work in all US states besides New York, New Jersey, and Rhode Island. \n\u200b\nPlease note although lab work can be completed in any state Quest/LabCorp is located, you will need to be in a state where we are actively licensed for your video visits.", "a": "", "cat": "Labs"}, {"n": "General CS: What makes Fountain Different?", "c": "That's a great question. While we can't comment on any specific competitor, we can talk about ourselves. Fountain stands out because of our commitment to fast, convenient, and highly effective care. Whether you can text directly with your provider to get a quick response, your access to comprehensive testing and monitoring under the watch of an expert provider specifically assigned to your care. Please let us know if you have any questions!", "a": "", "cat": "General"}, {"n": "General CS: What medications are prescribed in the TRT plan?", "c": "The medications prescribed in the plan are TRT Cream, Enclomphine, or TRT injections. ", "a": "", "cat": "TRT"}, {"n": "General CS: What type of testosterone injections do you prescribe?", "c": "Our providers prescribe Testosterone Cypionate.", "a": "", "cat": "General"}, {"n": "General CS: Where are you located?", "c": "Hello - thanks for reaching out. Fountain Vitality is a telemedicine company, we have team members located throughout the US and abroad. ", "a": "", "cat": "General"}, {"n": "General TRT plan information - trial time, price, what's included", "c": "We recommend giving the treatment a few months trial. This allows us time to get labs, assess your testosterone levels, and make dosing adjustments to get you dialed in on the dose that optimizes your levels. If you are not noticing any improvements after making adjustments, then your symptoms may be from something other than low T levels. \nOur plans/subscriptions include the primary medication used for treatment (enclomiphene or testosterone), routine labs, consultations, shipping/handling/taxes, supplies such as syringes and alcohol swabs, and 24/7 customer service so you can always get a hold of us for any questions or concerns. \nHere are the prices for our subscriptions: https://blog.fountaintrt.com/trt_pricing/", "a": "", "cat": "TRT"}, {"n": "General: 24/7 customer service", "c": "Our customer service team operates 24/7. We always have someone online to address general questions and issues. We do have providers who work on the weekend, and at least one registered nurse works with us on the weekend. I would expect someone to get back to you soon. Thanks for your patience.", "a": "", "cat": "General"}, {"n": "General: Business hours", "c": "We have 24/7 customer support. You can text us whenever at this number and a team member should get back to you soon.", "a": "", "cat": "General"}, {"n": "General: Provider speciality", "c": "Our hormone replacement therapy providers are trained Nurse Practitioners with specialized expertise in diagnosing and managing hormonal imbalances. Each practitioner has completed clinical training in treatment protocols and is experienced in providing personalized care for both men and women. Please let us know if you have any further questions.", "a": "", "cat": "General"}, {"n": "General: Update Phone Number", "c": "Hello from Fountain! We just updated your phone number in our system. Can you confirm that you received this text? Thank you.", "a": "", "cat": "General"}, {"n": "Getlabs: Arrival Time", "c": "Getlabs will come within the 2-hour window we scheduled you for. They should contact you when they are on their way.", "a": "", "cat": "Labs"}, {"n": "Getlabs: Booked", "c": "We booked your appointment with Getlabs. You should receive a text and email with confirmation. If there are any issues, please notify us. Have a great day.", "a": "", "cat": "Labs"}, {"n": "Getlabs: Insurance Inquiry", "c": "Hi - Getlabs bills us directly for the bloodwork. They have a generic message they use, which mentions using insurance. Typically, if patients schedule appointments for Getlabs, independent of the client (us), they will require you to use insurance. They should not attempt to bill you.", "a": "", "cat": "Labs"}, {"n": "Getlabs: No Show", "c": "They should have reached out if they could not attend the appointment. That's very unprofessional of them. We will reach out to them.", "a": "", "cat": "Labs"}, {"n": "Getlabs: One Time Charge", "c": "Sure, we're happy to set that up for you. Please note that there is an additional fee for the home blood draw option. We would need to run a one-time payment of $99 to the card on file ending with: Please let us know if that works for you.", "a": "", "cat": "Labs"}, {"n": "Getlabs: Patient Address Not Populated", "c": "We booked your appointment. Please note that your address is populating incorrectly in Getlabs system - so you may receive an appointment confirmation with the incorrect address. We will contact them to make sure they go to the correct address.", "a": "", "cat": "Labs"}, {"n": "Getlabs: Preferred but not covered in patient's area", "c": "I checked with Getlabs, and it looks like they are unable to cover your area at this time. They are actively expanding their coverage area and should hopefully be able to cover your zip code soon. We'll refund the additional fee for you paid for the home blood draw. Please note the refund will take between 3-5 business days to go through. We can still schedule you at a nearby Quest or LabCorp. Would that work for you?", "a": "", "cat": "Labs"}, {"n": "Getlabs: Rescheduling Appointment", "c": "If you need to reschedule or cancel your appointment, please give us a heads-up at least 24 hours in advance. We won't be able to reschedule appointments less than 24 hours away. If you need to make a new appointment, we'll be happy to help you.", "a": "", "cat": "Labs"}, {"n": "Getlabs: Rude Staff", "c": "Thanks for your feedback. Getlabs is a third-party service that we contract with. They usually work very well - but we'll undoubtedly relay your feedback to our representative.", "a": "", "cat": "Labs"}, {"n": "Getlabs: Self-Booking Appointment", "c": "You may be able to book your appointment through their website, but please be advised our system is designed for us to book patients ourselves. If you attempt to do this you may encounter some unforeseen issues and charges that we cannot cover. If that's okay with you, you can do it.", "a": "", "cat": "Labs"}, {"n": "Getlabs: Self-Booking Appointment Confirmation", "c": "Got it. You can use this link to schedule your appointment: https://app.getlabs.com/book. We'll also send you a copy of the lab order shortly which you can provide the phlebotomist with during the appointment. Getlabs should send you the results if you schedule the appointment. If you encounter any issues, please let us know and we'll do our best to resolve them. Have a great day.", "a": "", "cat": "Labs"}, {"n": "Getlabs: Tech Issues", "c": "We booked your appointment with Getlabs. Due to a technical issue on their site, it's displaying your address incorrectly. We'll contact them to get that fixed. Have a great day.", "a": "", "cat": "Labs"}, {"n": "Getlabs: Timeframe", "c": "Getlabs operates in a two-hour window, primarily due to traffic and other appointments. We can ask them to show up at a particular time within that window, but due to those external variables, we can't guarantee they will be able to do it.", "a": "", "cat": "Labs"}, {"n": "Getlabs: Unable to Cover Area", "c": "I checked with Getlabs, and it looks like at this time they are unable to cover your area at this time. They are actively expanding their coverage area, and should hopefully be able to cover your zip code soon. We'll refund the additional fee for you paid for the home blood draw. Please note the refund will take between 3-5 business days to go through. We can still schedule you at a nearby Labcorp. Would that work for you?", "a": "", "cat": "Labs"}, {"n": "HCG left out of refrigerator overnight - Curexa response", "c": "Human chorionic gonadotropin (hCG), can be stored at room temperature before mixing with the diluent. However, after mixing (reconstitution), it should be refrigerated and used within 60 days. Once reconstituted, hCG is more susceptible to degradation, so refrigeration is crucial for maintaining potency. We would advise replacement if reconstituted hCG solution was left out overnight.", "a": "", "cat": "General"}, {"n": "HCG shipping temperature concern", "c": "HCG is shipped in the powder form to allow for safe transport during shipping as temperature varies. The pharmacies feel that it is safe to ship taking into account the varied temperatures throughout the year. Once it is reconstituted, it must be refrigerated.", "a": "", "cat": "General"}, {"n": "HIPAA Docs", "c": "To meet HIPAA security requirements, we must encrypt protected health information (PHI) and control who can access it. Virtru lets us encrypt emails and files, add access controls (like revoke/expire), and keep an audit trail\u2014so PHI stays protected even after it leaves our inbox.", "a": "", "cat": "General"}, {"n": "HRT + GLP together", "c": "HRT (Hormone Replacement Therapy) and GLP-1 medications (like semaglutide) can work very well together, especially in patients dealing with hormonal imbalances, weight gain, metabolic dysfunction, or menopause/andropause-related symptoms.", "a": "", "cat": "HRT"}, {"n": "HRT ACNE", "c": "I sent you a follow-up message. I noticed you reported having acne/oily skin. Acne can be common when starting HRT that includes testosterone, especially during the first few months while hormone levels are stabilizing. This often improves over time.\nWe recommend a gentle skincare routine and avoiding harsh scrubs. If acne becomes painful, cystic, or continues to worsen, please let us know so we can reassess dosing or next steps.", "a": "", "cat": "HRT"}, {"n": "HRT AZ - Follow-up visit", "c": "Hello - it's time to schedule your visit with a Fountain provider! Here's the link to schedule your follow-up visit. This will let you schedule with a provider licensed in your state. Please select the 'Follow-up Visit' option: https://go.oncehub.com/FountainHRTAZ\nIf you're traveling outside of your home state at the time of the visit please let us know, so we can make sure you see a provider licensed in that state.", "a": "", "cat": "HRT"}, {"n": "HRT AZ - New patient visit", "c": "Hello - it's time to schedule your visit with a Fountain provider! Here's the link to schedule your visit. This will let you schedule with a provider licensed in your state. Please select the 'New Patient Visit' option:  https://go.oncehub.com/FountainHRTAZ \nIf you're traveling outside of your home state at the time of the visit please let us know, so we can make sure you see a provider licensed in that state.", "a": "", "cat": "HRT"}, {"n": "HRT Age restriction disqualified from assessment (65 years or greater and not already treating with  HRT)", "c": "Hi there! Thank you for your interest in our program. At this time, our system shows that you\u2019re not eligible for treatment on our platform due to age-related safety guidelines. For patient safety, our HRT program currently supports individuals under 65, or potentially those 65 and older who are already established on HRT.\nIf you do not meet this guideline, we encourage you to consider exploring care through an in-person provider, who will be best equipped to support your needs. We wish you the best on your wellness journey!", "a": "", "cat": "HRT"}, {"n": "HRT Belmar Processing time", "c": "Hi there, our partner pharmacy has advised their typical process includes an average compounding time of 5 business days followed by two additional business days for shipping. Rather than a premade batch of medication, our pharmacy freshly compounds medication for each and every order. At the time the prescription is received the pharmacy begins compounding the medication.\n\nPlease note the initial order may take a few additional days as the pharmacy may need to clarify certain details for your first order to ensure everything is correct. If there is a holiday or weekend this may affect the typical time frame listed above. \nPlease let us know if any questions or concerns. Have a great day! ", "a": "", "cat": "HRT"}, {"n": "HRT CA - Follow-up visit", "c": "Hello - it's time to schedule your visit with a Fountain provider! Here's the link to schedule your follow-up visit. This will let you schedule with a provider licensed in your state. Please select the 'Follow-up Visit' option: https://go.oncehub.com/FountainHRTCA\nIf you're traveling outside of your home state at the time of the visit please let us know, so we can make sure you see a provider licensed in that state.", "a": "", "cat": "HRT"}, {"n": "HRT CA - New patient visit", "c": "Hello - it's time to schedule your visit with a Fountain provider! Here's the link to schedule your visit. This will let you schedule with a provider licensed in your state. Please select the 'New Patient Visit' option: https://go.oncehub.com/FountainHRTCA\nIf you're traveling outside of your home state at the time of the visit please let us know, so we can make sure you see a provider licensed in that state.", "a": "", "cat": "HRT"}, {"n": "HRT CO - Follow-up Visit", "c": "Hello - it's time to schedule your visit with a Fountain provider! Here's the link to schedule your follow-up visit. This will let you schedule with a provider licensed in your state. Please select the 'Follow-up Visit' option: https://go.oncehub.com/FountainHRTCO\nIf you're traveling outside of your home state at the time of the visit please let us know, so we can make sure you see a provider licensed in that state.", "a": "", "cat": "HRT"}, {"n": "HRT CO - New patient visit", "c": "Hello - it's time to schedule your visit with a Fountain provider! Here's the link to schedule your visit. This will let you schedule with a provider licensed in your state. Please select the 'New Patient Visit' option: https://go.oncehub.com/FountainHRTCO\nIf you're traveling outside of your home state at the time of the visit please let us know, so we can make sure you see a provider licensed in that state.", "a": "", "cat": "HRT"}, {"n": "HRT Education Document regarding labs/application DO NOT SEND TO ANY HRT PATIENTS THAT SIGNED UP AFTER 1/21/26, OR NY HRT PT WHO START 12/17", "c": "For best results, please apply the cream the night before your lab draw, and then do not apply the cream on the morning of the labs. Once your labs are drawn, you may resume your normal application schedule. Please let us know if you have any questions. \n\nOur provider has prepared the following document for a more through understanding of the best practice of cream application in preparation for lab work. Please let us know if you have any further questions/concerns once reviewed.", "a": "", "cat": "HRT"}, {"n": "HRT Evaluation", "c": "If you're interested in our HRT program, please complete the assessment on our website at:\u00a0https://fountain.net/hrt.\u00a0The assessment will help us better understand your needs and enable our medical team to provide more appropriate recommendations when you speak with them.", "a": "", "cat": "HRT"}, {"n": "HRT Evaluation Video", "c": "Hello, \nHere's the link to the video that plays after completing the evaluation: https://hrt.fountaintrt.com/success\n\nPlease let us know if you have any questions!\n\n", "a": "", "cat": "HRT"}, {"n": "HRT FL - Follow-up visit", "c": "Hello - it's time to schedule your visit with a Fountain provider! Here's the link to schedule your follow-up visit. This will let you schedule with a provider licensed in your state. Please select the 'Follow-up Visit' option: https://go.oncehub.com/FountainHRTFL\nIf you're traveling outside of your home state at the time of the visit please let us know, so we can make sure you see a provider licensed in that state.", "a": "", "cat": "HRT"}, {"n": "HRT FL - New patient visit", "c": "Hello - it's time to schedule your visit with a Fountain provider! Here's the link to schedule your visit. This will let you schedule with a provider licensed in your state. Please select the 'New Patient Visit' option: https://go.oncehub.com/FountainHRTFL \nIf you're traveling outside of your home state at the time of the visit please let us know, so we can make sure you see a provider licensed in that state.", "a": "", "cat": "HRT"}, {"n": "HRT Hair loss Concerns", "c": "We understand hair thinning can be frustrating during menopause, even with HRT. It\u2019s often due to hormonal shifts and sensitivity to DHT. The good news is there are options! Non-prescription treatments like biotin, omega-3s, and topical rosemary oil can help. Some patients also like caffeine shampoos. We offer a minoxidil topical treatment that we can add on to your treatment. Please continue to monitor your symptoms and let us know if you would like to consider the hair treatment.", "a": "", "cat": "HRT"}, {"n": "HRT Lab Cadence Explanation DO NOT SEND TO ANY HRT PATIENTS THAT SIGNED UP AFTER 1/21/26, OR NY HRT PT WHO STARTED 12/17-> AFTER", "c": "Hi there, your subscription covers all included services as needed, including video visits, check-ins every 2 weeks for the initial 90 days, lab work, medication/shipping, and 24-hour concierge services.\n\nOur approach to your treatment is symptom-based, which is the gold standard for HRT cream therapy. Our providers primarily use your feedback and symptoms as the guide for adjusting your treatment. This is actually the recommended approach, as major medical societies do not advise routine lab monitoring for HRT treatment due to their unpredictable nature.\n\nLab values with topical HRT can vary significantly based on multiple factors, including the timing of application, where the cream was applied on your body, and the amount used, making them unreliable. Instead, we focus on how you're feeling and responding to therapy.\n\nWhile your provider has recommended lab work around 6 months after starting treatment as a baseline reference point, our team will check in with you every 2 weeks during the initial 90 days to assess how you're responding to your regimen and make any necessary adjustments based on your symptoms.  \nPlease feel free to reach out if you have any additional questions. ", "a": "", "cat": "HRT"}, {"n": "HRT Lab Cadence explanation ( Patient's whose subscription began 10/29 - 1/21) DOES NOT APPLY FOR NY HRT PT THAT STARTED 12/17 or AFTER", "c": "The HRT lab cadence is completed annually. Major medical societies recommend treating patients based on symptoms rather than lab values alone. We obtain yearly labs for all HRT patients; however, if your provider feels that labs are needed sooner, they can be ordered and discussed during your video visit. Please let us know if you have any questions or would like additional clarification.", "a": "", "cat": "HRT"}, {"n": "HRT Labs - No need to change treatment protocol for labs", "c": "Our medical has indicated that here\u2019s no need to alter your normal routine before having your labs drawn. You can continue with your usual activities, including diet, exercise, and medications. Additionally, it\u2019s not necessary to have labs drawn at any specific point in your cycle, so you can schedule them at your convenience.", "a": "", "cat": "HRT"}, {"n": "HRT Lead inquiring about labs", "c": "Hi there, we do not offer lab work with our HRT subscripti
