e. Please select the 'Follow-up Visit' option: https://go.oncehub.com/FountainTRTOR\nIf you're traveling outside of your home state at the time of the visit please let us know, so we can make sure you see a provider licensed in that state.", "a": "", "cat": "TRT"}, {"n": "TRT OR - New patient visit", "c": "Hello - it's time to schedule your visit with a Fountain provider! Here's the link to schedule your visit. This will let you schedule with a provider licensed in your state. Please select the 'New Patient Visit' option:  https://go.oncehub.com/FountainTRTOR \nIf you're traveling outside of your home state at the time of the visit please let us know, so we can make sure you see a provider licensed in that state.", "a": "", "cat": "TRT"}, {"n": "TRT PA - Follow-up visit", "c": "Hello - it's time to schedule your visit with a Fountain provider! Here's the link to schedule your follow-up visit. This will let you schedule with a provider licensed in your state. Please select the 'Follow-up Visit' option: https://go.oncehub.com/FountainTRTPA\nIf you're traveling outside of your home state at the time of the visit please let us know, so we can make sure you see a provider licensed in that state.", "a": "", "cat": "TRT"}, {"n": "TRT PA - New patient visit", "c": "Hello - it's time to schedule your visit with a Fountain provider! Here's the link to schedule your visit. This will let you schedule with a provider licensed in your state. Please select the 'New Patient Visit' option:  https://go.oncehub.com/FountainTRTPA \nIf you're traveling outside of your home state at the time of the visit please let us know, so we can make sure you see a provider licensed in that state.", "a": "", "cat": "TRT"}, {"n": "TRT Pricing", "c": "Here's a breakdown of our pricing for our TRT Program: https://fountain.net/trt#pricing\n", "a": "", "cat": "TRT"}, {"n": "TRT Program Value", "c": "Our subscription fees may appear higher than those of some other companies, but unlike many other companies, we don't charge for different aspects of care. We offer a single fee that covers the cost of medication, support, consultation, shipping, labs (in most states), and taxes. ", "a": "", "cat": "TRT"}, {"n": "TRT Program Video", "c": "You can find the video we created going over our TRT program here: https://fountain.net/trt-visit\n\nPlease let us know if you have any questions!", "a": "", "cat": "TRT"}, {"n": "TRT RN- trouble with vial", "c": "When having trouble removing the medication from the vial, please try the following:\nThis method uses gravity to ensure complete medication retrieval.", "a": "", "cat": "TRT"}, {"n": "TRT Supplements Avoid / Take / Recommend", "c": "Fountain does not recommend any specific supplements as over-the-counter supplements are not FDA approved, regulated, or quality assured for safety and efficacy. We specifically recommend avoiding any supplements that can affect testosterone levels.", "a": "", "cat": "TRT"}, {"n": "TRT TN - Follow-up visit", "c": "Hello - it's time to schedule your visit with a Fountain provider! Here's the link to schedule your follow-up visit. This will let you schedule with a provider licensed in your state. Please select the 'Follow-up Visit' option: https://go.oncehub.com/FountainTRTTN\nIf you're traveling outside of your home state at the time of the visit please let us know, so we can make sure you see a provider licensed in that state.", "a": "", "cat": "TRT"}, {"n": "TRT TN - New patient visit", "c": "Hello - it's time to schedule your visit with a Fountain provider! Here's the link to schedule your visit. This will let you schedule with a provider licensed in your state. Please select the 'New Patient Visit' option: https://go.oncehub.com/FountainTRTTN\nIf you're traveling outside of your home state at the time of the visit please let us know, so we can make sure you see a provider licensed in that state.", "a": "", "cat": "TRT"}, {"n": "TRT TX - Follow-up visit", "c": "Hello - it's time to schedule your visit with a Fountain provider! Here's the link to schedule your follow-up visit. This will let you schedule with a provider licensed in your state. Please select the 'Follow-up Visit' option: https://go.oncehub.com/FountainTRTTX\nIf you're traveling outside of your home state at the time of the visit please let us know, so we can make sure you see a provider licensed in that state.", "a": "", "cat": "TRT"}, {"n": "TRT TrustPilot Request", "c": "I'm very happy with your improvement. As mentioned, we'd greatly appreciate a review from you so other guys can hear about the experience from a patient. Here's the link: https://www.trustpilot.com/review/fountaintrt.com. You can post under a made-up name if you prefer. Thanks so much! ", "a": "", "cat": "TRT"}, {"n": "TRT cream delays 2", "c": "Hello, we sent another message to our partner pharmacy asking about the status of your order. They just indicated that they are working on getting your order out, but it's been delayed due to a staffing issue. Please note we added a $50 credit to your account. I would expect the order to go out within the next few days. Thank you for your patience.", "a": "", "cat": "TRT"}, {"n": "TRT testosterone does NOT cause prostate cancer", "c": "There are several studies that have demonstrated TRT does not cause prostate cancer. Here are some of the most recent studies, including statements from the American Urological Association and American College of Physicians:\nA population-based study from Finland with long-term follow-up found no association between testosterone therapy and increased prostate cancer incidence or mortality; in fact, prostate cancer mortality was lower among testosterone users.\nTestosterone Replacement Therapy Is Not Associated With Increased Prostate Cancer Incidence, Prostate Cancer-Specific, or Cardiovascular Disease-Specific Mortality in Finnish Men.\nhttps://pubmed.ncbi.nlm.nih.gov/37971326\nThe American Urological Association explicitly states that clinicians should inform patients of the absence of evidence linking testosterone therapy to the development of prostate cancer, based on accumulating evidence from randomized controlled trials and meta-analyses.\n\u200bEvaluation and Management of Testosterone Deficiency: AUA Guideline.\nhttps://pubmed.ncbi.nlm.nih.gov/29601923\nThe American College of Physicians guideline also concludes that evidence from 20 observational studies shows no increased risk for prostate cancer with testosterone therapy.\nTestosterone Treatment in Adult Men With Age-Related Low Testosterone: A Clinical Guideline From the American College of Physicians.\nhttps://pubmed.ncbi.nlm.nih.gov/31905405", "a": "", "cat": "TRT"}, {"n": "TRT/HRT Hair Loss treatment", "c": "The hair loss solution is very simple.  You will squeeze the dropper to draw up the solution, and then slowly squeeze the bulb as you disperse the medication onto your scalp while you rub the medication into your scalp with the opposing hand.  If the bulb does not draw up one full 1mL dose, you can repeat the process to get the full dose. Daily application is critical to ensure the best results.  Results take 3-4 months with full results in 9-12 months.  This medication will come separately from the rest of your medications.  Let me know if you have any questions or concerns. ", "a": "", "cat": "TRT"}, {"n": "TRT/HRT MED: PMP multiple providers testosterone", "c": "Hi - I wrote the prescription as we discussed but got a notification that prescriptions for XXX have also been recently prescribed by another provider. By law, we can only prescribe if you're not filling other prescriptions for the same medication since this is a controlled substance. We would love to provide your treatment, but we need confirmation from you that we're going to be your only medical provider for [TRT/HRT]. I need to wait for your confirmation before I can proceed with your prescription.", "a": "", "cat": "TRT"}, {"n": "TRT/HRT Tracking Links", "c": "Hello from Fountain!\nYour tracking link has just become available:\nHave a great day!", "a": "", "cat": "TRT"}, {"n": "TRT/HRT to GLP Process", "c": "Glad to hear you're interested in our GLP-1 weight loss program! To get started please fill out this form:\nhttps://fountaintrt.akutehealth.com/forms/65a6821cc901723e0ee6baa5\n\nOnce that's done, our medical team will review the form and we'll give you an update within 24 hours.", "a": "", "cat": "TRT"}, {"n": "TRT/HRT to GLP: State we do not service", "c": "Hi - thanks for your interest in our GLP program! The program isn't currently available in your state at this time but will hopefully be soon. We'll let you know when the program is available in your state.", "a": "", "cat": "TRT"}, {"n": "TRT: Lab Link", "c": "Hello from Fountain, here is a link to schedule your labwork: \nOur providers request that patients on T injections get labs drawn at least 24 hours after an injection, and patients on T cream should apply the cream as usual and gets labs drawn 2-4 hours after application.\nIf you're not using either of these, you can schedule any time of day.", "a": "", "cat": "TRT"}, {"n": "TRT: Payment Video", "c": "Hello - here's a link to the video we send to patients after they they start their subscription: https://trt.fountain.net/success", "a": "", "cat": "TRT"}, {"n": "Tadalafil Add-On Plan", "c": "We just set up your subscription! Please note that this subscription is billed at $99 every 12 weeks.", "a": "", "cat": "General"}, {"n": "Tadalafil PDE5i async asynchronous visit encounter", "c": "Hi {{first_name}} - how's it going? Please click this link to answer a couple of medical update questions - it takes less than a minute. https://fountaintrt.akutehealth.com/forms/66e8ea93bda5360a934ca358 Thanks! {{message.author.name}}", "a": "", "cat": "General"}, {"n": "Tasso coming soon", "c": "Hi there, we are not offering third-party lab orders at this time. We have a new process with Tasso, which is an at-home blood collection device, that will be available in the next 1\u20132 weeks. Once that is ready, we will reach out to you to discuss the process.", "a": "", "cat": "General"}, {"n": "Tech: Clear Cache on Desktop Browser", "c": "Hi there!\nWe're sorry to hear that you're experiencing difficulties signing up on our website. Sometimes, issues like this can be resolved by clearing your browser's cache and cookies. Follow the steps below based on the device and browser you're using:\nOn Desktop/Laptop:\nGoogle Chrome:\nClick on the three-dot menu icon at the top-right corner.\nSelect \"Settings.\"\nScroll down and click on \"Privacy and security.\"\nClick on \"Clear browsing data.\"\nMake sure \"Cookies and other site data\" and \"Cached images and files\" are selected.\nChoose \"All time\" as the time range.\nClick on \"Clear data.\"\nMozilla Firefox:\nClick on the three-line menu icon at the top-right corner.\nSelect \"Options\" (or \"Preferences\" on macOS).\nClick on \"Privacy & Security\" in the left sidebar.\nScroll down to the \"Cookies and Site Data\" section and click on \"Clear Data.\"\nEnsure \"Cookies and Site Data\" and \"Cached Web Content\" are selected.\nClick on \"Clear.\"\nSafari:\nClick on \"Safari\" in the top menu.\nSelect \"Preferences.\"\nClick on the \"Privacy\" tab.\nClick on \"Manage Website Data.\"\nClick on \"Remove All.\"\nConfirm by clicking \"Remove Now.\"\nMicrosoft Edge:\nClick on the three-dot menu icon at the top-right corner.\nSelect \"Settings.\"\nClick on \"Privacy, search, and services\" in the left sidebar.\nUnder \"Clear browsing data,\" click on \"Choose what to clear.\"\nEnsure \"Cookies and other site data\" and \"Cached images and files\" are selected.\nClick on \"Clear now.\"\nAfter clearing your cache and cookies, please try signing up on our website again. If you're still experiencing issues, don't hesitate to reach out to us for further assistance. We're here to help!", "a": "", "cat": "General"}, {"n": "Tech: Clear Cache on Mobile Device", "c": "On iOS Devices (iPhone/iPad):\nSafari:\nOpen the \"Settings\" app.\nScroll down and tap on \"Safari.\"\nScroll down and tap on \"Clear History and Website Data.\"\nConfirm by tapping \"Clear History and Data.\"\nOn Android Devices (Chrome Browser):\nOpen the Chrome app.\nTap on the three-dot menu icon at the top-right corner.\nSelect \"Settings.\"\nTap on \"Privacy and Security.\"\nTap on \"Clear browsing data.\"\nEnsure \"Cookies and site data\" and \"Cached images and files\" are selected.\nChoose the time range or select \"All time.\"\nTap on \"Clear data.\"", "a": "", "cat": "General"}, {"n": "Tech: Doxy issues", "c": "We are sorry to hear you're having issues with Doxy. We suggest following some of the troubleshooting steps in this article:  https://help.doxy.me/en/articles/3921965-for-patients-technical-guide \nIf we can assist any further please let us know. Thank you!", "a": "", "cat": "General"}, {"n": "Tech: Error 400", "c": "Hi there, this error can be produced for 2 reasons:\n1. If your address is greater than 35 characters long\n2. If you are using a debit card or a credit card that is being blocked.\nIf your address isn't particularly long, we recommend trying a different card. You'll be able to update this with us in the future.", "a": "", "cat": "General"}, {"n": "Tech: Interlinked Profiles", "c": "Your profile may have an issue due to how the evaluation was completed. It looks like you may have information (e.g., an email, and a phone number) that is attached to someone else. However, we'd be happy to help address this problem. We just need you to confirm your first name, last name, active email, and phone number. Once we do that, they can register right away without any issues. Thanks so much!", "a": "", "cat": "General"}, {"n": "Tech: Issues with Fedex site", "c": "Got it. This can sometimes happen due to issues with Fedex's website. Please try reloading the page, sometimes that fixes the issue. If that doesn\u2019t work, please try checking the tracking link later today.", "a": "", "cat": "General"}, {"n": "Tech: Message fails to deliver", "c": "Hi, this is: from Fountain. Hope you're doing well. We sent a text to you using the number on file: but it appears like our message did not go through. Is: the best phone number to reach you at?", "a": "", "cat": "General"}, {"n": "Tech: Outbound Text Issues", "c": "Hello from Fountain! Due to a service issue which we're actively working to resolve, outbound texts are not going through - so we need to email you temporarily until this issue is resolved.", "a": "", "cat": "General"}, {"n": "Tech: Outbound texts not going through", "c": "Hi,\nHope you are well. Our medical team tried to text you the link to your video visit at: but the text did not go through. It's possible that you may have a spam filter that is blocking our number. Can you please send a text to: (833) 967-3100 with the message: START please? That may resolve this issue. Thank you!", "a": "", "cat": "General"}, {"n": "Tech: Patient can't register in a state we operate", "c": "We operate in your state. Can you please try using another zip code to register? We can change your information in our system after you register.", "a": "", "cat": "General"}, {"n": "Tech: Tracking link is not loading", "c": "Sorry to hear that. Please try reloading the page, sometimes that fixes the issue. If that doesn\u2019t work, please try checking the tracking link later today. This issue can occur due to a glitch on their website.", "a": "", "cat": "General"}, {"n": "Tech: Unable to Start Trial", "c": "Hi - can you please try using a different payment method? That may resolve this issue. Thank you!", "a": "", "cat": "General"}, {"n": "Testosterone + Enclomiphene Hair Loss Concerns", "c": "Using testosterone can possibly contribute to male pattern baldness particularly if you have the genetic predisposition. The risk of hair loss is generally dose-dependent and more likely if testosterone levels are supraphysiological (exceeding T level reference ranges). Enclomiphene is not associated with hair loss in men based on current clinical evidence although it has not been deeply studied so there are no guarantees. \nOver the counter Minoxidil can be used as a preventative measure if needed. We also off prescription strength Minoxidil + Finasteride foam which you would apply and rub/massage into the affected areas for prevention/restoration.\nReach out if you have any other questions or concerns,", "a": "", "cat": "General"}, {"n": "Testosterone Cream application site TRT", "c": "Hi there, our provider's currently recommend cream application to the transcrotal site. Please let us know if any questions. ", "a": "", "cat": "TRT"}, {"n": "Testosterone Cypionate expected processing/Shipping times", "c": "Hi there, for testosterone cypionate our pharmacy currently has an expected processing time of 3-5 business days. Once processed the shipping typically takes 2 business days. \nOur team and the pharmacy is working to get your shipment to you as swiftly as possible. Please ensure the correct address is on file to avoid any delays in shipment. \nHave a great day! ", "a": "", "cat": "General"}, {"n": "Testy Mr Tester Lab Booking error causing lab to not be able to find the patient booking Appointment bookings were made between 12/15-1/2", "c": "Hi there, we recently experienced a technical issue that caused our system to override the patient's name while booking their lab appointment. This issue has since been resolved, and should not affect future bookings. \n\nIf you would still like to proceed with your lab draw you may provide the lab with this requisition/confirmation number listed on the lab order: \nThe lab should still be able to proceed with your lab draw with the valid lab order as it list the correct patient information. If needed we can also send you a secure email with a copy of your lab order. \n\nIf you prefer to reschedule your lab draw please let us know here, and we will send you the lab scheduling link: \n\nPlease let us know here if we can be of any further assistance to you. Have a great day! ", "a": "", "cat": "Labs"}, {"n": "Testy MrTester", "c": "Hi there, we unfortunately experienced a technical error that caused your lab appointment to be scheduled under a test name. The lab requires your legal name to be on the appointment. For this reason, we had to cancel your scheduled lab draw. We have initiated a refund for the $37 fee for booking with LabCorp (if you were charged originally). Refunds take 5-10 days to process. \n\nPlease utilize this link to schedule a new appointment: ", "a": "", "cat": "General"}, {"n": "Texting unregistered contacts", "c": "Due to our backend customer service platform, we cannot text unregistered contacts proactively. If they want to reach out and text us here, they certainly can, or they can call us at 833-967-3100. Thank you so much!\n", "a": "", "cat": "General"}, {"n": "Therapeutic Phlebotomy Macro to be sent to PT upon retrieval of TP RN ticket", "c": "Hi there, during your most recent visit, the provider has recommended you complete a procedure referred to as therapeutic phlebotomy. You may call this number for assistance locating a facility near you that offers this procedure:(800)- 634- 9069. This is the Red Cross Special Collections number, however, you do not have to go through the Red Cross specifically for this procedure. \nOnce you have confirmed a facility and scheduled an appointment (if the facility is appointment-based), you will present them with the required order form. You will receive an order form from Fountain in an email once our provider has signed the order. \nWe will check in on your progress periodically, but if you run into any issues that delay/prevent you from scheduling/completing this procedure, please let us know here, as we may be able to assist. Also, once you have successfully completed the therapeutic phlebotomy, you may update our team here.", "a": "", "cat": "General"}, {"n": "Tiffany Perez", "c": "Tiffany Perez, Medical Assistant ", "a": "", "cat": "General"}, {"n": "Tim Mack", "c": "- Tim Mack, NP", "a": "", "cat": "General"}, {"n": "Tips/suggestions for accurate blood pressure", "c": "Hi there, our provider has made the following suggestions to ensure you get the most accurate blood pressure result. \n1) measure after sitting quietly for at least 5 minutes.\n2) take 2-3 reading at least one minute apart.\n3) measure with an empty bladder.\n4) ensure the cuff is on your bare arm at heart level, with legs uncrossed and feet flat on the floor.\n5) proper cuff size - the cuff should easily fit your arm, they come in different sizes.\n\u200b\nIt also helps to take your blood pressure at the same time each day for best comparison. Please update us here regarding your results. ", "a": "", "cat": "General"}, {"n": "Tirzepatide temp TPH", "c": "The tirzepatide vials have a recommended storage temperature of below 94 degrees for up to 60 days, and below 104 degrees for up to 5 days. This means that the vial can withstand 104 degrees up to 5 days", "a": "", "cat": "General"}, {"n": "Translator request: Spanish", "c": "Thank you for reaching out! At the moment, we don\u2019t have anyone on our Customer Service team who speaks Spanish, but we\u2019ll do our best to assist you in English. However, during your video visit with our medical team, there will be a translator available. For now, we can communicate via SMS, and you\u2019re welcome to use a translation tool if that helps make communication easier.", "a": "", "cat": "General"}, {"n": "Triage Router Response", "c": "Hi {{first_name}} \u2013 I received your message and have forwarded it to the appropriate team. They will follow up with you as soon as they can.\n\u200b\nThanks! - {{message.author.first_name}}, Medical Assistant", "a": "", "cat": "General"}, {"n": "Trouble with vial", "c": "To properly withdrawal medication from a vial, first inject a volume of air equivalent to the medication you intend to withdrawal. This balances the pressure inside and outside the vial, making it easier to draw out the medication. If you skip this step, the vial will develop a vacuum that makes it difficult or impossible to withdraw more medication as you continue to use the vial. Please let us know if you have any further questions. ", "a": "", "cat": "General"}, {"n": "Trustpilot: Find GLP reviews", "c": "You can find reviews by checking us out on our Trustpilot page here: https://www.trustpilot.com/review/fountainglp.com", "a": "", "cat": "GLP"}, {"n": "Trustpilot: Find HRT reviews", "c": "You can find reviews by checking us out on our Trustpilot page here: https://www.trustpilot.com/review/fountain.net", "a": "", "cat": "HRT"}, {"n": "Trustpilot: Find TRT reviews", "c": "You can find reviews by checking us out on our Trustpilot page here: https://www.trustpilot.com/review/fountaintrt.com", "a": "", "cat": "TRT"}, {"n": "UTI or Yeast infection symptoms in HRT patient's (RN)", "c": "If you are experiencing symptoms associated with a UTI or yeast infection please switch to inner wrist application of your prescribed HRT creams for the next 1-2 weeks. You may then switch back to inner labia application. If the symptoms reoccur please notify our team here. \nIf your symptoms persist this week, follow up with your primary care provider as you may need further treatment/medication to resolve an infection. Please also notify us here. Ensure you are hydrating properly and urinating  immediately after intercourse to decrease your risk for bacterial urine infection.", "a": "", "cat": "HRT"}, {"n": "Undelivered Messages: Text Start", "c": "Hello from Fountain! We sent you a text earlier from 833-967-3100, but it looks like our message did not go through. Is it possible that you blocked our number? If so, please text us at 833-967-3100 with the message: 'START.' Thank you!", "a": "", "cat": "General"}, {"n": "Unknown SMS: Assessment completed", "c": "Hi - this is: from Fountain. Your information isn't coming in our system. Can you please provide the email you used to register?", "a": "", "cat": "General"}, {"n": "Unknown SMS: Do you operate outside of the US?", "c": "At this time, we're only operating in select US states. We hope to expand abroad soon!", "a": "", "cat": "General"}, {"n": "Unknown SMS: Medical question", "c": "That's a great question! I'm not a medical provider so I can't answer that directly though. With Fountain, you'd speak with a medical provider who would be able to address those questions. You'd need to complete the evaluation and have a lab report available before you could speak with a provider.", "a": "", "cat": "General"}, {"n": "Unknown SMS: Sender thinks we charged them", "c": "Hi - thanks for reaching out. Your name and number are not coming up in our system. Can you please confirm your name, and send us a screenshot of the charge?", "a": "", "cat": "General"}, {"n": "Unodose blue line", "c": "There is approximately 10-mLs of medication remaining when the blue line is level with the reorder line. This should last approximately 40 days when using 1 click per day. Please contact us with any questions.", "a": "", "cat": "General"}, {"n": "Unodose instructions HRT", "c": "Gently twist the protective cap counterclockwise at the top of the bottle and pull off the cap while keeping a firm grip on the main barrel.\nNext, rotate the dial at the bottom of the bottle in the indicated direction until you hear the prescribed number of clicks. (When you initiate use of a new container you will need to prime the container. This may include turning several clicks before any cream is dispersed.) \nCheck that the cream is coming through the openings at the top of the applicator.\nLastly, take your index finger to gather the cream and apply it to the inner labia as indicated. Please note, for the initial few weeks our provider's often recommend applying to the inner wrist rather than the inner labia for a smoother transition. \nPlease be sure to wash your hands after use and avoid direct contact with others directly after application. If you have any questions regarding when to apply you may let us know here. ", "a": "", "cat": "HRT"}, {"n": "Unregistered Patient: Already on TRT", "c": "Hi there, our providers are very experienced with helping guys already on TRT. That's why we do a Personalized TRT Evaluation first, so you can speak to a FountainTRT provider about your specific needs.\nTo get started, you will need to sign up through our online assessment.", "a": "", "cat": "TRT"}, {"n": "Unregistered Patient: Already registered and provides their email address", "c": "Thank you for confirming. Your email is not coming up in our system. Did you receive a confirmation email from us after completing the evaluation? If so, can you please send a screenshot of the confirmation message you received?", "a": "", "cat": "General"}, {"n": "Unsubscribe from messages", "c": "We\u2019ve received your request, and are in the process of unsubscribing you from messages ", "a": "", "cat": "General"}, {"n": "Update patient regarding refill", "c": "The pharmacy is processing your prescription. Once the tracking link becomes available, this will be provided to you.", "a": "", "cat": "General"}, {"n": "VV Missed", "c": "Hello, \nIt looks like you missed your visit today. No problem. Here's the link to reschedule: \n\nPlease let us know if we can help out with anything else. ", "a": "", "cat": "General"}, {"n": "VV Same", "c": "I can confirm that we have your scheduled visit on our calendar. It appears that the email on file is different from the one on our calendar. Due to this, the automated system has not synced properly. Can you verify your preferred email to get this updated? Thank you!", "a": "", "cat": "General"}, {"n": "VV: Bad link, reschedule visit", "c": "Hello from Fountain! It looks like you were able to schedule a time slot that shouldn't have been available due to an issue with the link we sent. This issue should be fixed now. Please use this link to reschedule your visit: https://go.oncehub.com/FountainTRTNJRefill\nThanks for your understanding. Please note that you may receive automated reminder messages about the original visit. Please disregard those.", "a": "", "cat": "General"}, {"n": "VV: Can I Just have a phone call?", "c": "You would need a video visit for any regularly scheduled appointment. ", "a": "", "cat": "General"}, {"n": "VV: Can I have the video visit abroad?", "c": "Our providers do not have licenses outside of the US. You'd need to be in a state where we are licensed for the video visit.", "a": "", "cat": "General"}, {"n": "VV: Can the video visit link be sent out earlier?", "c": "The video visit link should be in the calendar invite. You should be able to click on the link and enter the waiting room before the time of your actual visit.", "a": "", "cat": "General"}, {"n": "VV: Can you check when my video visit is scheduled?", "c": "Hi - I can see you're scheduled with [provider's name] on [date] at [insert time]. You will receive a text message with the link to join the video visit on your scheduled time.", "a": "", "cat": "General"}, {"n": "VV: Cancel video visit", "c": "No problem. We'll cancel your video visit. Please use this link to reschedule your visit:", "a": "", "cat": "Cancellation"}, {"n": "VV: Duplicate appointment", "c": "Hi - this is: from Fountain. I see that you booked two appointments. One was with: at: and the other was at: can you confirm which of these appointments you'd like to keep? We'll cancel the other one. Thank you!", "a": "", "cat": "General"}, {"n": "VV: Early Appointment Bill", "c": "I checked with our medical team and it looks like you can schedule a visit with a provider licensed in state sooner using this link: https://go.oncehub.com/FountainBill\n\nPlease let us know if you have any questions. ", "a": "", "cat": "General"}, {"n": "VV: Early F/U appointment", "c": "We'll let you know if any availability opens up sooner. I'm afraid we're backed out at this time, and it's an issue we are actively working on resolving.", "a": "", "cat": "General"}, {"n": "VV: Early appointment - Unlikely to happen", "c": "Thank you for reaching out. We\u2019re currently booked at this time, but we completely understand your concerns and want to do our best to support you. We're happy to check with the medical team for any cancellations or last-minute openings. Once we hear back from the team, we will reach out to you!", "a": "", "cat": "General"}, {"n": "VV: Early appointment requests", "c": "I'll reach out to our medical team and see if there's any way someone can see you sooner. In the meantime, we'd suggest booking an appointment. Please note that we cannot guarantee that we can get you a sooner appointment, but we'll do our best.", "a": "", "cat": "General"}, {"n": "VV: How can I join the video visit?", "c": "The provider will send you a text message with the link to join the video visit at the scheduled time.", "a": "", "cat": "General"}, {"n": "VV: Provider no longer works with us - New VV is needed", "c": "Hello, Thank you for your patience while I checked with our medical team. \n\nThe provider you previously saw is no longer with Fountain, so for compliance purposes, we\u2019ll need you to schedule a new video visit in order to move forward with processing your prescription. Once that visit is completed, we\u2019ll be able to take care of this promptly.\nWe sincerely apologize for the inconvenience! \n\nOur team is here to help make this as smooth as possible. Please let us know if you need assistance with scheduling.", "a": "", "cat": "General"}, {"n": "VV: Request for a specific provider", "c": "No problem. Our system defaults to the state-based link and gives you the option to schedule the soonest available visit. If you'd like to see a specific provider, that's no problem though. You can use this link to schedule with them:", "a": "", "cat": "General"}, {"n": " nd can strain testosterone supplies, and we may use alternate pharmacies to ensure patients receive their treatment without interruption.", "a": "", "cat": "General"}, {"n": "Yadissa Cornejo", "c": "Yadissa Cornejo, Medical Assistant", "a": "", "cat": "General"}, {"n": "Yeast infection", "c": "Hi there, our HRT Team Lead Provider provider has advised the creams and HRT may change the vaginal pH which can lead to yeast infections for some patients. Please let us know if you are actively experiencing symptoms of a yeast infection. If so, please switch to inner wrist application. If symptoms persist we recommend making an appointment with your local provider to confirm diagnosis and receive proper treatment to resolve the infection. Until symptoms have fully resolved please continue with inner wrist application. Once resolved you may then return to inner labia application. Please update our team of changes to application site and status of symptoms if persistent. ", "a": "", "cat": "General"}, {"n": "hair regrowth foam minoxidil finasteride", "c": "If you're interested, we have a hair re-growth topical treatment that includes minoxidil and finasteride - both ingredients have been shown to re-grow hair starting about 3 months after first massaging into scalp. Improvement in hair can occur for years (ilterally) after first using. It comes as a foam that \"turns\" into a liquid as soon as you start rubbing it in. Meant to be applied twice per day (although some people use 2 presses once a day). It's $119 charged every 6 weeks. Please let us know if you're interested.", "a": "", "cat": "General"}, {"n": "late-arrival-reschedule", "c": "Hi {{first_name}}, thank you for attempting to connect to your visit today. \n\nUnfortunately, due to the remaining time for your scheduled visit, we\u2019ll need to reschedule so we have enough dedicated time to complete your thorough assessment.\n\nYou\u2019ll receive a rescheduling link where you can choose a day and time that works best for you. Have a great day!", "a": "", "cat": "General"}, {"n": "tadalafil 5 MG - changed # tablets dispensed to 84", "c": "We now ship tadalafil as a 12-week (84-day) supply, which is why you received 84 tablets. We are required to dispense the exact quantity to match the prescription duration. You should have enough medication for daily use (one tablet per day).\nIf the 5 mg dose is not effective, we can request an increase to 10 mg, also for 84 tablets. Please contact us if you have any questions, concerns, or would like to adjust your prescription.", "a": "", "cat": "General"}, {"n": "tadalafil only unresponsive no form", "c": "Please cancel pt's tadalafil Rx and message him to let him know that we're canceling because we have been unable to get in touch with him, we wish him the best, and he can reach out anytime if he wants to resume treatment.", "a": "", "cat": "General"}], "categories": [{"name": "General", "count": 424}, {"name": "TRT", "count": 211}, {"name": "Labs", "count": 144}, {"name": "GLP", "count": 140}, {"name": "HRT", "count": 106}, {"name": "Billing", "count": 42}, {"name": "Shipping", "count": 20}, {"name": "Cancellation", "count": 18}, {"name": "RN", "count": 12}, {"name": "Akute", "count": 10}, {"name": "DR", "count": 8}, {"name": "Async", "count": 6}, {"name": "F/U", "count": 5}, {"name": "Curexa", "count": 4}, {"name": "Extra Meds", "count": 3}, {"name": "Escalation", "count": 2}, {"name": "CS", "count": 1}]};

<script>
const macros = MACRO_DB.macros;
const categories = MACRO_DB.categories;
let activeCategory = 'all';
let searchQuery = '';
let debounceTimer;

/* ── LocalStorage helpers ── */
function getFavorites() {
  try { return JSON.parse(localStorage.getItem('fv_favs') || '[]'); } catch { return []; }
}
function setFavorites(arr) {
  localStorage.setItem('fv_favs', JSON.stringify(arr));
}
function isFavorite(name) {
  return getFavorites().includes(name);
}
function toggleFavorite(name) {
  let favs = getFavorites();
  if (favs.includes(name)) { favs = favs.filter(f => f !== name); }
  else { favs.unshift(name); }
  setFavorites(favs);
  renderFavSidebar();
  renderResults();
}

function getRecent() {
  try { return JSON.parse(localStorage.getItem('fv_recent') || '[]'); } catch { return []; }
}
function addRecent(name) {
  let recent = getRecent().filter(r => r !== name);
  recent.unshift(name);
  if (recent.length > 8) recent = recent.slice(0, 8);
  localStorage.setItem('fv_recent', JSON.stringify(recent));
  renderRecentSidebar();
}

/* ── Init ── */
document.getElementById('totalStats').textContent = macros.length + ' macros';
document.getElementById('allCount').textContent = macros.length;

const catList = document.getElementById('catList');
categories.forEach(cat => {
  const btn = document.createElement('button');
  btn.className = 'cat-btn';
  btn.dataset.cat = cat.name;
  btn.onclick = function() { filterCategory(cat.name, this); };
  btn.innerHTML = '<span>' + escHtml(cat.name) + '</span><span class="cat-count">' + cat.count + '</span>';
  catList.appendChild(btn);
});

/* ── Search ── */
document.getElementById('searchInput').addEventListener('input', function() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => {
    searchQuery = this.value.trim().toLowerCase();
    renderResults();
  }, 120);
});

document.addEventListener('keydown', function(e) {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('searchInput').focus();
    document.getElementById('searchInput').select();
  }
  if (e.key === 'Escape') {
    document.getElementById('searchInput').blur();
  }
});

function filterCategory(cat, btn) {
  activeCategory = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderResults();
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

/* ── Variable highlighting ── */
function highlightVariables(htmlStr) {
  // Match {{variable}}, {variable}, [placeholder], <placeholder>, CAPS_PLACEHOLDER
  return htmlStr
    .replace(/(\{\{[^}]+\}\})/g, '<span class="var-highlight">$1</span>')
    .replace(/(\{[^}]{1,50}\})/g, function(m) {
      if (m.includes('var-highlight')) return m;
      return '<span class="var-highlight">' + m + '</span>';
    })
    .replace(/(\[[A-Z][A-Z_ ]{2,40}\])/g, '<span class="var-highlight">$1</span>')
    .replace(/(\[(?:first|last|patient|provider|client|customer|name|email|phone|date|time|address|city|state|zip|medication|dose|rx|drug|appointment)[^\]]{0,30}\])/gi, '<span class="var-highlight">$1</span>');
}

function highlightText(text, query) {
  if (!query) {
    let h = escHtml(text);
    return highlightVariables(h);
  }
  const escaped = escHtml(text);
  const terms = query.split(/\s+/).filter(t => t.length > 1);
  if (!terms.length) return highlightVariables(escaped);
  const regex = new RegExp('(' + terms.map(t => t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).join('|') + ')', 'gi');
  return highlightVariables(escaped.replace(regex, '<mark>$1</mark>'));
}

function scoreMatch(macro, query) {
  if (!query) return 1;
  const terms = query.split(/\s+/).filter(t => t.length > 0);
  let score = 0;
  const nameLower = macro.n.toLowerCase();
  const contentLower = macro.c.toLowerCase();

  for (const term of terms) {
    if (nameLower === term) score += 100;
    else if (nameLower.startsWith(term)) score += 50;
    else if (nameLower.includes(term)) score += 25;
    if (contentLower.includes(term)) {
      score += 10;
      const idx = contentLower.indexOf(term);
      if (idx < 50) score += 5;
    }
    if (macro.a.toLowerCase().includes(term)) score += 3;
  }
  return score;
}

/* ── Hover preview ── */
let previewTimeout;
const tooltip = document.getElementById('previewTooltip');

function showPreview(e, content) {
  clearTimeout(previewTimeout);
  previewTimeout = setTimeout(() => {
    const maxLen = 350;
    let preview = content.length > maxLen ? content.substring(0, maxLen) + '...' : content;
    tooltip.textContent = preview;
    const rect = e.target.closest('.macro-card').getBoundingClientRect();
    let top = rect.top;
    let left = rect.right + 12;
    if (left + 420 > window.innerWidth) { left = rect.left - 432; }
    if (left < 8) { left = 8; top = rect.bottom + 8; }
    if (top + 220 > window.innerHeight) { top = window.innerHeight - 230; }
    if (top < 8) top = 8;
    tooltip.style.top = top + 'px';
    tooltip.style.left = left + 'px';
    tooltip.classList.add('visible');
  }, 350);
}

function hidePreview() {
  clearTimeout(previewTimeout);
  tooltip.classList.remove('visible');
}

/* ── Render ── */
function renderResults() {
  const container = document.getElementById('results');
  const sort = document.getElementById('sortSelect').value;

  let filtered = macros.filter(m => {
    if (activeCategory !== 'all' && m.cat !== activeCategory) return false;
    if (!searchQuery) return true;
    const terms = searchQuery.split(/\s+/).filter(t => t.length > 0);
    return terms.every(term =>
      m.n.toLowerCase().includes(term) ||
      m.c.toLowerCase().includes(term) ||
      m.a.toLowerCase().includes(term)
    );
  });

  if (sort === 'favorites') {
    const favs = getFavorites();
    filtered.sort((a, b) => {
      const aFav = favs.includes(a.n) ? 0 : 1;
      const bFav = favs.includes(b.n) ? 0 : 1;
      if (aFav !== bFav) return aFav - bFav;
      return a.n.localeCompare(b.n);
    });
  } else if (sort === 'relevance' && searchQuery) {
    filtered.sort((a, b) => scoreMatch(b, searchQuery) - scoreMatch(a, searchQuery));
  } else {
    filtered.sort((a, b) => a.n.localeCompare(b.n));
  }

  document.getElementById('resultsCount').textContent = filtered.length + ' result' + (filtered.length !== 1 ? 's' : '');

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty-state"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><h3>No macros found</h3><p>Try adjusting your search terms or category filter.</p></div>';
    return;
  }

  const show = filtered.slice(0, 200);
  let html = '';

  for (const m of show) {
    const hasActions = m.a && m.a.trim();
    const favClass = isFavorite(m.n) ? ' is-fav' : '';
    const favIcon = isFavorite(m.n) ? '&#9733;' : '&#9734;';
    const macroId = 'mc_' + btoa(encodeURIComponent(m.n)).replace(/[^a-zA-Z0-9]/g, '').substring(0, 16);

    html += '<div class="macro-card" id="' + macroId + '" data-name="' + escHtml(m.n) + '" onmouseenter="showPreview(event, ' + JSON.stringify(JSON.stringify((m.c || '').substring(0, 500))) + ')" onmouseleave="hidePreview()">';
    html += '<div class="macro-header" onclick="openCard(this.parentElement, \'' + escHtml(m.n).replace(/'/g, "\\'") + '\')">';
    html += '<div class="macro-expand-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg></div>';
    html += '<div class="macro-info">';
    html += '<div class="macro-name">' + highlightText(m.n, searchQuery) + '</div>';
    html += '<div class="macro-meta">';
    html += '<span class="macro-category-tag">' + escHtml(m.cat) + '</span>';
    html += '</div></div>';
    html += '<button class="fav-btn' + favClass + '" title="' + (isFavorite(m.n) ? 'Remove from favorites' : 'Add to favorites') + '" onclick="event.stopPropagation(); toggleFavorite(\'' + escHtml(m.n).replace(/'/g, "\\'") + '\')">' + favIcon + '</button>';
    html += '</div>';
    html += '<div class="macro-body">';
    html += '<div class="macro-content">' + highlightText(m.c || '(No content)', searchQuery) + '</div>';
    html += '<div class="macro-actions-bar">';
    html += '<button class="copy-btn" onclick="event.stopPropagation(); copyMacro(this, ' + JSON.stringify(JSON.stringify(m.c)) + ')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copy content</button>';
    if (hasActions) html += '<span class="macro-actions-info">Actions: ' + escHtml(m.a) + '</span>';
    html += '</div></div></div>';
  }

  if (filtered.length > 200) {
    html += '<div style="text-align:center;padding:20px;color:var(--text-muted);font-size:14px;">Showing 200 of ' + filtered.length + ' results. Refine your search to see more.</div>';
  }

  container.innerHTML = html;
}

function openCard(card, name) {
  card.classList.toggle('open');
  hidePreview();
  if (card.classList.contains('open')) {
    addRecent(name);
  }
}

function copyMacro(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.classList.add('copied');
    btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg> Copied!';
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copy content';
    }, 1500);
  });
}

/* ── Sidebar: Favorites ── */
function renderFavSidebar() {
  const list = document.getElementById('favList');
  const favs = getFavorites();
  if (favs.length === 0) {
    list.innerHTML = '<div class="sidebar-empty">Pin macros you use often</div>';
    return;
  }
  let html = '';
  for (const name of favs) {
    html += '<div class="sidebar-fav-item" onclick="scrollToMacro(\'' + escHtml(name).replace(/'/g, "\\'") + '\')">';
    html += '<span style="color:var(--fav-color);font-size:12px;">&#9733;</span>';
    html += '<span class="fav-name">' + escHtml(name) + '</span>';
    html += '<span class="remove-fav" title="Remove" onclick="event.stopPropagation(); toggleFavorite(\'' + escHtml(name).replace(/'/g, "\\'") + '\')">&times;</span>';
    html += '</div>';
  }
  list.innerHTML = html;
}

/* ── Sidebar: Recently Viewed ── */
function renderRecentSidebar() {
  const list = document.getElementById('recentList');
  const recent = getRecent();
  if (recent.length === 0) {
    list.innerHTML = '<div class="sidebar-empty">No recent macros</div>';
    return;
  }
  let html = '';
  for (const name of recent.slice(0, 6)) {
    html += '<div class="sidebar-recent-item" onclick="scrollToMacro(\'' + escHtml(name).replace(/'/g, "\\'") + '\')">';
    html += '<span style="font-size:11px;">&#128337;</span>';
    html += '<span class="recent-name">' + escHtml(name) + '</span>';
    html += '</div>';
  }
  list.innerHTML = html;
}

function scrollToMacro(name) {
  /* Clear filters to ensure macro is visible */
  searchQuery = '';
  document.getElementById('searchInput').value = '';
  activeCategory = 'all';
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.cat-btn[data-cat="all"]').classList.add('active');
  renderResults();

  /* Find and open the card */
  setTimeout(() => {
    const cards = document.querySelectorAll('.macro-card');
    for (const card of cards) {
      if (card.dataset.name === name) {
        card.classList.add('open');
        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
        card.style.boxShadow = '0 0 0 3px var(--accent-light)';
        setTimeout(() => { card.style.boxShadow = ''; }, 2000);
        addRecent(name);
        break;
      }
    }
  }, 50);
}

/* ── Init sidebars and render ── */
renderFavSidebar();
renderRecentSidebar();
renderResults();
</script>
</div><!-- end app-content -->

<script>
async function hashPassword(pw) {
  const data = new TextEncoder().encode(pw);
  const buf = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

const HASH = 'e30c40eeab07c37b96476e9d1ed99bba2f3e295ac1ad001dd229a052e9e46b9a';

function initAuth() {
  if (sessionStorage.getItem('fv_auth') === 'true') { unlock(); }
}

function unlock() {
  document.getElementById('authOverlay').classList.add('hidden');
  document.getElementById('appContent').classList.add('visible');
}

async function checkAuth() {
  const pw = document.getElementById('authInput').value;
  const h = await hashPassword(pw);
  if (h === HASH) {
    sessionStorage.setItem('fv_auth', 'true');
    unlock();
  } else {
    document.getElementById('authInput').classList.add('error');
    document.getElementById('authError').style.display = 'block';
    setTimeout(() => {
      document.getElementById('authInput').classList.remove('error');
    }, 1500);
  }
  return false;
}

initAuth();
</script>
