on at this time. Our approach to treatment is symptom-based, which is the gold standard for HRT cream therapy.", "a": "", "cat": "HRT"}, {"n": "HRT Lead scheduling VV before compelted Assessment", "c": "Hi there, it seems a system error has occurred. You were scheduled for a video visit before first completing some very important steps include the assessment and intake.\n\nWe will need to cancel your visit at this time. Once the proper steps have been completed our team may assist you with scheduling. Please let us know if any questions regarding the assessment you may locate on this page: https://fountain.net/hrt", "a": "", "cat": "HRT"}, {"n": "HRT MD - Follow-up visit", "c": "Hello - it's time to schedule your visit with a Fountain provider! Here's the link to schedule your follow-up visit. This will let you schedule with a provider licensed in your state. Please select the 'Follow-up Visit' option: https://go.oncehub.com/FountainHRTMD\nIf you're traveling outside of your home state at the time of the visit please let us know, so we can make sure you see a provider licensed in that state.", "a": "", "cat": "HRT"}, {"n": "HRT MD - New patient visit", "c": "Hello - it's time to schedule your visit with a Fountain provider! Here's the link to schedule your visit. This will let you schedule with a provider licensed in your state. Please select the 'New Patient Visit' option: https://go.oncehub.com/FountainHRTMD\nIf you're traveling outside of your home state at the time of the visit please let us know, so we can make sure you see a provider licensed in that state.", "a": "", "cat": "HRT"}, {"n": "HRT MED:  BHRT information", "c": "BHRT are derived from soy or yams. I would like to provide you some resources about bioidentical hormones: https://www.belmarpharmasolutions.com/resources/patient-resources/patient-library/estradiol-e2-compound/ https://www.belmarpharmasolutions.com/resources/patient-resources/patient-library/progesterone-compound-2/ https://www.belmarpharmasolutions.com/resources/patient-resources/patient-library/testosterone-compound-2/", "a": "", "cat": "HRT"}, {"n": "HRT MED: Can estrogen or progesterone lower your heart rate? mine has been low and I've felt a bit loopy on it", "c": "A decreased heart rate isn't usually associated with progesterone use. However, this hormone can cause drowsiness. To manage this side effect, it's recommended to take progesterone at least 2 hours prior to your usual bedtime.", "a": "", "cat": "HRT"}, {"n": "HRT MED: Hot heat melted HRT Cream", "c": "Please allow T cream to sit at room temperature for a few hours and see if it returns to a stable cream state. If there is any question about the quality of the med, we can always send it again.", "a": "", "cat": "HRT"}, {"n": "HRT MED: How do I use the HRT cream", "c": "Please apply one click(0.25mL) of the estrogen and testosterone combined cream/powder directly to your inner labia once daily. I have attached a diagram (insert here) of the female genitalia for reference. The Progesterone 200 mg capsule should be taken by mouth once a night, about 1-2 hours before bedtime.", "a": "", "cat": "HRT"}, {"n": "HRT MED: How long before I see/feel results with HRT? APPLIES TO HRT PATIENTS THAT BEGAN AFTER 10/29", "c": "HRT therapy can take several weeks before you begin to notice changes or feel results. During the personalization phase of your treatment, you\u2019ll receive periodic asynchronous check-in forms so we can better understand how you\u2019re feeling and how your body is responding.\nYou\u2019re always welcome to reach out to our team here with any questions or concerns. We\u2019re happy to help you understand what to expect during this time and determine whether any adjustments to your regimen may be needed.", "a": "", "cat": "HRT"}, {"n": "HRT MED: How long does it take for the medication(s) to take effect?", "c": "With progesterone capsules, many patients begin to notice mild improvements within 7\u201310 days, such as better sleep and improved mood, which often continue to progress over time. With testosterone cream, benefits like increased energy levels and improved libido may be noticed within the first few weeks.\nThese changes tend to be gradual rather than dramatic and do not happen overnight. The first few weeks are also when some side effects may occur as your body adjusts to the increased hormone levels. For best results, we recommend using your treatment consistently and allowing your body time to adapt.", "a": "", "cat": "HRT"}, {"n": "HRT MED: I got no instructions with my medication; how do I use this hormone cream", "c": "The testosterone combination cream may be applied at the time of day that best fits your routine. Morning application is often recommended, as it may support improved energy levels throughout the day. If enhancing libido is a primary goal, applying the cream a couple of hours before anticipated sexual activity may offer the best results.\nBe sure to rub the cream in thoroughly to support optimal absorption. If applying to the inner labia we do recommend avoiding restroom use for 45 minutes to one hour after application, as this allows the active ingredients adequate time to absorb before they could be wiped away.\nTo further support absorption, please avoid showering, swimming, or exercising for at least two hours after applying the cream. As always, feel free to reach out to our team if you have any questions or concerns\u2014we\u2019re happy to help.", "a": "", "cat": "HRT"}, {"n": "HRT MED: Integrity of the medication", "c": "Prior to starting your treatment, please confirm that the integrity of your medication has not been altered due to the damage that occurred during shipment. You may provide an image to our team via text message if you are unsure.", "a": "", "cat": "HRT"}, {"n": "HRT MED: Patients post hysterectomy needing progesterone", "c": "Progesterone's effects extend beyond the uterus, influencing the brain, skeletal system, breast tissue, and vaginal health. Women who have undergone hysterectomies still require and benefit from progesterone supplementation.", "a": "", "cat": "HRT"}, {"n": "HRT MED: What are the side effects of HRT?", "c": "Some common side effects of HRT:\nWeight gain\nBreast tenderness\nSpotting: can include light bleeding or cramping\nAcne: can be caused by hormonal fluctuations\nMood changes: include low mood or depression\nFatigue\nHeadaches\nIncreased facial hair\nBloating:\nCommon side effects of Progesterone:\nMood changes\u2026.feeling more low\nFatigued, feeling foggy in the morning\u2026..(take Progesterone earlier in the evening to help with this.)\nBreast tenderness\nCommon side effects of Testosterone:\nbreast enlargement and/or pain.\nOily skin/acne\nmood changes\nHeadache\n\nSide effects can appear within the first few weeks of starting HRT, but they usually subside as your body adjusts to the new hormone level. As time goes on hormone levels balance back out, many of the early side effects may subside\n", "a": "", "cat": "HRT"}, {"n": "HRT MED: What plants are used for your HRT medications?", "c": "Hi there, BHRT are derived from soy or yams. You may utilize the following links to view the specifications of each of the following HRT options we provide: Estradiol, Progesterone, and Testosterone.\n\nhttps://www.belmarpharmasolutions.com/resources/patient-resources/patient-library/estradiol-e2-compound/\nhttps://www.belmarpharmasolutions.com/resources/patient-resources/patient-library/progesterone-compound-2/\nhttps://www.belmarpharmasolutions.com/resources/patient-resources/patient-library/testosterone-compound-2/\n\u200b", "a": "", "cat": "HRT"}, {"n": "HRT MED: What to look for if Estrogen level is too high?", "c": "Hi there, if your estrogen level becomes too high, you may experience symptoms such as breast tenderness, nipple tenderness, sensitivity, ankle swelling, bloating, mood changes and/or increased breast tissue. Please let us know if you feel as though you are experiencing any of these symptoms.", "a": "", "cat": "HRT"}, {"n": "HRT MED: Why creams instead of an oral medication, like with birth control", "c": "We only offer Estrogen and Testosterone in the form of cream, not oral. Oral hormones are metabolized through the liver and increase risk of blood clots and other side effects. Cream is the only option with us at Fountain.\n", "a": "", "cat": "HRT"}, {"n": "HRT MI - Follow-up visit", "c": "Hello - it's time to schedule your visit with a Fountain provider! Here's the link to schedule your follow-up visit. This will let you schedule with a provider licensed in your state. Please select the 'Follow-up Visit' option: https://go.oncehub.com/FountainHRTMI\nIf you're traveling outside of your home state at the time of the visit please let us know, so we can make sure you see a provider licensed in that state.", "a": "", "cat": "HRT"}, {"n": "HRT MI - New patient visit", "c": "Hello - it's time to schedule your visit with a Fountain provider! Here's the link to schedule your visit. This will let you schedule with a provider licensed in your state. Please select the 'New Patient Visit' option: https://go.oncehub.com/FountainHRTMI\nIf you're traveling outside of your home state at the time of the visit please let us know, so we can make sure you see a provider licensed in that state.", "a": "", "cat": "HRT"}, {"n": "HRT MT - Follow-up visit", "c": "Hello - it's time to schedule your visit with a Fountain provider! Here's the link to schedule your follow-up visit. This will let you schedule with a provider licensed in your state. Please select the 'Follow-up Visit' option: https://go.oncehub.com/FountainHRTMT\nIf you're traveling outside of your home state at the time of the visit please let us know, so we can make sure you see a provider licensed in that state.", "a": "", "cat": "HRT"}, {"n": "HRT MT - New patient visit", "c": "Hello - it's time to schedule your visit with a Fountain provider! Here's the link to schedule your visit. This will let you schedule with a provider licensed in your state. Please select the 'New Patient Visit' option: https://go.oncehub.com/FountainHRTMT\nIf you're traveling outside of your home state at the time of the visit please let us know, so we can make sure you see a provider licensed in that state.", "a": "", "cat": "HRT"}, {"n": "HRT Mon 2", "c": "Hello - this is Fountain. Just following up about your required routine labs. What times/dates would work for you?\n\u200b\nOur providers ask that you do not apply cream on the day of your lab visit until after your blood draw is complete. Please note that you can continue with your usual activities, including diet and exercise. Additionally, it\u2019s not necessary to have labs drawn at any specific point in your cycle, so you can schedule them at your convenience.", "a": "", "cat": "HRT"}, {"n": "HRT Mon 3", "c": "Hi - this is Fountain. Just a reminder, you're due for new lab work. Please let us know what times/dates would work for you to go in for new bloodwork.\n\nOur providers ask that you do not apply cream on the day of your lab visit until after your blood draw is complete. Please note that you can continue with your usual activities, including diet and exercise. Additionally, it\u2019s not necessary to have labs drawn at any specific point in your cycle, so you can schedule them at your convenience.", "a": "", "cat": "HRT"}, {"n": "HRT Mon Email", "c": "Hello from Fountain!\nWe're reaching out because you're just about due for your required monitoring lab work. We've sent a couple texts, but we haven't heard from you. Please 'REPLY' to this email or text us at: 833 967-3100 with some dates and times that would work for you so we can get you scheduled.\n\n\u200bOur providers ask that you do not apply cream on the day of your lab visit until after your blood draw is complete. Please note that you can continue with your usual activities, including diet and exercise. Additionally, it\u2019s not necessary to {"n": "HRT PA - Follow-up Visit", "c": "Hello - it's time to schedule your visit with a Fountain provider! Here's the link to schedule your follow-up visit. This will let you schedule with a provider licensed in your state. Please select the 'Follow-up Visit' option: https://go.oncehub.com/FountainHRTPA\nIf you're traveling outside of your home state at the time of the visit please let us know, so we can make sure you see a provider licensed in that state.", "a": "", "cat": "HRT"}, {"n": "HRT PA - New patient visit", "c": "Hello - it's time to schedule your visit with a Fountain provider! Here's the link to schedule your visit. This will let you schedule with a provider licensed in your state. Please select the 'New Patient Visit' option: https://go.oncehub.com/FountainHRTPA\nIf you're traveling outside of your home state at the time of the visit please let us know, so we can make sure you see a provider licensed in that state.", "a": "", "cat": "HRT"}, {"n": "HRT Price Objection DOES NOT APPLY TO NY HRT PT THAT START TREATMENT AFTER 12/17", "c": "While many programs advertise lower prices, they often charge extra for labs, video appointments, or extra hormone medications. Others may work with insurance, which creates a rigid structure for what can be offered.\nA membership plan with Fountain covers everything (labs in most states, video visits, medication, support, consultation, etc.) We do this because we believe treatments like testosterone require ongoing video visits and labs for best patient outcomes.\nThis increases our costs, and we understand we may not be for everyone, but we strive to offer the best program possible. As a result, our prices cannot be discounted further.\nHere's a complete pricing breakdown for our Fountain HRT subscription options offered at this time:  fountain.net/hrt#pricing \nPlease let us know if you have any questions.", "a": "", "cat": "HRT"}, {"n": "HRT Pricing", "c": "Here's a breakdown of pricing for our HRT Program: https://fountain.net/hrt#pricing", "a": "", "cat": "HRT"}, {"n": "HRT Program Video", "c": "You can find the video we created going over our HRT program here: https://fountain.net/hrt-visit\n\nPlease let us know if you have any questions!\n\n", "a": "", "cat": "HRT"}, {"n": "HRT TN - Follow-up visit", "c": "Hello - it's time to schedule your visit with a Fountain provider! Here's the link to schedule your follow-up visit. This will let you schedule with a provider licensed in your state. Please select the 'Follow-up Visit' option: https://go.oncehub.com/FountainHRTTN\nIf you're traveling outside of your home state at the time of the visit please let us know, so we can make sure you see a provider licensed in that state.", "a": "", "cat": "HRT"}, {"n": "HRT TN - New patient visit", "c": "Hello - it's time to schedule your visit with a Fountain provider! Here's the link to schedule your visit. This will let you schedule with a provider licensed in your state. Please select the 'New Patient Visit' option: https://go.oncehub.com/FountainHRTTN\nIf you're traveling outside of your home state at the time of the visit please let us know, so we can make sure you see a provider licensed in that state.", "a": "", "cat": "HRT"}, {"n": "HRT TX - Follow-up Visit", "c": "Hello - it's time to schedule your visit with a Fountain provider! Here's the link to schedule your follow-up visit. This will let you schedule with a provider licensed in your state. Please select the 'Follow-up Visit' option: https://go.oncehub.com/FountainHRTTX\nIf you're traveling outside of your home state at the time of the visit please let us know, so we can make sure you see a provider licensed in that state.", "a": "", "cat": "HRT"}, {"n": "HRT TX - New patient visit", "c": "Hello - it's time to schedule your visit with a Fountain provider! Here's the link to schedule your visit. This will let you schedule with a provider licensed in your state. Please select the 'New Patient Visit' option: https://go.oncehub.com/FountainHRTTX\nIf you're traveling outside of your home state at the time of the visit please let us know, so we can make sure you see a provider licensed in that state.", "a": "", "cat": "HRT"}, {"n": "HRT Temperature", "c": "Hi there, we understand you have concerns regarding the temperature of your HRT medications. It is okay to use the medication once it returns to room temperature. Please let us know if you have any further questions or concerns. Have a great day! ", "a": "", "cat": "HRT"}, {"n": "HRT TrustPilot Request", "c": "I'm very happy with your improvement. We'd greatly appreciate a review from you so people can hear about the experience from a patient. Here's the link: https://www.trustpilot.com/review/fountain.net You can post under a made-up name if you prefer. Thanks so much!  ", "a": "", "cat": "HRT"}, {"n": "HRT UT - Follow-up visit", "c": "Hello - it's time to schedule your visit with a Fountain provider! Here's the link to schedule your follow-up visit. This will let you schedule with a provider licensed in your state. Please select the 'Follow-up Visit' option: https://go.oncehub.com/FountainHRTUT\nIf you're traveling outside of your home state at the time of the visit please let us know, so we can make sure you see a provider licensed in that state.", "a": "", "cat": "HRT"}, {"n": "HRT UT - New patient visit", "c": "Hello - it's time to schedule your visit with a Fountain provider! Here's the link to schedule your visit. This will let you schedule with a provider licensed in your state. Please select the 'New Patient Visit' option: https://go.oncehub.com/FountainHRTUT\nIf you're traveling outside of your home state at the time of the visit please let us know, so we can make sure you see a provider licensed in that state.", "a": "", "cat": "HRT"}, {"n": "HRT VA - Follow-up Visit", "c": "Hello - it's time to schedule your visit with a Fountain provider! Here's the link to schedule your follow-up visit. This will let you schedule with a provider licensed in your state. Please select the 'Follow-up Visit' option: https://go.oncehub.com/FountainHRTVA\nIf you're traveling outside of your home state at the time of the visit please let us know, so we can make sure you see a provider licensed in that state.", "a": "", "cat": "HRT"}, {"n": "HRT VA - New patient visit", "c": "Hello - it's time to schedule your visit with a Fountain provider! Here's the link to schedule your visit. This will let you schedule with a provider licensed in your state. Please select the 'New Patient Visit' option: https://go.oncehub.com/FountainHRTVA\nIf you're traveling outside of your home state at the time of the visit please let us know, so we can make sure you see a provider licensed in that state.", "a": "", "cat": "HRT"}, {"n": "HRT WA - Follow-up visit", "c": "Hello - it's time to schedule your visit with a Fountain provider! Here's the link to schedule your follow-up visit. This will let you schedule with a provider licensed in your state. Please select the 'Follow-up Visit' option: https://go.oncehub.com/FountainHRTWA\nIf you're traveling outside of your home state at the time of the visit please let us know, so we can make sure you see a provider licensed in that state.", "a": "", "cat": "HRT"}, {"n": "HRT WA - New patient visit", "c": "Hello - it's time to schedule your visit with a Fountain provider! Here's the link to schedule your visit. This will let you schedule with a provider licensed in your state. Please select the 'New Patient Visit' option:  https://go.oncehub.com/FountainHRTWA \nIf you're traveling outside of your home state at the time of the visit please let us know, so we can make sure you see a provider licensed in that state.", "a": "", "cat": "HRT"}, {"n": "HRT expectations initial 4-8 weeks", "c": "Hi there, it\u2019s not uncommon for symptoms to take some time to improve, as your hormone levels need adequate time to adjust. During this adjustment period, many patients experience temporary side effects that typically subside once their levels begin to stabilize. This initial phase usually lasts about 4\u20138 weeks.\nIf anything feels concerning or you notice significant changes, please don\u2019t hesitate to reach out\u2014we\u2019re here to support you throughout this process.", "a": "", "cat": "HRT"}, {"n": "HRT patient signed up after 1/21/26 was provided video in error that mentions lab work", "c": "Hi there, we apologize for any miscommunication! We currently do not offer lab work with our HRT subscription that you recently signed up for. If you could please provide us with a link to the video you are referencing (or even a screenshot of the video), and confirm when you were provided this video.\n\u200b\nOur approach to your treatment is symptom-based, which is the gold standard for HRT cream therapy. Our providers primarily use your feedback and symptoms as the guide for adjusting your treatment. This is actually the recommended approach, as major medical societies do not advise routine lab monitoring for HRT treatment due to their unpredictable nature.\n\u200b\nLab values with topical HRT can vary significantly based on multiple factors, including the timing of application, where the cream was applied on your body, and the amount used, making them unreliable. Instead, we focus on how you're feeling and responding to therapy.\n\u200b\nOur team will check in with you every 2 weeks during the initial 90 days to assess how you're responding to your regimen and make any necessary adjustments based on your symptoms", "a": "", "cat": "HRT"}, {"n": "HRT picture if applying to inner labia", "c": "Hi there! I've attached a resource demonstrating the correct location for the HRT cream application. Please review and let us know if you have any questions regarding where to apply the medication. \nhttps://blog.fountaintrt.com/female-anatomy/\nHave a great day! ", "a": "", "cat": "HRT"}, {"n": "HRT vulvar labia anatomy image picture", "c": "The cream works best when applied to the inner labia, where the tissue is thinner and allows better absorption. The outer labia isn't ideal because it's thicker and experiences more friction from clothing and movement, leading to less absorption. Please click the link for an image of the anatomy - inner labia is circled in red.", "a": "", "cat": "HRT"}, {"n": "HRT: Assessment Link", "c": "If you're interested in our HRT program please complete the assessment on our website at: https://fountain.net/hrt \nThe assessment will help us understand your needs better, and allow our medical team to provide appropriate recommendations when you speak with them.", "a": "", "cat": "HRT"}, {"n": "HRT: Cream Base", "c": "Our partner pharmacy sent us this link: https://www.belmarpharmasolutions.com/cream-base/, which provides additional information about their cream base. Please let us know if you have any other questions. ", "a": "", "cat": "HRT"}, {"n": "HRT: Expanded Labs  DO NOT SEND TO ANY HRT PATIENTS THAT SIGNED UP AFTER 1/21/26, OR NY HRT PT WHO START 12/17-> AFTER", "c": "Great! We\u2019re happy to help with that. You can find details about our expanded lab packages with the following link: https://blog.fountaintrt.com/fountainhrt-extra-labsets/\n\nWhen using our lab scheduling link, you\u2019ll have the option to select from the expanded lab panels. Any associated charges will be applied at checkout, and your lab order will automatically include the additional tests you choose.\n\nIf you have any questions or need assistance along the way, please don\u2019t hesitate to reach out\u2014we\u2019re here to help.", "a": "", "cat": "HRT"}, {"n": "HRT: Getting Started", "c": " If you're interested in our HRT program please complete the assessment on our website at: https://fountain.net/hrt The assessment will help us understand your needs better, and allow our medical team to provide appropriate recommendations when you speak with them.", "a": "", "cat": "HRT"}, {"n": "HRT: Male Medical Director", "c": "We have a number of providers with years of experience treating peri-menopausal and menopausal female patients. While Dr. Doron Stember is one of our co-founders and a leader in the company, he does not treat HRT patients. ", "a": "", "cat": "HRT"}, {"n": "HRT: Options", "c": "Our medical team prescribes oral progesterone, cream-based testosterone, and cream-based estradiol. This allows for easy dosage adjustments and consistent benefits. Please let us know if you have any other questions. ", "a": "", "cat": "HRT"}, {"n": "HRT: What labs do you order?", "c": "The labs our medical team orders for new patients are the following: FSH, Hemoglobin, and Hematocrit. Testosterone, Progesterone, Estradiol.", "a": "", "cat": "HRT"}, {"n": "HRT: What pharmacy is the medication processed at?", "c": "The medication is processed by Belmar Pharmacy.", "a": "", "cat": "HRT"}, {"n": "HRT: What states do you operate in?", "c": "We currently operate in the following states:\nWashington\nOregon\nIdaho\nMontana\nCalifornia\nNevada\nArizona\nUtah\nColorado\nNew Mexico\nTexas\nMinnesota\nIowa\nIllinois\nMichigan\nOhio\nTennessee\nFlorida\nNorth Carolina\nVirginia\nDistrict of Columbia\nMaryland\nPennsylvania\nNew York\nNew Jersey\nVermont\nMaine\nNorth Dakota\nIndiana\nWe hope to expand soon!", "a": "", "cat": "HRT"}, {"n": "Hair product- liquid", "c": "Our current products are not foam but we are going to be offering a foam product in the near future for patients who prefer that option.\nMinoxidil 7% + Minoxidil 6%/Dutasteride/Ketoconazole are both droppers with liquid you would apply and rub/massage into the affected areas.\nMinoxidil 7%/Tretinoin/Fluocinolone/Finasteride is a spray you would apply and rub/massage onto the affected areas.", "a": "", "cat": "General"}, {"n": "Heather Conard", "c": "Heather Conard, Medical Assistant", "a": "", "cat": "General"}, {"n": "Hormone patch/labs", "c": "Hi there, We recommend to take the old patch off, do labs and then replace patch after the lab draw. We want to see where the hormone levels are without being on replacement for the most accurate testing. Please let us know if you have any questions about this. ", "a": "", "cat": "Labs"}, {"n": "How to lower lipids, cholesterol, triglycerides", "c": "To minimize lipids, cholesterol, and triglycerides, follow a heart-healthy diet that reduces added sugars/refined carbohydrates, incorporates Omega-3 fatty acids, and limits saturated fats, trans fats, and dietary cholesterol. Additionally, regular aerobic exercise and weight management are essential to mitigate adverse lipid changes associated with TRT.  ", "a": "", "cat": "General"}, {"n": "IC Broken", "c": "Hello from Fountain! \n\u200b\nWe're currently experiencing technical issues with our texting platform. Due to this, we're sending emails out to patients so we can continue to provide high-quality support around the clock. We will continue to communicate over text once this problem is resolved. Thanks for your understanding.\n\n\n\u200b\n\u200b", "a": "", "cat": "General"}, {"n": "If a new sign up indicates we haven't contacted them", "c": "It looks like we sent a message to the phone number on file: on: Can you confirm that's the best number to reach you at?", "a": "", "cat": "General"}, {"n": "If a patient already has labs", "c": "Our medical team requests that all patients complete the lab panel we order to ensure we provide you with the best possible evaluation. This guarantees you will have the correct testing with current results to review with the provider. Excluding NY, NJ and RI these labs are already included as part of our evaluation fee and come at no extra cost.", "a": "", "cat": "Labs"}, {"n": "If a patient has issues registering with their zip code", "c": "Can you please try registering with a different address/zip code? It can be any address/zip code. We'll update the information in our system once you register.", "a": "", "cat": "General"}, {"n": "If a patient saw a provider before the next scheduled video visit date", "c": "Hello, this is: from Fountain. It looks like you were able to speak with a provider sooner than the next available video visit date. Can we cancel the video visit for you scheduled on: ?", "a": "", "cat": "General"}, {"n": "If a prescription was submitted but no API call was triggered.", "c": "Hi - we submitted a new script to our pharmacy partner on: The order should have gone out. We'll follow up with them and ensure that a new order goes out as soon as possible.", "a": "", "cat": "General"}, {"n": "If no task was created for a provider or the provider did not address the task.", "c": "Hi - we'll follow up with our medical team. There may have been some internal miscommunication which delayed your order going out. We'll work on getting your order out asap. Thanks for your patience.\n", "a": "", "cat": "General"}, {"n": "Indeed/Job inquiry", "c": "Hi there! All job applications are processed through Indeed. Please visit: https://www.indeed.com/cmp/Fountain-Vitality-Inc\nOur team is reviewing all applications.If we decide to proceed with your application, we will contact you.Thankyou!", "a": "", "cat": "General"}, {"n": "Initial H & P", "c": "First initial RX will be:\nHistory of Present Illness:\nPt has consented to a telehealth video visit. The patient has been informed of my own name, professional credentials, and location. The patient confirmed full name and date of birth.\nThe patient confirms that he/she is currently in\nPrimary Care Provider or Practice:\nEver screened for OSA?\nPast Medical History:\nThe patient reported the following medical conditions:\nPast medical history is negative\nChronic Kidney Disease\nConstipation\nEating disorder\nGallbladder disease\nOral contraception (tirzepatide interacts with oral contraception, making it less effective)\nPregnancy or breastfeeding, if applicable\nPancreatitis\nSuicidal ideation or attempt\nAnxiety\nDepression\nTachycardia\nType 1 Diabetes\nType 2 Diabetes\nThyroid Cancer\nActive medical problems (current cancer treatment, undergoing workup for the presence of symptoms, current GI issues without diagnosis):\nOther Past Medical History:\nSurgical History:\nFamily History:\nSocial History:\nReview of Systems:\nThe patient reported the following symptoms:\nnegative\nChest pain\nDecrease in exercise capacity\nDyspnea on exertion\nLower extremity edema\nPalpations\nSeasonal allergies\nAbdominal pain or cramping\nAbdominal distension\nConstipation\nDiarrhea\nNausea\nVomiting\nFlatulence\nEructation\nGERD\nFatigue\nDizziness\nHeadaches\nuncontrolled anxiety\nuncontrolled depression\nSuicidal ideation or attempts\nCough\nDyspnea on exertion\nWheezing\nMedications:\nAllergies:\nPhysical Exam:\nGen: Alert, no visible distress, non- toxic appearance.\nPsych: No pressured speech, not anxious appearing. Normal affect.\nPulm: No tachypnea, no resp distress. No audible wheeze. No accessory muscle use.\nENT: No hoarse voice, no drooling. No visible facial swelling.\nOverweight appearance:\nLabs:\nDiagnosis:\nE66.9 Obesity (BMI >30)\nE66.3 Overweight (BMI 25-29.9\nE10 Hypertension\nR03.0 Elevated blood pressure\nE78.5 Hyperlipidemia\nE11.9 Type 2 Diabetes (uncomplicated)\nE11.69 Type 2 Diabetes (complicated)\nR73.03 Pre Diabetes\nE03.9 Hypothyroidism\nE28.2 PCOS\nOther Obesity-related diagnoses:\nPrescribing and Side Effects:\nThe patient\u2019s medical history was evaluated and NO CONTRAINDICATIONS to GLP1 prescribing were found. We discussed GLP1 prescribing in detail, including risks of the medication, potential side effects and alternatives to this prescription. If female and pre-menopausal, the patient was counseled that if pregnancy occurs, GLP1s should be immediately discontinued and the patient should see OB/GYN for evaluation. GLP1s should be discontinued at least two months prior to a planned pregnancy. The patient verbalized and otherwise indicated understanding of the risks explained and of all counseling points noted above and below; the patient had the opportunity to ask questions. All questions were answered. The patient understands the need for ongoing monitoring via labs and visits. The patient will follow up with the Primary Care Provider to communicate treatment updates.\nSide effects were discussed with the patient.\nDiscussed with the patient that we do not expect weight loss with the starting dose of semaglutide or tirzepatide; this dose is used to get your body used to the medication. Discussed that when the patient starts losing weight, the expected weight loss is 1-1.5 lbs per week. The patient verbalized understanding. Results vary widely between individuals, and weight loss is not guaranteed for every patient. Success depends on medication adherence, lifestyle changes, and individual factors. We start with a low dose to minimize side effects, and the dose is gradually increased over several months.\nThe patient meets the criteria to move forward with GLP prescribing. Labs are not required, however labs are recommended and encouraged. If the patient would like to move forward with labs, our customer support team can assist with scheduling.\nWaiting on labs, no contraindications. Once labs are completed and if cleared to prescribe, can be prescribed\nWaiting on labs to confirm comorbidity, no contraindications found. can be prescribed IF the patient has an obesity comorbidity.\nLabs were reviewed and no contraindications, therefore can be prescribed\nWaiting on labs and documentation, no labs present during the visit. No contraindications noted.\nLabs reviewed but waiting on ducmentation. No contraindications noted.\nThe patient had the following contraindications\nSpecific Counseling:\nNo specific patient counseling required\nLabs were noted to be abnormal, and the following plan was discussed with the patient:\nAlcohol Use- Discussed the risks of alcohol use and taking GLP1 medications. Recommended alcohol cessation while taking GLP1 medications.\nTobacco Use- The patient was counseled regarding the importance of tobacco use cessation.\nAnxiety- The patient was counseled that GLP1s can cause or worsen anxiety and cause suicidal ideation.\nDepression- The patient was counseled that GLP1s can cause or worsen depression and cause suicidal ideations.\nChronic kidney disease- The patient was counseled that GLP1s can worsen chronic kidney disease. The patient was counseled to see Primary Care Provider or Nephrologist, and provide us with an office visit note, prior to us prescribing GLP1s\nConstipation- The patient was counseled that GLP1s can cause or worsen constipation. A bowel regimen was discussed, and the patient was counseled to fully resolve chronic constipation prior to starting GLP1s. Hydration was counseled.\nGallbladder disease- The patient was counseled that GLP1s can cause or worsen gallbladder disease. The patient will contact us when active gallbladder disease issues have been resolved.\nSnoring- The patient was referred to Primary Care for consideration for sleep study to evaluate for possible obstructive sleep apnea.\nTachycardia- The patient was counseled that heart rate increases of 5-20 beats per minute have been reported. The patient was counseled to see Primary Care Provider or Cardiologist, and provide us with an office visit note, prior to us prescribing semaglutide. [ ] Note already provided and reviewed.\nType 2 Diabetes- The patient was counseled to continue to follow up with Primary Care or Endocrinology for ongoing management of type 2 diabetes. The patient was counseled that GLP1scan cause both hypoglycemia and hyperglycemia, as it can interact with diabetes medications and other medications. The patient was counseled regarding finger stick blood glucose monitoring.\nThe patient has known Diabetic Retinopathy and was counseled to see their Ophthalmologist or Endocrinologist, and provide us with an office visit note, prior to us prescribing GLP1s.\nWeight Loss Prescription Medication- The patient agreed to stop all prescription and over the counter weight loss medications prior to starting GLP1s.\nActive medical or surgical condition, not otherwise specified above. The patient was counseled to resolve the active issue and return to Fountain GLP when it is resolved.\nOther-", "a": "", "cat": "General"}, {"n": "Intermingled Profiles", "c": "Hello, \nIt looks like your profile has intermingled information for you and someone else who may have used the same email (likely a family member.) While we're glad that you're both interested in our programs, we would need you both to have separate profiles. You'll need to complete the assessment for us to decouple the profiles.  We can refund the additional assessment fees you paid upon re-registering - you'd just need to let us know after registering. \n\nPlease let us know if you have any questions. ", "a": "", "cat": "General"}, {"n": "Itemize Membership Fees", "c": "The membership fees include:\n\n-Access to Fountain's 24/7 customer service team\n-Access to Fountain's medical team\n-Access to Fountain's technical platforms/services.\n\nWe can certainly itemize these charges for you. Please just give us a few days. Thanks! ", "a": "", "cat": "General"}, {"n": "Itemized Receipts and Insurance", "c": "Due to the way our subscription service works, it isn't easy to get covered through your insurance. We can certainly attempt to help you get covered and provide you with whatever information you need, but please be aware that we can't guarntee that you'll get covered through your insurance provider.\n", "a": "", "cat": "General"}, {"n": "Janine Selten", "c": "- Janine Selten, NP", "a": "", "cat": "General"}, {"n": "Job Applications", "c": "All job applications are processed through Indeed. Please visit: https://www.indeed.com/cmp/Fountain-Vitality-Inc\nOur team is reviewing all applications. If we decide to move forward with your application, we will be in touch with you. Thank you!", "a": "", "cat": "General"}, {"n": "Josh Faucett", "c": "- Josh Faucett, NP", "a": "", "cat": "General"}, {"n": "Josh Stadler", "c": "- Josh Stadler, DO", "a": "", "cat": "General"}, {"n": "KR", "c": "-Krystal, MA", "a": "", "cat": "General"}, {"n": "Kaycee Ammons", "c": "Kaycee Ammons, Medical Assistant \n\nContact us: \n\u200bText us: 833-967-3100\nCall us: 213-237-1454", "a": "", "cat": "General"}, {"n": "Kelbie Tyree", "c": "Kelbie Tyree, Pharmacy Liason", "a": "", "cat": "General"}, {"n": "Krystal Rivera", "c": "Krystal Rivera, Medical Assistant ", "a": "", "cat": "General"}, {"n": "LC Sync Issue", "c": "Hello, \n\nIt appears like there's a syncing issue with our system and Labcorp's website. We're working on getting that fixed asap. Sorry about that. In the meantime, we can book you through Labcorp's website. What times/dates would work for you?\n\u200b\nPlease note that you may receive automated reminder messages regarding the need to book your visit if we schedule the visit through Labcorp directly. These messages can be disregarded.", "a": "", "cat": "General"}, {"n": "LC: Account Number", "c": "Our account number is: 09529930. It should be under 'account' on the lab order.", "a": "", "cat": "General"}, {"n": "LC: Bill - Alternative Provider", "c": "It looks like the tests were ordered by: they are not associated with our practice. Are you familiar with a provider with the name of the office or provider who wrote ordered the tests listed on the bill?", "a": "", "cat": "General"}, {"n": "LC: Bill - Alternative Provider Response", "c": "Got it. I'd suggest reaching out to Labcorp at: 800-845-6167 or the practice itself if you have any questions regarding this bill. Have a great day.", "a": "", "cat": "General"}, {"n": "LC: Bill - Ask Screenshot of Charge", "c": "Hi - thanks for letting us know. Can you please provide us with a screenshot of the bill, or invoice number? We'll look into it.", "a": "", "cat": "General"}, {"n": "LC: Bill Issue", "c": "Hey - thanks for reaching out. Can you please provide us with a screenshot of the bill? We'll look into it.", "a": "", "cat": "General"}, {"n": "LC: Bill Transfer", "c": "Thanks for sending us over. Labcorp should have billed our account, not you. This may have been due to an error by someone at the office. We'll email our Labcorp rep now. Please know that it can take between 30-90 days for the bill to be transferred over successfully to our account. During this time you may receive collection notices from Labcorp. Please disregard them. You will receive a notice from Labcorp once the bill has been transferred over.", "a": "", "cat": "General"}, {"n": "LC: Blood Test Redraw", "c": "Hey, this is: from Fountain. We contacted Labcorp and asked for an update on your results. They indicated there was an issue with the sample which caused the results not be processed correctly. This is frustrating - and they did not communicate with us in any capacity regarding this issue. We will need to schedule you for a new blood draw. What times/dates would work for you?", "a": "", "cat": "General"}, {"n": "LC: Book time not available", "c": "Hello from Fountain! We tried to book your lab visit, but unfortunately, your time slot wasn't available. Are there any other times/dates that would work for you? \n\n", "a": "", "cat": "Labs"}, {"n": "LC: Booked out", "c": "It appears that nearby Labcorp locations are booked out for the next two weeks. We can check on this in a week to see if there are any openings. Alternatively, you can walk into an office as a walk-in patient and probably get seen. Please note that it may take a while for them to see you if they are full, but most of our patients have good experiences as walk-ins. \n\nIf you choose to walk, please note you may continue to receive automated lab scheduling messages since the lab visit isn't recorded in our system. ", "a": "", "cat": "General"}, {"n": "LC: Booking Conf", "c": "We booked your lab visit! You should receive a text and an email with confirmation. \n\nPlease note that occasionally, Labcorp has issues finding the lab order despite it being submitted electronically prior to your visit. If they are unable to find the lab order, please text us ASAP, and we'll handle it for you. \n", "a": "", "cat": "General"}, {"n": "LC: Booking Link Fixed", "c": "Hello from Fountain! The booking link should be working now. Here's the link:  \n\nPlease let us know if you encounter any issues.\n\n", "a": "", "cat": "General"}, {"n": "LC: Can I bring an animal with me to my visit?", "c": "Labcorp has indicated that unless you have a trained service animal, they do not allow pets to accompany you during visits.", "a": "", "cat": "General"}, {"n": "LC: Can I bring my kids with me to the lab visit?", "c": "Labcorp has indicated that children must always be supervised during the lab collection.", "a": "", "cat": "Labs"}, {"n": "LC: Can my friend go to Labcorp with me?", "c": "Generally, someone above the age of 18 can accompany you to Labcorp and wait in the waiting room, but they are not permitted to enter the testing facilities with you.", "a": "", "cat": "Labs"}, {"n": "LC: Can they do the tests my doctor ordered as well?", "c": "Labcorp is typically able to use multiple different lab orders at the same appointment. If you encounter any issues for whatever reason, please let us know.", "a": "", "cat": "General"}, {"n": "LC: Can you send me a QR code?", "c": "Labcorp should have sent out an email with a QR code. If you don't see an email from Labcorp please check your spam folder.", "a": "", "cat": "General"}, {"n": "LC: Can't register due to travel", "c": "Due to how our system integrates with LabCorp, you\u2019ll need to register using your home address and choose a nearby LabCorp location to get started. Once that\u2019s done, just let us know if you\u2019d prefer to schedule your lab visit somewhere else\u2014we can send you a new link that will let you enter the address of your current location and book an appointment there instead.\n\nWe have a national account with LabCorp, so you're able to schedule your bloodwork in any state where LabCorp has locations. However, please note that we're unable to cover lab fees in NY, NJ, MD, RI, or MA due to local restrictions.\n\nAdditionally, even if you\u2019re traveling, you\u2019ll need to be in a state where we are licensed in order for us to prescribe treatment.\nLet us know if you have any questions\u2014we're happy to help!", "a": "", "cat": "General"}, {"n": "LC: Client Billing Issue", "c": "Hello,\nLabcorp should have charged our account. The order is submitted under 'client billing', in your state, which means they are supposed to bill us (the client.) This was a mistake on their end. We'll be able to transfer it over to our account -- we just need a screenshot of the bill. Thank you!", "a": "", "cat": "Billing"}, {"n": "LC: Do I need to let them know if I walk in?", "c": "You do not need to let Labcorp know if you walk in. The lab order should be in their system, and they should be able to take you in based on that. If there are any issues, please text us asap.", "a": "", "cat": "General"}, {"n": "LC: Do they have a dress code for patients?", "c": "Labcorp does not have a dress code for patients.", "a": "", "cat": "General"}, {"n": "LC: Emailing Labcorp for a Bill", "c": "Hi - this is ___ from Fountain's Customer Service Team. [Patient Name] received a bill from Labcorp. The PSC was: and the date of the appointment was: \nPlease transfer this bill over to Fountain's account (Account Number 09529930). Thank you very much!", "a": "", "cat": "Labs"}, {"n": "LC: Full Report Processing Time", "c": "Labcorp typically processes the preliminary results within 48 hours - but we're still waiting for your final report. We typically receive the full report within 5-7 days. We'll send you a link to schedule a visit with a member of our medical team once we receive it.", "a": "", "cat": "General"}, {"n": "LC: Hard to Find Labcorp Location", "c": "Hi, we booked the appointment at: but we don't have any additional information since all we do is submit the order and schedule the appointment through their website. If you're unable to find it, please let us know and we can try to schedule you at another location.", "a": "", "cat": "Labs"}, {"n": "LC: How long will I need to wait at Labcorp?", "c": "They should hopefully take you in shortly after you arrive but wait times will vary depending on the location.", "a": "", "cat": "Labs"}, {"n": "LC: If a patient who needs to go to LC asks us: I have prior bloodwork. Can I send that over?", "c": "Sure. You can send over any prior results if you would like to support@fountaintrt.com, text them over to the number you are currently texting, or fax them over to (202) 998-4218. We will add them to your chart, and during the consultation, the provider will review those results.", "a": "", "cat": "General"}, {"n": "LC: Labcorp Confirmation Email", "c": "Labcorp should have sent out an email with a QR code. We're unable to send out the code ourselves since Labcorp sends out the text themselves. If you don't see the email from Labcorp please check your spam folder.", "a": "", "cat": "Labs"}, {"n": "LC: Labcorp Sent Wrong Lab Order", "c": "Hello - we reached out to Labcorp, and the representative we spoke with indicated the wrong lab order was used for the test. They used a lab order that was submitted by: We will need to reschedule your visit due to this. What times/dates would work for you?", "a": "", "cat": "Labs"}, {"n": "LC: Labcorp is Closed", "c": "Labcorp allowed us to book at that location, and gave us no indication of any sudden closures. They are supposed to send patients an email when this happens - but it appears they failed to do so. We can reschedule you at another location. What times/dates would work for you?", "a": "", "cat": "Labs"}, {"n": "LC: Manual book", "c": "Hello, it looks like you weren't able to schedule an appointment with the provided link. We can schedule you manually. What time/date works for you?\n\n", "a": "", "cat": "General"}, {"n": "LC: NY/NJ/RI ONLY - How will my insurance be billed?", "c": "Labcorp will ask for your insurance card during your visit. They should attempt to bill your insurance for the labwork directly.", "a": "", "cat": "General"}, {"n": "LC: No times/dates/locations available", "c": "Got it. There may be a syncing issue with our site and Labcorp's site. Alternatively, there may be no nearby Labcorp locations near you. There are other options available other than Labcorp if needed. In the meantime, you should be able to complete the evaluation. Our team can schedule the visit for you after you complete the evaluation. Please let us know if you have any questions.", "a": "", "cat": "Labs"}, {"n": "LC: Not taking appointments", "c": "It appears that nearby Labcorp locations are not accepting appointments, which is why the booking link may not be working. However, most locations do from our experience, so this is unusual. You do have the option of walking in as a walk-in patient, though, and Labcorp can probably accommodate you. Please note that you may have to wait for a little while for them to take you in, but from our experience, most patients have a good experience as a walk-in patient. \nIf you choose to walk, please note that you may continue to receive automated lab scheduling messages, as the lab visit isn't recorded in our system.", "a": "", "cat": "General"}, {"n": "LC: Patient received results - link not sent yet", "c": "Thanks for letting us know! Once the results sync with our system, we'll send you a scheduling link to schedule a visit with a provider. Please let us know if we can help out with anything else!\n\u200b\n\u200b", "a": "", "cat": "General"}, {"n": "LC: Received results from Labcorp", "c": "We have received your test results from Labcorp! Our medical team will now review your labs and follow up with you soon. We're happy to share your lab results. You should receive an email from Akute Health with instructions to access the portal. If you don't see it, please check your spam folder.", "a": "", "cat": "Labs"}, {"n": "LC: Scheduling Test", "c": "Great! We booked your appointment. \n\nPlease note the following: \n-Sometimes Labcorp has issues finding the lab order. The lab order was submitted with the information you provided during the assessment. If they have issues finding the order with that information please contact us asap. We will handle it. \n-You do not need to fast, although you can if you would prefer. \n\nHere are the appointment details: \n\n\nPlease let us know if you have any questions. \n", "a": "", "cat": "General"}, {"n": "LC: Self Book", "c": "Got it. You can use this link to book your lab appointment:   \n\u200b\nIf you encounter any issues, please let us know.\n\u200b\n\u200b", "a": "", "cat": "General"}, {"n": "LC: Self Book Error", "c": "Hi there. I see that you weren't able to self-schedule your lab visit earlier. This may have been due to issues with Labcorp's website. Can you please try again using this link:  \n\u200b\nIf you encounter any issues, please let us know! ", "a": "", "cat": "General"}, {"n": "LC: Self Booking Link Down", "c": "Thanks for letting us know! Labcorp is having some technical issues at the moment, likely due to the holiday. We'll send you a new scheduling link once this issue has been fixed. \n\n", "a": "", "cat": "General"}, {"n": "LC: Self-book different state", "c": "Due to the current design of our system, if you wish to schedule an appointment in another state, you will need to provide a full address listed within the zip code you are looking for. It seems a little archaic - and we'll get that fixed when we can. Our team would be happy to assist further if you have any questions.\n\n", "a": "", "cat": "General"}, {"n": "LC: Self-booking delay", "c": "Currently, the link only allows scheduling up to two weeks. We're working on fixing that. For the time being, what we can do is follow up with you within two weeks of the preferred lab visit date. Would that work for you?\n\nJust so you know, if we do this, you may receive automated reminder messages to schedule your visit. You can simply disregard these. ", "a": "", "cat": "General"}, {"n": "LC: Self-booking link not working", "c": "Hello, \nIt appears like you weren't able to book your appointment through the booking link. No problem - we can help you book it. What times/dates would work for you? \n\u200b", "a": "", "cat": "General"}, {"n": "LC: Step 1 of Bill Process - Requesting bill to be sent over to us", "c": "Got it. Can you please send over a screenshot of the bill or invoice number? Our team would be happy to look into it. Lab orders are submitted under client billing in all states other than New York, New Jersey, Rhode Island, Massachusetts and Maryland, meaning they should have charged our account. It's certainly possible they made a mistake - which we should be able to address.", "a": "", "cat": "General"}, {"n": "LC: Tech Issues", "c": "Hey - we\u2019re currently experiencing technical issues with the LabCorp website. We\u2019ll schedule you once the website loads correctly. Thanks for your patience.", "a": "", "cat": "General"}, {"n": "LC: Traveling", "c": "I\u2019m sorry that we have been unable to find a convenient location for you. Are you traveling anytime soon? It\u2019s possible we can schedule you at an office near your destination.", "a": "", "cat": "General"}, {"n": "LC: Unable to Find Specific Area Provided by the Patient", "c": "We put the location you provided into Labcorp's website, but it didn't come up. Could you please provide the zip code of that area? Thank you.", "a": "", "cat": "General"}, {"n": "LC: Unable to get the bloodwork done due to an outstanding balance at Labcorp", "c": "Understood. We've asked LabCorp about this situation before, and they've indicated that they cannot perform the bloodwork we ordered for you until the past-due balance is addressed. Please let us know when it is, and we'll reschedule your appointment.", "a": "", "cat": "Labs"}, {"n": "LC: Visits are Booked Out - check other locations.", "c": "We can't comment on any specific location - but there is high demand in some areas which is increasing wait times for visits at Labcorp locations. We're happy to check other locations or look for nearby Quest offices.", "a": "", "cat": "General"}, {"n": "LC: Visits are Booked Out - walk In", "c": "We've checked nearby Labcorp and Quest locations, but they are all booked out. If you'd like to get in sooner you can walk into Labcorp. If you choose to do this, you may have to wait at the office for some time before they take you in. Our providers will submit the lab order electronically prior to your visit. Please note that you do not need to fast for your visit. If you encounter any issues at the office, please text us ASAP so we can assist you.", "a": "", "cat": "General"}, {"n": "LC: Why aren't the results appearing in Labcorp's portal?", "c": "Once all the results are processed, they typically appear in Labcorp's portal.", "a": "", "cat": "Labs"}, {"n": "LC: Why can't I get into Labcorp sooner?", "c": "Labcorp is a third party - we do not have any control of their available time slots. We share your frustration that they're booked out - but we're happy to look for alternative locations that can get you in sooner. We can also search for nearby Quest offices that may be able to take you in sooner.", "a": "", "cat": "Labs"}, {"n": "LC: Wrong Zip Code", "c": "LabCorp's site appears to have loaded your zip code incorrectly. Here's the nearest location: ", "a": "", "cat": "General"}, {"n": "Lab Changes", "c": "LabCorp recently raised its testing prices. Fountain members can complete labs at no added cost through Quest, our new primary lab partner. If you would prefer to continue using Labcorp, please note there will be an additional fee.", "a": "", "cat": "Labs"}, {"n": "Lab Order ID", "c": "Hello,\nHere's the lab order ID for your lab visit: \n\u200b\nPlease provide that number to our lab partner for your visit. Please let us know if we can help out with anything else. ", "a": "", "cat": "Labs"}, {"n": "Lab-Available Appointments", "c": "Hi, we apologize for any confusion. The date and time shown on the first page are simply the earliest available appointment. If you select it and continue through the prompts, you\u2019ll see additional options to choose from. Please let us know if you have any other questions.", "a": "", "cat": "Labs"}, {"n": "Labs Scheduling: Schedule for Missing Labs", "c": "Hi! We\u2019re happy to help you get your labs scheduled. This will be a quick test at a convenient location.\n\nWhat days and times work best for you this week?", "a": "", "cat": "Labs"}, {"n": "Labs don\u2019t work on holidays", "c": "Hi there, If you\u2019re trying to schedule a lab appointment on or during a holiday, you may experience some difficulty. We recommend waiting until the next business day after the holiday to try again. If the issue persists, please don\u2019t hesitate to contact our team here. Thank you!", "a": "", "cat": "Labs"}, {"n": "Labs: Alternative Lab Order Confirmation", "c": "Your lab order has been submitted. We can either fax it to the office, or we can send you a copy of the lab order. What would you prefer?", "a": "", "cat": "Labs"}, {"n": "Labs: Blood Draw Frequency", "c": "If prescribed, our team reaches out within 6-8 weeks of starting treatment. Patients then meet with a provider to review the labs and make any needed changes. The next set of labs would be 2-3 months later. Once an effective and safe dose is dialed in, labs are drawn every 5-6 months.", "a": "", "cat": "Labs"}, {"n": "Labs: Blood Test Complete", "c": "Great! Glad to hear you got the labs done. We should receive the results within the next few days. We'll then text you to let you know that the report is in and provide a link to schedule a video visit with your provider to review the results.", "a": "", "cat": "Labs"}, {"n": "Labs: Blood Test Type", "c": "At this time, the tests we order need to be done through a venous blood draw.", "a": "", "cat": "Labs"}, {"n": "Labs: Blurred Copy of Lab Results", "c": "Hi - thanks for sending over your report. Would it be possible for you to send over a clearer copy? Thank you.", "a": "", "cat": "Labs"}, {"n": "Labs: Can I get the lab order mailed out to me?", "c": "Our providers submit the orders electronically. We can send you a copy of the order over text, email, or fax it to you (if you have a fax), which you can bring to an office. At this time, we're not able to physically mail you a copy of the lab order.", "a": "", "cat": "Labs"}, {"n": "Labs: Can I use my lab results?", "c": "Our medical team requests that all patients get a new set of labs. This ensures we have updated values for all the specific tests they'll need to review and often saves time overall. These labs are covered in all states other than New York, Maryland, Massachusetts, New Jersey, and Rhode Island.\n\n", "a": "", "cat": "Labs"}, {"n": "Labs: Can coffee affect my results?", "c": "Our medical team has indicated the following: The only way coffee can affect your results is by causing dehydration. Specifically, testing of Hemoglobin and Hematocrit can be affected by dehydration. Please be sure to hydrate well with water prior to getting your blood work done.", "a": "", "cat": "Labs"}, {"n": "Labs: Can labs be done prior registration?", "c": "Due to the way our backend is set up our medical team cannot write orders for patients who have not registered.", "a": "", "cat": "Labs"}, {"n": "Labs: Confirmation", "c": "Here are the appointment details:\nYour lab order will be electronically submitted before your appointment and should be in their system by the time of the appointment. \nPlease note, our typical set of lab work does not require fasting. Our Fountain providers are able to read the numbers under both conditions. If you would prefer to fast, you certainly can but this is not necessary. **However, if you have opted to include our Cardiac Risk Analysis or Vital Metabolic & Energy Factors expanded lab panels you should fast. \nLab orders are submitted under client billing, meaning Quest/LabCorp should charge our account in most states. However, if you are in New York, New Jersey, and Rhode Island you will need to use your insurance.\nIf you encounter any issues at Quest/LabCorp (i.e they cannot find the order number), please text us immediately. Our team should be able to assist. \nYou will receive a link to schedule your video visit with one of our provider's to review your results once we have received your full report. Please reach out if you have any questions!", "a": "", "cat": "Labs"}, {"n": "Labs: Delayed Lab Results", "c": "Hello - the lab results typically come back within five days. Our team checks for these results several times per day. We'll let you once we have an update. Thanks for your patience.\n\u200b", "a": "", "cat": "Labs"}, {"n": "Labs: Do I need to bring anything to the lab visit?", "c": "The only thing you need to bring is your ID. Your lab order has been submitted electronically and should be available at the time of your visit. If for whatever reason the office has issues pulling it up, please text us ASAP.", "a": "", "cat": "Labs"}, {"n": "Labs: Do you partner with other labs?", "c": "Yes! We partner with Quest Diagnostics and cover the cost of labs for patients outside of New York, New Jersey, and Rhode Island.  We're happy to look for appointments at Quest if you'd prefer to go there.", "a": "", "cat": "Labs"}, {"n": "Labs: Due for labs - Needs refill", "c": "These messages are sent by our system thirty days before a patient is due for their refill. Once the RX is written these messages should be disabled. Given that we're scheduling you for labs prior to the visit you can simply ignore these messages until we get your labs back - the timing should ultimately work out.", "a": "", "cat": "Labs"}, {"n": "Labs: Due for labs but has not started treatment", "c": "No problem. Just to confirm - when do you intend to start treatment? We'll adjust your billing date, and your monitoring labs date accordingly.", "a": "", "cat": "Labs"}, {"n": "Labs: Early Appointment (After a week)", "c": "We'll reach out to your provider.", "a": "", "cat": "Labs"}, {"n": "Labs: Early Appointment (Within the week)", "c": "We can schedule you for lab work early if you'd like. What times/dates would work for you?", "a": "", "cat": "Labs"}, {"n": "Labs: East Broadway Medical Account Name", "c": "We should come up in Labcorp's system. If they are unable to find 'Fountain' in their system we may come up as East Broadway Medical. Please let us know if they are able to find us using that information.", "a": "", "cat": "Labs"}, {"n": "Labs: Expanded Labs - Charging", "c": "Got it. Please let us know which tests you'd like to add, and we'll process the charge. We'll ask our medical team to submit a new lab order for you once the charge goes through.", "a": "", "cat": "Labs"}, {"n": "Labs: Expanded Labs - HRT", "c": "Here's a link to our expanded lab packages: https://blog.fountaintrt.com/fountainhrt-extra-labsets/\nYou can add these panels onto your next set of labs during the scheduling process. If you have any issues accessing the options please let us know here. Thanks! ", "a": "", "cat": "Labs"}, {"n": "Labs: Expanded Labs - Order Confirmation", "c": "I can see that the tests ordered were the following:", "a": "", "cat": "Labs"}, {"n": "Labs: Expanded Labs - Successfully charged", "c": "We successfully charged your payment method for the expanded lab panel. We'll ask our medical team to submit a new lab order for you, and let you know once it's in.", "a": "", "cat": "Labs"}, {"n": "Labs: Expanded Labs - TRT", "c": "Great. We're happy to help you with that. Here's a link to our expanded lab packages: https://blog.fountaintrt.com/fountaintrt-extra-labsets/\nPlease let us know what tests you would like to order, and we'll get that set up for you.\nOnce you confirm your preference, please let us know, and we'll run a one-time charge for the panel. Please also confirm that the payment method we have on file ending with: is your preferred payment method. Thank you!", "a": "", "cat": "Labs"}, {"n": "Labs: Faxing Lab Order", "c": "Great. We just faxed the lab order over to: Since the order was sent to a third-party lab not affiliated with us, we may not receive the results on our end. Please let us know when you do. Thank you!", "a": "", "cat": "Labs"}, {"n": "Labs: GL - Mon", "c": "Hello from Fountain! We're ready to schedule your home blood draw through Getlabs. What times/dates would work for you?", "a": "", "cat": "Labs"}, {"n": "Labs: GLP - Do I need to fast?", "c": "Our Fountain providers are able to read the numbers under both conditions. If you would prefer to fast, you certainly can but this is not necessary.", "a": "", "cat": "Labs"}, {"n": "Labs: How do labs factor into my refills?", "c": "Our team reaches out to schedule you for labs based on the recommendation of your provider. The cadence of labs generally coincides with refill and video visits, but they may not always align perfectly.", "a": "", "cat": "Labs"}, {"n": "Labs: How long are lab orders valid for?", "c": "The lab order was submitted less than six months ago, so it should be valid. If they indicate they cannot use it for whatever reason please let us know, and we'll ask our medical team to submit a new one.", "a": "", "cat": "Labs"}, {"n": "Labs: How long does the blood draw take?", "c": "The blood draw should take somewhere between 5-15 minutes.", "a": "", "cat": "Labs"}, {"n": "Labs: How will my blood be taken?", "c": "It will be a venous blood draw.", "a": "", "cat": "Labs"}, {"n": "Labs: I just had my labs done yesterday, and there are results already?", "c": "These are preliminary results. The full report should come back within 5-7 days, but you can schedule a visit ahead of time.", "a": "", "cat": "Labs"}, {"n": "Labs: I'm already on TRT - won't my levels be skewed if I send a report over?", "c": "That's no problem. Our providers are used to working with patients who are already on treatment and consider that during the evaluation.", "a": "", "cat": "Labs"}, {"n": "Labs: I'm already on TRT Cream/Injections. When should I go in for labs?", "c": "Our medical team has advised the following: If you are using T injections you should get labs done on any day that works for you, other than the day you actually inject. If you are using a topical cream, you should apply the cream at your usual time and have labs drawn at whatever time is most convenient.", "a": "", "cat": "Labs"}, {"n": "Labs: I'm already on TRT. Will my results be accurate?", "c": "No problem - our providers take into account prior medical history/prior usage during consultation.", "a": "", "cat": "Labs"}, {"n": "Labs: I'm on Enclomiphine - should I use the medication before the lab test?", "c": "Our medical team has indicated that patients on Enclomiphine should take their medication as they normally would.", "a": "", "cat": "Labs"}, {"n": "Labs: I'm taking 'x' supplement. Does this affect the timing of the labs?", "c": "Generally, our medical team has advised that patients on boosters/supplements can get lab work done whenever it is convenient. If repeat labs are needed, the provider will discuss that with you during the visit.", "a": "", "cat": "Labs"}, {"n": "Labs: If I go to another state is the bloodwork covered?", "c": "Lab orders are submitted under client billing in all states outside of New York, New Jersey, and Rhode Island. If you go to Quest/LabCorp in any state outside of those mentioned they should charge our account (not you).", "a": "", "cat": "Labs"}, {"n": "Labs: If patient asks us to fax their lab order", "c": "Got it. We'll fax over the lab order to the facility. Can you please provide the name of the facility and their fax number? We'll let you know once it's faxed over. Thank you.", "a": "", "cat": "Labs"}, {"n": "Labs: If patient's lab order is in", "c": "Our medical team has submitted a new lab order for you. The lab order ID is: and the name of the ordering provider is:\nPlease let us know if they still have issues finding the order. If needed, we can fax over a copy to the office.", "a": "", "cat": "Labs"}, {"n": "Labs: Insufficient specimen collected, needs retesting", "c": "Hello, \n We reached out to the lab, and the representative advised that they were not able to process your full lab results due to insufficient specimens collected, and were advised that you'll need to go back in for recollection. That being said, when would be a good time for us to schedule a lab appointment for you?", "a": "", "cat": "Labs"}, {"n": "Labs: Invalid Order Info", "c": "Thanks for your patience. I think I see the issue here. We sent a message to our medical team and asked them to submit a new lab order asap. We'll notify you as soon as it's in.", "a": "", "cat": "Labs"}, {"n": "Labs: LC/Quest Bill Confirmation", "c": "Can you please send over a screenshot of the bill or invoice number? Our team would be happy to look into it. Lab orders are submitted under client billing in all states other than New York, New Jersey, and Rhode Island. This means Quest/LabCorp should have charged our account. ", "a": "", "cat": "Labs"}, {"n": "Labs: LC/Quest Unable to Find Patient's Order", "c": "It looks like the order was submitted by our medical team earlier. It should be in their system. Here's the lab order information:\nOrder ID:\nOrdering Provider:\nIf they still are unable to find your order with this information, please let us know, and we can fax over a copy of the order to the office.", "a": "", "cat": "Labs"}, {"n": "Labs: Missing DOB/Name on Lab Report", "c": "Hi - thanks for sending your lab report over. Could you send over a copy with your DOB/name listed in the report, please? Thank you very much!", "a": "", "cat": "Labs"}, {"n": "Labs: New Lab Order Needed", "c": "Hello: is an existing patient who needs a new lab order. They are scheduled for labs on: Thank you!", "a": "", "cat": "Labs"}, {"n": "Labs: New Labs Prior to Being Prescribed", "c": "When you speak with a provider they'll go through the process of restarting treatment with you. If necessary, we'll order new labs before restarting treatment.", "a": "", "cat": "Labs"}, {"n": "Labs: New Signup sends more results", "c": "Sure. You can send over any prior results if you would like to support@fountain.net, or text them over to the number you are currently texting, or fax them over to (202) 998-4218. We will add them to your chart, and during the consultation, the provider will review those results.", "a": "", "cat": "Labs"}, {"n": "Labs: No Outside Labs /Third Party Labs", "c": "We appreciate you sharing this information. At this time, we\u2019re unable to accept lab results or accommodate testing from third-party facilities due to how our system processes results.\nTo ensure accuracy and proper integration with your care, all lab work must be ordered by our medical team and completed through one of our lab partners (Quest or LabCorp) or via our at-home option with GetLabs. We understand this may be  less convenient and appreciate your understanding.\nPlease let us know if there\u2019s anything else we can help with.", "a": "", "cat": "Labs"}, {"n": "Labs: Objections to Getlabs Costs", "c": "Our costs have gone up across the board, and we're trying to keep the membership rate the same for as long as possible for patients in our care. We covered the costs of the at-home phlebotomy as long as we could, but unfortunately, we had to make this change recently.", "a": "", "cat": "Labs"}, {"n": "Labs: Objections to self-scheduling", "c": "We'd be happy to book the appointment for you if you prefer. The reason behind this change is that many patients found it more efficient to self-schedule their visits and found the back-and-forth regarding the lab visit sometimes disorganized. We still have that option available for any patients who would prefer us to schedule the visit for them, though. \n\n", "a": "", "cat": "Labs"}, {"n": "Labs: Ordering Expanded Labs", "c": "Hey - We can order an expanded lab panel for you. Please see the attached document if you're interested. If\nso, please let us know and we can charge your card on file for the tests.", "a": "", "cat": "Labs"}, {"n": "Labs: Patient Can't Decide on Schedule", "c": "If you'd like, you can check out their website for all the available appointments. Here's the link: https://www.labcorp.com/labs-and-appointments.\nIf you find anything that works, you can let us know and we'll schedule it for you.", "a": "", "cat": "Labs"}, {"n": "Labs: Patient Needs Repeat Labs", "c": "Hi - your provider indicated that you are due for repeat labs. What times/dates would work for you to go in?", "a": "", "cat": "Labs"}, {"n": "Labs: Patient's Lab Report is Beyond 1 Year", "c": "Hi - thanks for sending over your lab report. It looks like the report is older than a year, but that's no problem. We can schedule you for new lab work at a nearby Labcorp at no additional cost. Would that work for you?", "a": "", "cat": "Labs"}, {"n": "Labs: Period", "c": "Our medical team has indicated that if you are menstruating the day of your labwork, there shouldn't be any issues. Our providers can read the labs and interpret them based on where you are in your cycle at the time the labs are drawn.", "a": "", "cat": "Labs"}, {"n": "Labs: Processing Time for Lab Results", "c": "Hello - we usually receive the lab results within five days of the visit. Once we receive your lab results, we will text you. The text will contain a link to schedule a call with a provider to go over the results.", "a": "", "cat": "Labs"}, {"n": "Labs: Received Results from Fax", "c": "Your lab results have been received via fax! Our medical team will now review your labs and follow up with you soon.", "a": "", "cat": "Labs"}, {"n": "Labs: Received Results from Patient", "c": "We received your results! Our medical team will review them to see if they work, and we'll give you an update as soon as we can.", "a": "", "cat": "Labs"}, {"n": "Labs: Required ID for Lab Visits", "c": "LabCorp typically requires some form of photo ID. If you have a work ID, that may work.", "a": "", "cat": "Labs"}, {"n": "Labs: Reschedule Appointment", "c": "We're happy to reschedule your visit. What times/dates work for you?", "a": "", "cat": "Labs"}, {"n": "Labs: Results Email Requests", "c": "Hello,\nOur system is designed so that we share lab results through our EHR system, Akute Health, by default. That being said, we do have a secure method of emailing lab results to you. It may just take a while to get the document sent to you. Can you please confirm the best email for us to send the results to? Thank you!\n\n", "a": "", "cat": "Labs"}, {"n": "Labs: Sharing MyChart", "c": "If you are using MyChart by Epic via your mobile phone or laptop, you can have a PDF copy of your labs by following these steps:\nHope this helps! Kindly let us know if you experience any issues.", "a": "", "cat": "Labs"}, {"n": "Labs: Sharing Preliminary Lab Results", "c": "Hi - we're happy to text you a copy of your preliminary results. Would that work for you?", "a": "", "cat": "Labs"}, {"n": "Labs: Sharing Preliminary Lab Results", "c": "Attached is a copy of your preliminary results. Please let us know if you run into any issues accessing the document.", "a": "", "cat": "Labs"}, {"n": "Labs: Sharing Preliminary Results", "c": "We're happy to text you a copy of your preliminary results securely over text. Does that work for you? Please note they will be sent from a different number (929-416-3026)", "a": "", "cat": "Labs"}, {"n": "Labs: Texting a patient their lab order", "c": "Sure. We're happy to send you a copy of your lab order. Please note we'll be sending it through another number. If you have any issues accessing the document, please let us know.", "a": "", "cat": "Labs"}, {"n": "Labs: Travel", "c": "It doesn't appear like any Labcorp locations or Quest Diagnostics offices near you. Are you traveling soon? If so, we can try to find a labcorp/quest wherever you're traveling. ", "a": "", "cat": "Labs"}, {"n": "Labs: What do I do prior the test?", "c": "Our medical team generally advises that patients do what they normally would before the blood test. If repeat labs are needed, the provider will discuss that with you during the visit.", "a": "", "cat": "Labs"}, {"n": "Labs: What tests were ordered?", "c": "I can see that the tests ordered were the following:", "a": "", "cat": "Labs"}, {"n": "Labs: What would be the best time to get the test?", "c": "According to our medical team, testosterone levels may be slightly higher in the early morning, but we do not require any specific time of day for testing.", "a": "", "cat": "Labs"}, {"n": "Labs: When am I due for labs?", "c": "Hey - thanks for reaching out. We will reach out to schedule your labs on: \n\nPlease let us know if you have any other questions!\n\n\n", "a": "", "cat": "Labs"}, {"n": "Labs: When do I need to get the blood test by?", "c": "I see that we're set to reach out to schedule your labwork on:  \n\nYou should receive a text from us around that time. We generally advise patients to complete labwork within a week or so of the contact date.\n", "a": "", "cat": "Labs"}, {"n": "Lauren Godbold", "c": "Lauren Godbold, Registered Nurse ", "a": "", "cat": "General"}, {"n": "Lead with no available lab partner locations in their area", "c": "Unfortunately, there are no partner lab locations available in your area at this time. Due to this, we are unable to move forward with the process right now. We encourage you to check back with us in the future, as availability may change. Wishing you a great day!", "a": "", "cat": "Labs"}, {"n": "Leads", "c": "To answer specific questions about the medication you may receive or provide personalized recommendations, please complete our assessment so we can best tailor our responses to you.\nAssessment: https://fountain.net/\nThe assessment will help us understand your needs better and allow our medical team to provide appropriate recommendations when you speak with them.", "a": "", "cat": "General"}, {"n": "Legacy Anastrozole $125 (old)", "c": "We just set up your subscription! Please note that this subscription is billed at $125 every ten weeks. Unless you indicate that you need to pause/cancel the charge will be run automatically going forward.", "a": "", "cat": "General"}, {"n": "Legacy Anastrozole $150 (old)", "c": "We just set up your subscription! Please note that this subscription recurs at $150 every three months. Unless you indicate that you need to pause/cancel, the charge will be run automatically going forward.", "a": "", "cat": "General"}, {"n": "Legacy Anastrozole $50 (old)", "c": "We just set up your subscription! Please note that this subscription recurs monthly at $50. Unless you indicate that you need to pause/cancel the charge will be run automatically going forward.", "a": "", "cat": "General"}, {"n": "Legacy Enclomiphene $199 (old)", "c": "We just set up your subscription! Please note that this subscription recurs every month at $199. Please note that unless you indicate that you need to pause/cancel the charge will be run automatically going forward.", "a": "", "cat": "General"}, {"n": "Legacy Enclomiphene $499 (old)", "c": "We just set up your subscription! Please note that this subscription recurs every three months at $499. Please note that unless you indicate that you need to pause/cancel the charge will be run automatically going forward.", "a": "", "cat": "General"}, {"n": "Legacy HCG $500 (old)", "c": "We just set up your subscription! Please note that this subscription is billed at $500 every ten weeks. The subscription covers the costs of medication, shipping, consultation, and support. Unless you indicate that you need to pause/can
