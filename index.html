<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fountain Macro Hub</title>
<style>
  /* Password gate */
  .auth-overlay {
    position: fixed; inset: 0; z-index: 9999;
    background: linear-gradient(135deg, #0f766e 0%, #0d9488 50%, #14b8a6 100%);
    display: flex; align-items: center; justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  .auth-overlay.hidden { display: none; }
  .auth-box {
    background: #fff; border-radius: 16px; padding: 48px 40px; width: 380px;
    box-shadow: 0 25px 50px rgba(0,0,0,0.2); text-align: center;
  }
  .auth-box svg { margin-bottom: 16px; }
  .auth-box h1 { font-size: 22px; color: #1e293b; margin-bottom: 4px; }
  .auth-box p { font-size: 14px; color: #64748b; margin-bottom: 24px; }
  .auth-input {
    width: 100%; padding: 12px 16px; border: 1.5px solid #e2e8f0; border-radius: 10px;
    font-size: 15px; outline: none; transition: all 0.2s; margin-bottom: 16px;
  }
  .auth-input:focus { border-color: #0d9488; box-shadow: 0 0 0 3px #ccfbf1; }
  .auth-input.error { border-color: #ef4444; box-shadow: 0 0 0 3px #fee2e2; }
  .auth-btn {
    width: 100%; padding: 12px; background: #0d9488; color: #fff; border: none;
    border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer;
    transition: background 0.15s;
  }
  .auth-btn:hover { background: #0f766e; }
  .auth-error { color: #ef4444; font-size: 13px; margin-top: 10px; display: none; }
  .app-content { display: none; }
  .app-content.visible { display: block; }

  :root {
    --bg: #f8f9fb;
    --surface: #ffffff;
    --surface-hover: #f1f5f9;
    --border: #e2e8f0;
    --text: #1e293b;
    --text-secondary: #64748b;
    --text-muted: #94a3b8;
    --accent: #0d9488;
    --accent-light: #ccfbf1;
    --accent-dark: #0f766e;
    --highlight: #fef08a;
    --category-bg: #f1f5f9;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
    --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -1px rgba(0,0,0,0.04);
    --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.08), 0 4px 6px -2px rgba(0,0,0,0.03);
    --radius: 10px;
    --radius-sm: 6px;
    --fav-color: #f59e0b;
    --var-bg: #ede9fe;
    --var-color: #7c3aed;
    --var-border: #c4b5fd;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
  }

  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow-sm);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 700;
    font-size: 18px;
    color: var(--accent);
    white-space: nowrap;
  }

  .logo svg { flex-shrink: 0; }

  .search-wrap {
    flex: 1;
    max-width: 680px;
    position: relative;
  }

  .search-wrap svg {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    pointer-events: none;
  }

  .search-input {
    width: 100%;
    padding: 10px 14px 10px 42px;
    border: 1.5px solid var(--border);
    border-radius: 999px;
    font-size: 15px;
    outline: none;
    background: var(--bg);
    transition: all 0.2s;
  }

  .search-input:focus {
    border-color: var(--accent);
    background: var(--surface);
    box-shadow: 0 0 0 3px var(--accent-light);
  }

  .search-input::placeholder { color: var(--text-muted); }

  .stats {
    font-size: 13px;
    color: var(--text-secondary);
    white-space: nowrap;
  }

  .layout {
    display: flex;
    max-width: 1400px;
    margin: 0 auto;
    min-height: calc(100vh - 57px);
  }

  .sidebar {
    width: 260px;
    flex-shrink: 0;
    padding: 20px 16px;
    border-right: 1px solid var(--border);
    background: var(--surface);
    overflow-y: auto;
    max-height: calc(100vh - 57px);
    position: sticky;
    top: 57px;
  }

  .sidebar-section { margin-bottom: 20px; }

  .sidebar-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-muted);
    margin-bottom: 8px;
    padding: 0 8px;
  }

  .cat-btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    padding: 8px 10px;
    border: none;
    background: none;
    border-radius: var(--radius-sm);
    font-size: 13.5px;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.15s;
    text-align: left;
  }

  .cat-btn:hover { background: var(--surface-hover); color: var(--text); }
  .cat-btn.active { background: var(--accent-light); color: var(--accent-dark); font-weight: 600; }

  .cat-count {
    font-size: 12px;
    background: var(--category-bg);
    padding: 1px 7px;
    border-radius: 999px;
    color: var(--text-muted);
    min-width: 28px;
    text-align: center;
  }

  .cat-btn.active .cat-count { background: rgba(13,148,136,0.15); color: var(--accent-dark); }

  /* Favorites sidebar item */
  .sidebar-fav-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 13px;
    color: var(--text-secondary);
    transition: all 0.15s;
    overflow: hidden;
  }
  .sidebar-fav-item:hover { background: var(--surface-hover); color: var(--text); }
  .sidebar-fav-item .fav-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
  .sidebar-fav-item .remove-fav {
    opacity: 0; cursor: pointer; color: var(--text-muted); font-size: 16px; flex-shrink: 0;
    transition: opacity 0.15s;
  }
  .sidebar-fav-item:hover .remove-fav { opacity: 1; }

  /* Recently Viewed */
  .sidebar-recent-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 10px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 12.5px;
    color: var(--text-muted);
    transition: all 0.15s;
    overflow: hidden;
  }
  .sidebar-recent-item:hover { background: var(--surface-hover); color: var(--text); }
  .sidebar-recent-item .recent-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .sidebar-empty {
    padding: 6px 10px;
    font-size: 12px;
    color: var(--text-muted);
    font-style: italic;
  }

  .main {
    flex: 1;
    padding: 20px 24px;
    overflow-y: auto;
    max-height: calc(100vh - 57px);
  }

  .results-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    padding: 0 2px;
  }

  .results-count {
    font-size: 14px;
    color: var(--text-secondary);
  }

  .results-actions {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .sort-select {
    padding: 5px 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 13px;
    color: var(--text-secondary);
    background: var(--surface);
    cursor: pointer;
  }

  .macro-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 10px;
    transition: all 0.15s;
    overflow: hidden;
    position: relative;
  }

  .macro-card:hover { box-shadow: var(--shadow-md); border-color: #cbd5e1; }

  .macro-header {
    padding: 14px 18px;
    cursor: pointer;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    user-select: none;
  }

  .macro-expand-icon {
    flex-shrink: 0;
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    transition: transform 0.2s;
    margin-top: 1px;
  }

  .macro-card.open .macro-expand-icon { transform: rotate(90deg); }

  .macro-info { flex: 1; min-width: 0; }

  .macro-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }

  .macro-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 4px;
    font-size: 12.5px;
    color: var(--text-muted);
  }

  .macro-category-tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 999px;
    background: var(--category-bg);
    color: var(--text-secondary);
    font-weight: 500;
  }

  /* Favorite star button */
  .fav-btn {
    flex-shrink: 0;
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px;
    color: var(--text-muted);
    transition: all 0.15s;
    font-size: 18px;
    line-height: 1;
  }
  .fav-btn:hover { color: var(--fav-color); transform: scale(1.15); }
  .fav-btn.is-fav { color: var(--fav-color); }

  .macro-body {
    display: none;
    padding: 0 18px 16px 50px;
    animation: fadeIn 0.2s;
  }

  .macro-card.open .macro-body { display: block; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }

  .macro-content {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    font-size: 14px;
    line-height: 1.65;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 400px;
    overflow-y: auto;
  }

  /* Variable highlighting */
  .var-highlight {
    background: var(--var-bg);
    color: var(--var-color);
    padding: 1px 4px;
    border-radius: 3px;
    border: 1px solid var(--var-border);
    font-weight: 500;
    font-size: 13px;
  }

  .macro-actions-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
  }

  .copy-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface);
    font-size: 12.5px;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.15s;
  }

  .copy-btn:hover { background: var(--surface-hover); color: var(--text); border-color: #cbd5e1; }
  .copy-btn.copied { background: #dcfce7; color: #166534; border-color: #86efac; }

  .macro-actions-info {
    font-size: 12px;
    color: var(--text-muted);
    font-style: italic;
  }

  mark {
    background: var(--highlight);
    color: inherit;
    padding: 0 1px;
    border-radius: 2px;
  }

  /* Hover preview tooltip */
  .preview-tooltip {
    display: none;
    position: fixed;
    z-index: 200;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow-lg);
    padding: 14px 16px;
    max-width: 420px;
    max-height: 220px;
    overflow: hidden;
    font-size: 13px;
    line-height: 1.55;
    color: var(--text-secondary);
    white-space: pre-wrap;
    word-break: break-word;
    pointer-events: none;
  }
  .preview-tooltip::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 40px;
    background: linear-gradient(transparent, var(--surface));
    pointer-events: none;
  }
  .preview-tooltip.visible { display: block; }

  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-muted);
  }

  .empty-state svg { margin-bottom: 16px; opacity: 0.4; }
  .empty-state h3 { font-size: 18px; color: var(--text-secondary); margin-bottom: 6px; }
  .empty-state p { font-size: 14px; }

  @media (max-width: 900px) {
    .sidebar { display: none; }
    .layout { flex-direction: column; }
    .main { max-height: none; }
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
</style>
</head>
<body>

<div class="auth-overlay" id="authOverlay">
  <div class="auth-box">
    <svg width="48" height="48" viewBox="0 0 120 120" fill="none"><circle cx="60" cy="60" r="58" fill="#0d9488"/><path d="M60 18c0 0-20 16-20 38c0 14 8 26 20 32c12-6 20-18 20-32C80 34 60 18 60 18z" fill="#fff" opacity="0.92"/><path d="M60 30c0 0-12 12-12 26c0 10 5 18 12 22c7-4 12-12 12-22C72 42 60 30 60 30z" fill="#0d9488" opacity="0.3"/></svg>
    <h1>Fountain Macro Hub</h1>
    <p>Enter the team password to continue</p>
    <form onsubmit="return checkAuth()">
      <input type="password" class="auth-input" id="authInput" placeholder="Password" autofocus>
      <button type="submit" class="auth-btn">Sign In</button>
    </form>
    <div class="auth-error" id="authError">Incorrect password. Try again.</div>
  </div>
</div>

<div class="app-content" id="appContent">
<div class="topbar">
  <div class="logo">
    <svg width="30" height="30" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="60" cy="60" r="58" fill="#0d9488"/>
      <path d="M60 18c0 0-20 16-20 38c0 14 8 26 20 32c12-6 20-18 20-32C80 34 60 18 60 18z" fill="#ffffff" opacity="0.92"/>
      <path d="M60 30c0 0-12 12-12 26c0 10 5 18 12 22c7-4 12-12 12-22C72 42 60 30 60 30z" fill="#0d9488" opacity="0.3"/>
      <path d="M58 44c-2 6-3 14 0 22c2 4 4 6 6 8" stroke="#0d9488" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
      <path d="M48 68c4-2 8-2 12 0c4 2 8 2 12 0" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    </svg>
    Fountain Macro Hub
  </div>
  <div class="search-wrap">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" class="search-input" id="searchInput" placeholder="Search macros by name or content... (Ctrl+K)" autofocus>
  </div>
  <div class="stats" id="totalStats"></div>
</div>

<div class="preview-tooltip" id="previewTooltip"></div>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-section" id="favSection">
      <div class="sidebar-title">&#9733; Favorites</div>
      <div id="favList"><div class="sidebar-empty">Pin macros you use often</div></div>
    </div>
    <div class="sidebar-section" id="recentSection">
      <div class="sidebar-title">&#128337; Recently Viewed</div>
      <div id="recentList"><div class="sidebar-empty">No recent macros</div></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-title">Categories</div>
      <button class="cat-btn active" data-cat="all" onclick="filterCategory('all', this)">
        <span>All Macros</span>
        <span class="cat-count" id="allCount"></span>
      </button>
      <div id="catList"></div>
    </div>
  </aside>

  <main class="main" id="main">
    <div class="results-header">
      <div class="results-count" id="resultsCount"></div>
      <div class="results-actions">
        <select class="sort-select" id="sortSelect" onchange="renderResults()">
          <option value="relevance">Sort: Relevance</option>
          <option value="name">Sort: Name A-Z</option>
          <option value="favorites">Sort: Favorites First</option>
        </select>
      </div>
    </div>
    <div id="results"></div>
  </main>
</div>

<script>
const MACRO_DB = {"macros": [{"n": "DR: Double Charge", "c": "Hello, \n\nIt looks like you were double-charged for your subscription. Please note that we have refunded the duplicate charge. You should receive confirmation from our payment processor, Stripe. It may take your bank a few days to process the refund. Please let us know if we can help out with anything else.", "a": "", "cat": "General"}, {"n": "#Reschedule", "c": "Hi [Name], unfortunately, the provider you were scheduled to see this morning/afternoon/evening is unavailable. You may use the following link to reschedule at your convenience: [link].", "a": "", "cat": "General"}, {"n": "2FA Issues", "c": "Got it. Can you please send a screenshot over of the error message you're receiving? Can you also please provide the phone number and email you are using to register? Our team will look into it. \n\n", "a": "", "cat": "General"}, {"n": "Age restriction HRT part 2", "c": "Hi, thank you so much for reaching out. At this time, we recommend discussing HRT further with your in-person primary care provider or OB-GYN, who can best support you with ongoing, hands-on care. Thank you and best wishes", "a": "", "cat": "HRT"}, {"n": "Akute Portal Message", "c": "Hello from Fountain!\n\nWe received your message in Akute's Portal. Please note that we don't actively check the portal for messages, so please text us here if you have any questions.\n\n", "a": "", "cat": "Akute"}, {"n": "Akute Web Portal - Patient Troubleshooting", "c": "I'm sorry to hear you're having those issues with Akute's app. What may work is accessing your results through their web portal. Here's the link: https://portal.akutehealth.com/login \n\u200b\nPlease let us know if you have any issues. ", "a": "", "cat": "Akute"}, {"n": "Akute: Download Akute's Portal", "c": "It looks like you may have signed up for Akute previously. You can download it via iOS ( https://apps.apple.com/us/app/akute-patient-portal/id1571802525 ) and Android ( https://play.google.com/store/apps/details?id=com.akutehealth.patientportal&pli=1 ) and click \u201cForgot password\" to get back in.", "a": "", "cat": "Akute"}, {"n": "Akute: Invite to Akute's Portal", "c": "We previously sent you an invitation to access Akute\u2019s patient portal. Did you happen to receive an email from them? The subject line would read Fountain Wellness - Patient Portal Code.\nYou can access the portal anytime using this link: https://portal.akutehealth.com/login\nPlease let us know if you didn\u2019t receive the email or need any help getting logged in. We\u2019re happy to help.", "a": "", "cat": "Akute"}, {"n": "Akute: Membership Portal", "c": "We currently do not have a membership portal, but it is actively being developed. For the time being, you can access previous lab reports through Akute Health and review your billing history using the following link: [link]. Please be aware that the link will expire within 48 hours for security reasons.", "a": "", "cat": "Akute"}, {"n": "Akute: Sharing Lab Results", "c": "We would be happy to share your lab results. You should receive an email from Akute Health with instructions to access the portal. If you don't see it, please check your spam folder.  Also you may access the portal here: https://portal.akutehealth.com/login\n\u200b\nPlease note that we do not check the portal for messages. Please text us here or call us at 1213 237 1454 if you need assistance. \n\u200b\nHope you have a great day!", "a": "", "cat": "Akute"}, {"n": "Akute: Sharing Lab Results through Conversations", "c": "We sent over your results through Akute Health. If you click on 'messages' in the portal, you should see a recent message called 'lab results.' Please click on that message and you should be able to access the document. If you encounter any issues, please notify us.\nYou may access the portal here: https://portal.akutehealth.com/login", "a": "", "cat": "Akute"}, {"n": "Akute: Sharing Medical Notes", "c": "We sent over your results through Akute Health. If you click on 'messages' in the portal, you should see a recent message called 'Medical Notes.' Please click on that message, and you should be able to access the document. If you encounter any issues, please notify us.", "a": "", "cat": "Akute"}, {"n": "Akute: Sharing Prescriptions", "c": "We sent over a copy of your prescription through Akute Health. If you click on 'messages' in the portal, you should see a recent message called 'Prescription.' Please click on that message, and you should be able to access the document. If you encounter any issues, please notify us.", "a": "", "cat": "Akute"}, {"n": "Akute: Web Portal", "c": "You can also access Akute's portal through their web app. You can sign in here: https://portal.akutehealth.com/login \n\nPlease let us know if you have any issues. ", "a": "", "cat": "Akute"}, {"n": "All HRT meds from Fountain", "c": "To ensure safe and effective care, all hormones must be prescribed by Fountain and dispensed through a trusted pharmacy. We are able to provide testosterone as part of a comprehensive HRT program that includes progesterone and, if appropriate, estradiol. The cost remains the same, and having one dedicated team oversee your entire HRT plan helps us provide the best possible care.", "a": "", "cat": "HRT"}, {"n": "Amanda Miranda", "c": "Amanda Miranda, Medical Assistant ", "a": "", "cat": "General"}, {"n": "Assessment Link", "c": "If you're interested in our TRT program, please complete the assessment on our website at fountain.net. The assessment will help us better understand your needs and allow our medical team to provide appropriate recommendations when you speak with them. \n\n\u200b", "a": "", "cat": "General"}, {"n": "Assessment: Standard Tests", "c": "Hello\u2014the assessment fee covers the cost of the blood draw in most states, support, and consultation with a provider. The assessment may give you options for expanding testing or at-home testing, but please note that those tests may have higher price points.", "a": "", "cat": "General"}, {"n": "Async HRT", "c": "HRT dose recommendations: \nTestosterone: \nEstradiol: \nProgesterone: ", "a": "", "cat": "Async"}, {"n": "Async Med Changes", "c": "Hi [insert patient name], thank you for completing your HRT treatment assessment form. I\u2019ve reviewed your responses, and based on the symptoms you reported, I\u2019d like you to make the following adjustments to your treatment plan. [Insert med changes]\nPlease begin these changes as directed, and we will check in again in two weeks to reassess your symptoms and your response to the updated regimen. If you have any questions or concerns in the meantime, please feel free to reach out to us via text message. Have a great day! ", "a": "", "cat": "Async"}, {"n": "Async No Med Changes", "c": "Hi [insert name], thank you for completing your HRT treatment assessment form. I\u2019ve reviewed your responses, and it looks like you\u2019re doing well with your current medication regimen. For now, please continue taking your medication as prescribed. We will follow up again in two weeks with your next assessment. If any questions or concerns come up in the meantime, feel free to text us. Have a great day! ", "a": "", "cat": "Async"}, {"n": "Async form provided for follow up per provider request", "c": "Hi there, our provider has requested you complete the following form to provide us with an update on your current symptoms. Once the form is completed it will automatically be sent to our medical team for review. ", "a": "", "cat": "Async"}, {"n": "Async form provided for reports of symptoms/side effects", "c": "Hi there, we appreciate you reporting your concerns. Please utilize the following link to complete a form for our medical team to obtain a better understanding of your current situation. Once they have reviewed the information provided via the form they will contact you. ", "a": "", "cat": "Async"}, {"n": "Async needs VV", "c": "Hi [insert name], thank you for completing your HRT treatment assessment form. I\u2019ve reviewed your responses, and based on the symptoms you reported, I recommend scheduling a follow-up visit so we can discuss your symptoms in more detail. Please use this link to choose a time that works best for you: [insert link]. Thank you, and have a great day.", "a": "", "cat": "Async"}, {"n": "Belmar HRT Temperature concerns", "c": "Per the pharmacy, hormones remain stable in high temperatures up to boiling point, which is around 212\u00b0F (100\u00b0C). This means you are safe to proceed with use of your shipment once it has returned to room temperature. Please let us know if any further concerns/questions. ", "a": "", "cat": "HRT"}, {"n": "Belmar ingredients (RN) Testosterone Estradiol Creams and Progesterone Capsules FEMALE/ HRT ONLY", "c": "Hi there, our partner pharmacy has confirmed they do not utilize peanut oil within their medication to avoid allergen concerns. All of their products are also dye free, and the cream is paraben free. \nThe cream ingredients include: purified water, isopropyl myristate, TEA stearate, Carthamus Tinctorius (hybrid safflower) seed oil, cetyl alcohol, stearyl alcohol, phenoxyethanol, TEA carbomer, caprylyl glycol, and potassium sorbate. In addition to the ingredients listed will be the active ingredient such as testosterone and/or estradiol depending on the cream.\nHere is a link directly from their website for the ingredients in their cream product: https://www.belmarpharmasolutions.com/cream-base/ \nThe standard capsules they utilize for our patient's are just a gelatin capsule that contains  microcrystalline cellulose powder filler, and the active ingredient. This is our standard form prescribed for  progesterone.\nThe FastSL tablets utilized include: PharmaBurst 500, magnesium stearate, triplemint powder (flavor), and the active ingredient. This form is utilized for progesterone as an alternative to capsule form.", "a": "", "cat": "HRT"}, {"n": "Belmar: Leaking Cream", "c": "Our partner pharmacy indicated the following:\n\n\"It is not uncommon for cream to leak out of the UnoDose dispenser under the lid during transit. If there are changes in elevation during shipment or jostling of the package the cream can come out of the holes and collect inside the lid since the UnoDose is not a sealed device. Typically, when this happens, it is a very small amount of cream, maybe 2 -3 clicks total. We overfill our devices by approximately 10 clicks more than the quantity ordered, so if there is a leak during transit, there will still be enough in the device to last the patient the length of the prescription.\"\n\nPlease let us know if you have any questions.", "a": "", "cat": "General"}, {"n": "Bill Carbonneau", "c": "- Bill Carbonneau, NP", "a": "", "cat": "General"}, {"n": "Bill VV scheduling link OnceHub", "c": "Please send them my scheduling link: https://go.oncehub.com/FountainBill", "a": "", "cat": "General"}, {"n": "Billing: 4 Week Payment Plan charge dates", "c": "Hello, \nYour subscription is set to recur every four weeks, not monthly. Due to this, it may not fall on a specific day of the week. Please let us know if you have any questions. ", "a": "", "cat": "Billing"}, {"n": "Billing: Anastrozole options", "c": "The anastrozole plan is billed at $30 every 12 weeks.", "a": "", "cat": "Billing"}, {"n": "Billing: Assessment Fee Coverage HRT", "c": "\u200bThe assessment fee covers the cost of your initial consultation with one of our providers as well as support from our customer service team.", "a": "", "cat": "Billing"}, {"n": "Billing: Assessment Fee Coverage TRT", "c": "The assessment fee covers the cost of labs, consultation, and support in most states. Please note that New York, New Jersey, Rhode Island, Massachusetts, and Maryland have unique rules for in-person lab visits, which require patients to use their insurance for in-person lab visits.", "a": "", "cat": "Billing"}, {"n": "Billing: Automated Failed Payment Messages", "c": "No problem. Please note that you may continue to receive automated failed payment reminders until the charge goes through. Please let us know if you have any questions.\n\n", "a": "", "cat": "Billing"}, {"n": "Billing: Automatic Renewal", "c": "The subscription recurs on: No need to bring it to a pharmacy. Our partner pharmacy handles refills after the subscription recurs.", "a": "", "cat": "Billing"}, {"n": "Billing: Can I prepay my next charge?", "c": "Due to how our backend is structured, we're unable to process prepayment or split payments up.", "a": "", "cat": "Billing"}, {"n": "Billing: Can charges be billed weekly?", "c": "All plans are billed upfront and recur on a subscription cycle.", "a": "", "cat": "Billing"}, {"n": "Billing: Can you just bill me for the medication, not the other services?", "c": "Fountain patients pay a subscription cost that includes multiple services (i.e., support, consultation, labs in most states, shipping, and medication). We do not charge you specifically for the medication alone due to how our service works.", "a": "", "cat": "Billing"}, {"n": "Billing: Can you send me an invoice?", "c": "We operate on a subscription system, so we do not send payment invoices. Once the charge is run it will recur based on the billing cycle. ", "a": "", "cat": "Billing"}, {"n": "Billing: Cancel Subscription", "c": "Understood. We'll cancel your subscription. Wishing you the best in your wellness journey. ", "a": "", "cat": "Billing"}, {"n": "Billing: Changing Payment Method", "c": "You can change your payment method using this link:\nPlease note that the link will expire within 48 hours for security reasons.", "a": "", "cat": "Billing"}, {"n": "Billing: Charge Alignment for Orders", "c": "Your charge date is: \nYour next refill date is:  \n\u200b\n\u200b\n\u200bPlease note\u00a0that the timing of your payments is\u00a0not\u00a0related to when your medication is shipped. The only exception is your very first payment and shipment\u2014after that, they follow separate schedules.\nBecause testosterone is a controlled substance, the pharmacy can\u2019t send your next order until you have about 7\u201310 days left in your current one. If your dose changes, we\u2019ll notify the pharmacy so they can adjust the next shipment accordingly based on your updated dose.\nYour membership fee includes:\n\u200b\nWe offer payment plans every 4 weeks, 12 weeks, or 48 weeks. Longer plans mean bigger payments each time, but they save you money overall compared to the 4-week plan.\nRegardless of which plan you choose,\u00a0the medication shipping schedule remains the same.\nPlease let us know if you have any questions\u2014we\u2019re happy to help.", "a": "", "cat": "Billing"}, {"n": "Billing: Confirm Info", "c": "We're glad to hear you're ready to set up your subscription!\nJust to confirm, the payment method we have on file ends with: and the shipping address is: \nDoes this information sound correct to you? \nPlease note that all plans are billed upfront and recur on a subscription cycle. Typically, orders sent out through our partner pharmacies go out within a week. ", "a": "", "cat": "Billing"}, {"n": "Billing: Confirming TRT Plans", "c": "We'll get this set up for you. Can you please confirm which treatment option, and which subscription plan you wanted to start?\nHere's the list of available plans:\n1-month plan, 4 wk, $199\n3-month plan, 12 wk, $499\n12-month plan, 48 wk, $1799\nThe subscription covers monitoring, support, labs (except in NY/NJ/MD), shipping, and consultation. Just so you know, all plans are paid upfront and recur on a subscription cycle.\nHere's the list of TRT treatment options:\nEnclomiphene\nTestosterone Topical Cream\nTestosterone Cypionate Injections", "a": "", "cat": "Billing"}, {"n": "Billing: Duplicate Charges", "c": "Hello, \nOur payment processor Stripe had indicated the following regarding pending charges for patients: \nIf they're seeing two charges on their statement, I would recommend them to reach out to their bank. Occasionally a bank will authorize a charge, which causes a pending charge, and then capture it, causing another charge, in quick succession. When this happens, a customer may see a pending charge and a second charge for the same amount. If this is the case, the pending authorization should fall off your customer's card within 5 business days.\"\n\nPlease let us know if you have any other questions. ", "a": "", "cat": "Billing"}, {"n": "Billing: ED Meds Pricing", "c": "Our ED plan runs at $99 every 12 weeks.", "a": "", "cat": "Billing"}, {"n": "Billing: Expanded Labs Charge Successful", "c": "We successfully charged your payment method for the expanded lab panel. We'll ask our medical team to submit a new lab order for you, and let you know once it's in.", "a": "", "cat": "Billing"}, {"n": "Billing: FSA/HSA cards", "c": "We can't guarantee that FSA or HSA will work because many individual plans have different requirements, but most patients in our care have successfully used them without any issues. \n\u200b\n\u200b\n\u200b\n\u200b", "a": "", "cat": "Billing"}, {"n": "Billing: Failed Payment", "c": "Hello from Fountain! \n\nIt looks like the transaction was declined when payment for your subscription was processed. Is the payment method ending in:  the intended payment method? If needed, you can change your payment method using this link: \nPlease note that the link will expire within 48 hours for security reasons.", "a": "", "cat": "Billing"}, {"n": "Billing: HCG Pricing", "c": "The HCG subscription costs $399 every eight weeks for the lower dose plan and $599 every eight weeks for the higher dose plan. ", "a": "", "cat": "Billing"}, {"n": "Billing: Hair Growth Subscription Plans", "c": "Hi there, our current pricing for the hair regrowth formula 8%Minoxidil + Finasteride that we offer is $119 every 8 weeks. Please let us know if you would like to proceed with this subscription.", "a": "", "cat": "Billing"}, {"n": "Billing: I don't want recurring charges", "c": "Due to the way our backend system is set up, you will need to be on a subscription plan. That being said, you can cancel before your next charge date - there is no contract. ", "a": "", "cat": "Billing"}, {"n": "Billing: I'd like to be notified before my next subscription charge is run", "c": "Your next charge date is: It is billed every: \nPlease note that this billing cycle may be adjusted if there are failed payments due to how our backend is set up. At this time, it is difficult to notify you before the subscription renewal. We're actively working on a patient portal that will make this information more visible. We'll notify you once it's set up.", "a": "", "cat": "Billing"}, {"n": "Billing: Information for FSA/HSA", "c": "We just texted you a copy of a document with some additional information. If you'd rather have the information emailed, please let us know the best email address to send it to. If you need any additional information, we will do our best to provide you with that.", "a": "", "cat": "Billing"}, {"n": "Billing: Insurance", "c": "Hello - Fountain does not participate with insurance. We certainly understand the reasons to try to find an insurance-based program. However, it doesn't work for Fountain's model for a few reasons. T therapy is frequently not well covered or covered only after a large deductible is paid each year. Treatment decisions are often directed by insurance companies and instead of the shared decisions of patients and providers. Fountain's billing model is based on an all-inclusive fee that recurs periodically and covers all aspects of service (medication, supplies, shipping costs, taxes, provider visits, labs, and 24/7 direct access to providers and support team via our text messages platform). We are able to give more personalized attention and time to fewer individual patients.", "a": "", "cat": "Billing"}, {"n": "Billing: Itemized Receipts", "c": "Hi, our team would happily create an itemized receipt for you. It usually just takes us a few days to generate these. \n\u200b\nMost patients needing information for their HSA/FSA account have been covered through the information we provide. Please note that patients who attempt to get coverage through their insurance have had difficulties due to how our subscription service works. \n\u200b\nWe'll let you know once it's been sent over. ", "a": "", "cat": "Billing"}, {"n": "Billing: Med Clear", "c": "Hello from Fountain! Just checking to see if you were able to get medical clearance. If you need anything from us, please let us know!\n\n\n\n", "a": "", "cat": "Billing"}, {"n": "Billing: Next Charge Date", "c": "Hello - your next charge date is: Please let us know if you have any other questions.", "a": "", "cat": "Billing"}, {"n": "Billing: No CareCredit", "c": "You can certainly try to use CareCredit, but we are not aware of any patients in our care being able to use it successfully. \n\n", "a": "", "cat": "Billing"}, {"n": "Billing: No Split Payments", "c": "We cannot split payments due to the way our subscription system works.", "a": "", "cat": "Billing"}, {"n": "Billing: No fixed charge date", "c": "Please note that your subscription is billed every 4 weeks. Since this is a recurring cycle rather than a fixed monthly billing date, your charge dates may vary slightly from month to month.", "a": "", "cat": "Billing"}, {"n": "Billing: Payments not linked to shipments", "c": "Thank you for reaching out. Your payments are separate from when your medication is shipped. The only time these align is with your very first payment and shipment. After that, payments and shipments follow their own schedules.\nSince testosterone is a controlled substance, the pharmacy is only able to send your next vial when you have approximately 7 to 10 days remaining in your current vial. If your dose changes while you are using a vial, we will notify the pharmacy so your next shipment reflects the updated dose.\nYour membership fee includes the following:\n\u2022 Video visits\n\u2022 Lab work in most states\n\u2022 Shipping and taxes\n\u2022 Customer support\n\u2022 Your primary treatment medication, such as testosterone\nWe offer payment plans every 4 weeks, 12 weeks, or 48 weeks. Longer plans have larger payments at each interval, but they do provide overall savings compared to the 4-week plan. Regardless of which plan you choose, the medication shipping schedule remains the same.\nPlease let us know if you have any questions. We are always happy to help.", "a": "", "cat": "Billing"}, {"n": "Billing: Receipt", "c": "No problem. We will send you a receipt from our payment processor, Stripe. It will be sent to the email we have on file. ", "a": "", "cat": "Billing"}, {"n": "Billing: Replacement Costs", "c": "Got it - we'll process a replacement for you. We will need to process a one-time payment to cover the cost of the replacement. The charge will be run at: Please confirm that you're okay with us setting this up for you.", "a": "", "cat": "Billing"}, {"n": "Billing: Stripe Card Security", "c": "Our payment processor, Stripe, only provides us with the last four digits of payment methods for security purposes. We can't see the full card number, or CVC code on the card. If you'd like to change the card on file we can send you a link to update your payment information.", "a": "", "cat": "Billing"}, {"n": "Billing: TRT subscription options", "c": "Here's the pricing for our TRT Programs:\nStarter Plan: billed every 4 weeks at $199\nStandard Plan: billed every 12 weeks at $499.\nPro Plan: billed every 48 weeks at $1799.\nThe subscription covers support, labs (outside of NY, NJ and MD) shipping and consultation. Please note that all plans are paid upfront and recur on a subscription cycle.", "a": "", "cat": "Billing"}, {"n": "Billing: Why are your prices so high?", "c": "We can't comment on any specific competitor. That being said, Our subscription fees may appear higher than those of some other companies, but unlike many other companies, we don't charge for different aspects of care. We bundle together one fee, which covers TRT medication, consultation visits, customer support, shipping, taxes, supplies, and labs (in most states).", "a": "", "cat": "Billing"}, {"n": "Blood Type ( RN )", "c": "Hi there, we do not test for blood type with the labs that we draw. Please reach out to your Primary Care Provider or this typically can be confirmed during a Blood donation. Thank you! ", "a": "", "cat": "General"}, {"n": "Blood donation Macro to be sent to pt upon retrieval of RN BD ticket (RN)", "c": "Hi there, your provider has recommended you complete a blood donation in the near future. For assistance locating a blood donation location, such as the Red Cross, near you please call 1-800\u00ad-RED CROSS.   Please keep in mind that you do not have to go through the Red Cross specifically for this procedure. When you call or visit the facility, please tell them you want to \u201cdonate blood\u201d. The intention is to donate red blood cells (whole blood) not plasma or platelets Once you have successfully donated please let our team know by providing an update here.", "a": "", "cat": "General"}, {"n": "Bryana Anderson", "c": "- Bryana Anderson, NP", "a": "", "cat": "General"}, {"n": "CS - overnight shipping", "c": "Our team would be happy to ask our partner pharmacy to send out the order via overnight shipping. \n\nPlease note the following: \n1) We would need to charge your card on file $50 to process this. \n2) This does NOT mean your order will go out the next day. Depending on the pharmacy processing your order, it may still take up to a week to go out. This changes the shipping method - but does not impact the processing speed of the order. \n\nIf you're comfortable with this, please confirm, and we'll get this set up for you.\n\n\n", "a": "", "cat": "CS"}, {"n": "Can you cancel my lab visit?", "c": "If you would like to reschedule, you can use this link to update your lab appointment at a time that works better for you [insert lab link]\nWhile we aren\u2019t able to cancel lab appointments directly once they\u2019ve been scheduled, you\u2019re welcome to contact the lab to cancel if needed.\nPlease let us know if you have any questions or need help rescheduling. Have a great day! ", "a": "", "cat": "Labs"}, {"n": "Cancel Subscription Confirmation due to unresponsiveness when attempting to schedule labs", "c": "Hi there, we wanted to notify you that our team has canceled your subscription. We have attempted to contact you to schedule lab work on multiple occasions, however we have received no response. If you would like to resume treatment with us at anytime you may let us know here. Wishing you the best in your wellness journey.", "a": "", "cat": "Labs"}, {"n": "Cancel Subscription: Follow-up Confirmation", "c": "Hi there, we wanted to notify you that our team has canceled your subscription. If you'd like to resume treatment with us at a later date please let us know. Wishing you the best in your wellness journey.", "a": "", "cat": "Cancellation"}, {"n": "Cancel Subscription: Not getting results", "c": "Sorry to hear that, we'd love a chance to improve your results. Sometimes dosage changes can make a big difference. If you're interested, we can arrange for a (zero-pressure) call with our medical team to see what might be done to improve your response. Please let us know if that sounds good and you'd like us to set this up for you. \n\u200b", "a": "", "cat": "Cancellation"}, {"n": "Cancel Subscription: Overdue for refill", "c": "Hi - this is Fountain. As mentioned earlier, you're due for a refill but need to speak with a provider in a quick visit for this to be processed. We've sent you several texts, emailed you, but we haven't been able to connect with you. We will need to cancel your subscription since we can't get your refill processed until you speak with a provider. Wishing you the best.", "a": "", "cat": "Cancellation"}, {"n": "Cancel Subscription: Refund Last Charge", "c": "Yes, we can process a refund immediately for you since no order went out. You'll see the refund in your account within 3-5 business days. You should also receive an email from our payment processor, Stripe. Wishing you the best!", "a": "", "cat": "Cancellation"}, {"n": "Cancel Subscription: Remove auto-renewal", "c": "Hi - just letting you know we canceled your subscription since you indicated that you did not want it to renew earlier. Please feel free to reach out if you'd like to resume treatment with us at a later date. Wishing you the best.", "a": "", "cat": "Cancellation"}, {"n": "Cancel Subscription: What is your cancelation policy?", "c": "You can simply text us if you want to cancel. You would just need to let us know before your next billing cycle, otherwise the subscription will recur.", "a": "", "cat": "Cancellation"}, {"n": "Cancel side effects", "c": "Hi xxx, your subscription has been cancelled. If you\u2019d like to schedule a video visit with a provider to discuss your side effects, you may use the link below to book an appointment: xxx\nHave a great day and best wishes! ", "a": "", "cat": "Cancellation"}, {"n": "Cancellation Macro for Refills and Clarifications Team Ticket", "c": "Date Last Shipment began processing(may also attach tracking link):\nDate next RX or Refill is due:\nDate Subscription is set to renew/next charge:", "a": "", "cat": "Cancellation"}, {"n": "Cancellation Reason Request", "c": "Our team has received your cancellation request. Before we make the appropriate adjustments to your account please share if any particular reason contributed to your decision to cancel your subscription. We would like to see if there is any way we can provide a more suitable experience for you. \nWe appreciate your feedback as this will also help our team improve future patient experience.", "a": "", "cat": "Cancellation"}, {"n": "Cancellation prompt for Refills and Clarifications Team", "c": "", "a": "", "cat": "Cancellation"}, {"n": "Clarification on refill process", "c": "We wanted to clarify how our medication refill process works:\nRefills for your medications are automatic and based on what was prescribed at your last visit. This process is independent of your video visits and lab results, and is designed to ensure that no patient is ever without medication. Automating refills helps streamline care and maintain consistency between visits.\nPlease note that your dosages may change at your next visit, and that\u2019s completely expected. When that happens, we\u2019ll send you updated medications and creams based on your new prescription.\nIf you have any extra medication at home, you are welcome to keep it as a backup for travel or emergencies. If you\u2019d prefer to dispose of it, you can do so at a prescription medication disposal location. Simply search online to find a drop-off site near you.\nYou will not be charged extra for any early or additional refills. Everything is included in your subscription fee.\nPlease proceed with your care as planned, and don\u2019t hesitate to reach out with any questions.", "a": "", "cat": "General"}, {"n": "Clearance request TRT/HRT (RN)", "c": "The Fountain provider you recently completed a visit with has advised that medical clearance is needed prior to starting (TRT/HRT). Please let us know if/when you have been seen by your (PCP/cardiologist/Urologist) and are medically cleared to start therapy. We will need proper documentation of the clearance.  You may provide our team with the name and fax number of your provider. We will fax a clearance form to their office for review. Once we receive the completed clearance form our team will update you.  \nWhile we understand this can be time-consuming, we want to ensure you are safe to take these medications and there are no concerns regarding you starting the discussed HRT/TRT regimen. ", "a": "", "cat": "HRT"}, {"n": "Communication via email only request", "c": "If you receive an SMS from us and would prefer to continue the conversation by email, please let us know at the time you receive the message and we\u2019ll be happy to accommodate. While we aren\u2019t able to set email-only communication preferences at this time, we\u2019ll always do our best to communicate with you in the way that works best for you.", "a": "", "cat": "General"}, {"n": "Contact Numbers", "c": "You can text us at: (833) 967-3100\n\nYou can call us at:  1213 237 1454", "a": "", "cat": "General"}, {"n": "Content Creator Marketing Email", "c": "Thank you for reaching out. You may contact our marketing team via email directly at aryia@fountain.net to further discuss.", "a": "", "cat": "General"}, {"n": "Cotton Seed Oil Reaction/ Allergy (RN)", "c": "We are sorry to hear you're experiencing a reaction to the cottonseed oil. The testosterone we currently dispense with cottonseed oil is a manufactured product\u2014identical to what you\u2019d find at local pharmacies like CVS\u2014not from a compounding pharmacy. At this time, we are not working with any compounding pharmacies that use MCT or grapeseed oil as a carrier.\nHere are a few injection techniques that may help reduce lumps or discomfort:\nIf you\u2019ve already tried these techniques without improvement, we can offer a switch to testosterone cream. Unfortunately, testosterone cypionate in cottonseed oil is currently our only injectable option.", "a": "", "cat": "General"}, {"n": "Cream leakage during air travel prevention(Create ticket for R&C to adjust refill accordingly)", "c": "Our pharmacy has advised the following suggestions to avoid potential future occurrences. We apologize for the inconvenience.\n\u200b\nPrevention", "a": "", "cat": "General"}, {"n": "Crystallization", "c": "Great question! We follow the guidance of the pharmacies with any questions regarding the purity of their products. Their instructions to reverse crystallization, which is a relatively common occurrence, has not altered any results clinically regarding patient testosterone levels. We have used both compounded and manufactured testosterone from multiple pharmacies and each type can have crystallization occur. Your shipment was manufactured testosterone, meaning the same product made by large pharmaceutical companies and sold by retail pharmacies (CVS/Walgreens etc). It is important to warm and swirl the vial vigorously and not use until it appears completely clear. If it doesn't clear up after trying this method a few times, please let us know. Thanks! ", "a": "", "cat": "General"}, {"n": "Curexa Orders: TRT patient requests to update their address", "c": "Hello - we're happy to update your address. What is the new address you would like to use? Please be aware that the pharmacy has a signature requirement for controlled substances like TRT, which will require someone to sign for the package (it doesn't necessarily have to be you.)", "a": "", "cat": "Curexa"}, {"n": "Curexa: Carrier", "c": "Your order will be sent out via Fedex two day.", "a": "", "cat": "Curexa"}, {"n": "Curexa: Delayed, need to expedite order", "c": "Hey - I just checked on this and I can see the pharmacy is still working on your order. We'll reach out to the pharmacy that is shipping your order and ask them to expedite it. Have a great rest of your day!", "a": "", "cat": "Curexa"}, {"n": "Curexa: If a patient has issues with Curexa's signature requirement", "c": "The pharmacy processing your medication (Curexa), has a signature requirement for controlled substances. We've asked them if they can waive this requirement previously, but they are unwilling at this time. We can find a nearby Walgreens address that will accept the shipments (Walgreens acts as holding centers for FedEx.) Would that work for you?", "a": "", "cat": "Curexa"}, {"n": "DHT testing is not offered because:", "c": "We do not offer DHT testing for the following reasons:\nRoutine monitoring of DHT (dihydrotestosterone) is not recommended by the Endocrine Society or other major U.S. guidelines during testosterone replacement therapy (TRT). Standard DHT testing offers limited clinical value, as the results are often inaccurate\u2014particularly during TRT\u2014and rarely change clinical management.\nCurrent evidence does not support a clear link between elevated DHT and increased risk of prostate disease or systemic side effects beyond those already associated with TRT.\nIt's also important to note that serum DHT levels do not reliably reflect androgen activity in target tissues. Intracellular DHT concentrations\u2014where the hormone actually acts\u2014are largely independent of circulating levels.\nIn addition, DHT assays face technical limitations. Cross-reactivity with testosterone is common, especially when testosterone levels are elevated during TRT, which further compromises test accuracy.\nIf you are experiencing symptoms potentially related to elevated DHT, such as accelerated hair loss (androgenic alopecia), we focus on managing those symptoms directly. This may include adjusting your testosterone dose or introducing treatments specifically aimed at those side effects.", "a": "", "cat": "General"}, {"n": "DR - member 1", "c": "Hi {{first_name}} \n\u200bThis is Daniel, your membership coordinator here at Fountain. I saw that you\u2019ve already completed your labs and provider visit \u2014 that\u2019s fantastic progress! You\u2019re right at the point where most people start moving forward with their personalized treatment plan.\nI wanted to check in and see how you\u2019re feeling about everything so far. Sometimes people pause here because they have questions, want to talk things through, or just need a little clarity before starting \u2014 totally understandable.\nWhatever\u2019s on your mind, I\u2019d love to help you take the next step with confidence.\n What\u2019s the biggest thing you\u2019re thinking about as you decide whether to start treatment?", "a": "", "cat": "DR"}, {"n": "DR - member 2", "c": "Hello,\nJust wanted to check in \u2014 it looks like your plan isn\u2019t set up yet. I completely understand that life gets busy, but I\u2019d love to help you finish this last step so you can start feeling the benefits. What\u2019s been holding you back from getting started?\nDaniel Raphael, Membership Coordinator ", "a": "", "cat": "DR"}, {"n": "DR Member - 3", "c": "Hello, \nThis is a friendly final reminder to complete your plan setup. If anything\u2019s holding you back, just reply \u2014 we\u2019ll make it quick and easy to get you started.\n\nDaniel Raphael, Membership Coordinator", "a": "", "cat": "DR"}, {"n": "DR VV 1", "c": "Please instruct patient to schedule a video visit to get their next refill submitted.", "a": "", "cat": "DR"}, {"n": "DR VV2", "c": "Please snooze the ticket for one day after messaging them. Once unsnoozed, please see if they scheduled a visit with a provider. If they have, assign the ticket to them. If not, please follow up with the patient.", "a": "", "cat": "DR"}, {"n": "DR f/u cancel", "c": "Hi, \nThis is Daniel from Fountain. Since we haven\u2019t received your updated lab work or completed video visit, we\u2019ve had to cancel your subscription for now. Please reach out if you\u2019d like to resume at a later date. Wishing you the best.", "a": "", "cat": "DR"}, {"n": "DR f/u email", "c": "Hi, \nThis is Daniel from Fountain\u2014your refill is overdue, and we want to make sure you don\u2019t miss a dose.\n Before we can process your refill, you\u2019ll need to complete your lab work and a quick video visit.\n\nSchedule your lab visit here: \n If you have any questions or need help scheduling, reply to this email.\n\n", "a": "", "cat": "DR"}, {"n": "DR f/u text", "c": "Hi, this is Daniel from Fountain \u2014 just a quick reminder that your refill is past due.\nBefore we can send it, you\u2019ll need to complete your lab work and a quick video visit.\nSchedule your lab visit here: \nLet me know if you have any questions\u2014I\u2019m happy to help you get back on track!", "a": "", "cat": "DR"}, {"n": "Declined Clearance", "c": "Hi [Name],\nWe wanted to let you know that your medical provider has not cleared you to begin treatment at this time due to contraindications. If you have any questions regarding this decision, we recommend reaching out to your physician directly.\nWe wish you all the best moving forward.", "a": "", "cat": "General"}, {"n": "Difficulty withdrawing medication from the vial (RN)", "c": "Hi there, thank you for reaching out. Please try the following suggestions to help ease the process of withdrawing the medication.\n-When gathering your supplies prior to each injection warm the vial in between the palms of your hands and/or under warm running water. This helps decrease the viscosity of the solution. Ensure you always clean the stopper of the vial with an alcohol prep pad after this step.\n-Into the syringe, draw up an equal amount of air to the amount of medication you plan to withdraw. You will then inject the air into the vial prior to withdrawing the medication. You should do this for every injection as it effects the pressure gradient.  \n-Invert the vial, meaning turn upside down after inserting the needle. This helps to gather the medication at the narrowest point of the vial that is also closest to the point of withdraw.\n-Adjust the amount of needle inserted into the vial to ensure the tip of the needle is completely covered by the remaining medication. When the vial is inverted(turned upside down) you should have to insert the needle less each time.\nPlease try these suggestions then let us know if you continue to experience any difficulties.", "a": "", "cat": "General"}, {"n": "Discontinue Enclomiphene", "c": "Thank you for reaching out. There is no risk in stopping Enclomiphene. This medication works by stimulating your body\u2019s natural testosterone production without suppressing sperm production, and unlike testosterone injections or creams, it does not shut down your own production. Many patients tolerate stopping the medication abruptly without issues, while others prefer to taper off gradually. If you would like to taper, you can take Enclomiphene every Monday, Wednesday, and Friday for the next two weeks and then discontinue. Please let us know if you have any further questions. Have a great day! ", "a": "", "cat": "General"}, {"n": "Does enclomiphene reduce IGF-1 levels", "c": "Research linking enclomiphene to decreased IGF-1 levels is limited. Studies in men suggest a possible reduction, but levels remained within normal physiological ranges and lacked clinical significance. \nThere are no clinical guidelines from the Endocrine Society or the American Urological Association that recommend routine IGF monitoring for patients on enclomiphene. ", "a": "", "cat": "General"}, {"n": "Doron's direct scheduling link DSS", "c": "https://go.oncehub.com/FountainDoron", "a": "", "cat": "General"}, {"n": "Dosage Changes and Refills", "c": "If a dosage change is needed, our medical team would work on getting your next refill sent out at the appropriate time. You would not pay anything extra for dosage changes to your primary subscription. ", "a": "", "cat": "General"}, {"n": "Dosing and Pricing", "c": "Your membership includes the cost of any dosage changes to your primary subscription. If a dose change is recommended by the provider they will instruct you on how to implement that with current supply of medication or have a new supply of medication sent in for you.  Please let us know if you have any questions. ", "a": "", "cat": "General"}, {"n": "Doxy Macro", "c": "Hi {{first_name}} \u2013 I'm ready for your Fountain video visit! Join here:\n\u200b\nhttps://fountain.doxy.me/{{message.author.first_name}}?username={{first_name}}&pid={{custom_data.fountain_id}}\n\u200b\n\u2013 {{message.author.name}}", "a": "", "cat": "General"}, {"n": "Doxy Video - Let me know if you have any issues logging into the video link:", "c": "Let me know if you have any issues logging into the video link: ", "a": "", "cat": "General"}, {"n": "E3 Face Cream program funnel link", "c": "Hi there, thanks for reaching out! You may use this link to potentially sign up for one of our estradiol face cream subscriptions https://skin.fountain.net/age-defying-cream?_ftn_id=Kg%3D%3D\nPlease let us know if you have any questions. Thanks!", "a": "", "cat": "General"}, {"n": "E3 Sign Up Errors", "c": "Thank you for reporting the error you encountered. We appreciate you bringing this to our attention. Our team is actively working to resolve the issue, and we will provide an update as soon as you are able to proceed.", "a": "", "cat": "General"}, {"n": "Emailing Lab Results", "c": "Hello,\nA team member would happily email you a copy of your results. They will be sent to the email on file. \n\u200b\nPlease note that it may take a little while to get these over to you since this is done through a different system. Thanks!", "a": "", "cat": "Labs"}, {"n": "Emily Glover", "c": "Emily Glover, Pharmacy Liason ", "a": "", "cat": "General"}, {"n": "Employment Verification Request", "c": "Hi there, for employment verification please email lindsay@fountain.net . Have a great day! ", "a": "", "cat": "General"}, {"n": "Enclomiphene - how long before results", "c": "Everyone is different. In general, some people begin to notice improvements in sex drive and energy levels within 3\u20136 weeks, while others may not see significant changes until 2\u20133 months. Response time can also depend on the prescribed dose, which is why we schedule the first set of labs at 6 weeks\u2014to ensure you're reaching optimal levels. Dosing may be adjusted at your follow-up visit based on your lab results and symptoms.\nPlease don\u2019t hesitate to reach out with any questions or concerns.", "a": "", "cat": "General"}, {"n": "Enclomiphene Capsules difficulty swallowing", "c": "Our partner pharmacy, The Pharmacy Hub (TPH), has advised our team that if you have difficulty swallowing the capsule you may open the capsule and mix the powder with water. They advise against mixing the powder with any foods that are hot, highly acidic, high in fiber, dairy products, or high calcium products as these can degrade the active pharmaceutical ingredient.", "a": "", "cat": "General"}, {"n": "Enclomiphene and Anastrozole processing/shipping times", "c": "Hi there, for your prescribed medication our pharmacy currently has an expected processing time of 1-2 business days. Once processed the shipping typically takes 2 business days. \nOur team and the pharmacy is working to get your shipment to you as swiftly as possible. Please ensure the correct address is on file to avoid any delays in shipment. \nHave a great day! ", "a": "", "cat": "General"}, {"n": "Enclomiphene cause dementia Alzheimer's disease", "c": "We are aware of studies showing an association between elevated luteinizing hormone (LH) levels and dementia, particularly Alzheimer's disease. However, further research is needed to determine whether this relationship is causal. Testosterone is considered neuroprotective, and in the general population, LH levels tend to rise as testosterone levels decline with age. Most studies linking elevated LH to dementia have focused on men with low testosterone. There is no evidence from the provided references regarding men with normal or high testosterone levels, or the effects of clomiphene (Clomid) or enclomiphene in this context. It is understandable to consider alternative treatments to enclomiphene. If you prefer, we can switch you to testosterone replacement therapy.", "a": "", "cat": "General"}, {"n": "Escalation: Message to Leadership", "c": "Understood. We'll get this addressed. Someone from our leadership team will reach out as soon as possible.", "a": "", "cat": "Escalation"}, {"n": "Escalation: Order Did Not Trigger", "c": "Hi - we spoke to our chief medical officer, Dr. Doron Stember. He proposed:\nWe'd just need a very quick video visit (it's a legal requirement for new prescriptions). If possible, Dr. Stember will meet with you himself. What's your availability over the next day or so?", "a": "", "cat": "Escalation"}, {"n": "Estriol face cream application recs (RN)", "c": "Our provider's recommend applying the Estriol face cream at night time after you have washed your face prior to bed. This accommodates the greatest rate of absorption. ", "a": "", "cat": "General"}, {"n": "Evaluation Discount", "c": "The actual cost of the service provided in the assessment is heavily discounted from the actual cost of the service. We eat most of the cost for the assessment - the actual cost for the video visit, labs (which are covered in states outside of NY, NJ, and MD, and support actually cost us quite a bit more than what we charge in the assessment. ", "a": "", "cat": "General"}, {"n": "Existing patient showing as lead due to different email", "c": "Hi there, if you are a member already, please use the email we have on file. This will ensure all of your information, including updates to your care that may be discussed at this time are linked to your chart. As of right now our system does not recognize the email you are utilizing. \nPlease let us know if you have any questions regarding this. Thank you! ", "a": "", "cat": "General"}, {"n": "Expanded Labs: No Insurance", "c": "Fountain does not participate with insurance, and due to how our system is structured, we can only order labs if they\u2019re paid for upfront. We\u2019re happy to take care of placing the order for you, and once it's processed, there won\u2019t be any additional fees when you arrive at the lab. If you have any questions, please don\u2019t hesitate to reach out. Thank you!", "a": "", "cat": "Labs"}, {"n": "Extra Meds: Add-on cancel", "c": "Hello, \nI understand that you have extra:   \n\nWe can cancel your add-on plan for now to account for that. Please let us know when you have about two weeks of medication left so our medical team can submit a new RX and so that we can reenable your subscription. The previous one may have expired by then.\n\nPlease let us know if you have any questions!\n\n", "a": "", "cat": "Extra Meds"}, {"n": "Extra Meds: Skip Orders", "c": "Hello from Fountain!\nI understand you have extra medication that will last you until [insert date]. To ensure you continue receiving regular labs, monitoring, support, and consultations, your plan will remain active. However, we can have our partner pharmacy hold your medication shipments until you\u2019re ready for more.\nSince your shipments are paused, your prescription will expire when you are next due for a refill. Please reach out when you have about two weeks of medication left so we can unpause your shipments. If you are on testosterone, you\u2019ll also need to complete a new video visit so a provider can write a new prescription. This lead time helps make sure you don\u2019t run out of medication.\nWe have manually paused your current medications, so no refills will be sent while your account is on pause. Please note that pausing your medication refills does not pause your subscription, as the plan includes bundled services such as follow-up visits and routine monitoring labs in most states.\nIf you have any questions or are ready to resume shipments, just let us know \u2014 we\u2019re happy to help!\n\u200b", "a": "", "cat": "Extra Meds"}, {"n": "Extra Meds: Skip Refills", "c": "Due to the way our system is structured, we don't have a great way to skip refills. If your subscription is current and there are refills on file, our partner pharmacies should process the orders as intended. If you're concerned about extra medication, the best option is to dispose of any additional medication and use the new supply once it arrives. Please let us know if you have any questions. \n", "a": "", "cat": "Extra Meds"}, {"n": "F/U Has Labs", "c": "Hi, it doesn't look like we received your lab results. Can you please send them to support@fountain.net? Thank you.", "a": "", "cat": "F/U"}, {"n": "F/U Labs Scheduling", "c": "We booked your lab visit for a quick blood draw. There\u2019s no need to fast beforehand, unless you have requested one of the following expanded lab test: Hemoglobin A1C or a cholesterol panel. \nFor the majority of states lab fees will be directed to us (not you). This excludes New York, New Jersey, and  Rhode Island.\nHere are your appointment details:\nPlease note that sometimes, Labcorp cannot find the lab order due to technical issues.\nIf they indicate, they cannot find the lab order please provide them with this lab order requisition number:\nIf they are still having issues, please let us know and we'll resolve the situation.", "a": "", "cat": "F/U"}, {"n": "F/U Labs with Getlabs", "c": "Hey - are you still interested in getting your blood drawn by a specialist at your home?", "a": "", "cat": "F/U"}, {"n": "F/U Labs with Labcorp", "c": "Hey, hope you're doing well! We're just checking to see if you're still interested in moving forward with your lab visit.", "a": "", "cat": "F/U"}, {"n": "F/U Walk-In Labs", "c": "Hey - this is Fountain. Hope you're doing well. Just checking to see if you were able to visit LabCorp or Quest for a walk in lab draw this week with the order we provided.", "a": "", "cat": "F/U"}, {"n": "FDA tirzepatide", "c": "Given the recent FDA regulations, we are no longer able to offer tirzepatide. As an alternative, we can discuss semaglutide or sublingual semaglutide for weight loss options. Please let us know if you have any further questions about this. Have a great day! ", "a": "", "cat": "General"}, {"n": "Failed Payment -  Payment Charge Date Change", "c": "This is currently our setup with our payment processor. That said, we can adjust your charge date to correspond directly with your next payment. We will get that set up for you shortly. ", "a": "", "cat": "General"}, {"n": "Failed Payment 1", "c": "Hello from Fountain! We're just checking in with you. It looks like your payments have been past due for a while. Would you still like to continue your subscription with us?", "a": "", "cat": "General"}, {"n": "Failed Payment 1 - Enc", "c": "Hey, this is: from Fountain. It looks like your last payment using the card we have on file did not go through. Is there another card you would like to use? If so, please use this link to update your payment information:\nPlease note that the link will expire within 48 hours for security reasons. Thank you!", "a": "", "cat": "General"}, {"n": "Failed Payment 2 - Cancelation Confirmation", "c": "Hi - this is Fountain. We haven't heard from you recently and your pamyents have been past due for some time. We'll cancel your subscription for now. If you'd like to resume at a later date please just text us. Please note that you may need to schedule a video visit to get your subscription restarted. Wishing you the best.", "a": "", "cat": "Cancellation"}, {"n": "Failed Payment 2 - Enc", "c": "Hi - hope you're doing well. Just checking in to see if you were able to update your payment method. If not, please use this link to do so: Please let us know when you have your payment method updated. Thank you!", "a": "", "cat": "General"}, {"n": "Failed Payment message sent in error", "c": "I see your payment cleared on: It looks like that message was sent due to a system error, please disregard it. Thank you!", "a": "", "cat": "General"}, {"n": "Faith Danielson", "c": "Faith Danielson, Medical Assistant\n\nContact us: \n\u200bText us: 833-967-3100\nCall us: 213-237-1454", "a": "", "cat": "General"}, {"n": "Faxing Docs", "c": "We can certainly receive faxes, but we do not check for them as frequently. Our fax number is: (202) 998-4218", "a": "", "cat": "General"}, {"n": "Fertility & Pregnancy concerns on / after TRT:  RN", "c": "Our TRT team lead provider has advised that some men can achieve pregnancy while on TRT and HCG, but most will need to stop testosterone and continue HCG for 3\u20136 months before conception. We offer enclomiphene to help your body boost its own testosterone production during this time off testosterone. Let us know if you would like to further discuss these possible adjustments to your current regimen, and our customer service team will help you schedule an appointment with one of our providers to discuss the process in more detail.", "a": "", "cat": "TRT"}, {"n": "Florence Ohia", "c": "Florence Ohia, Registered Nurse", "a": "", "cat": "General"}, {"n": "Fountain HRT and TRT subscriptions with lab work included breakdown (DO NOT SEND TO HRT SIGN UPS AFTER 1/21)", "c": "Fountain HRT/TRT are an all-inclusive membership.\nAll subscription plans cover the cost of medication, supplies, provider video visits, lab work (in most states except in NY/NJ/RI, MD), shipping/fees, and 24/7 support.", "a": "", "cat": "HRT"}, {"n": "Free Testosterone on labs TRT", "c": "Our provider's order Albumin and Sex Binding Hormone Globulin(SHBG) for each of our Testosterone Replacement Therapy patient's lab work. These two values are used to calculate the patient's Free Testosterone. This approach allows us to assess your SHBG and albumin while also providing a Free Testosterone result. Our provider's can discuss this further during your evaluation. Please let us know if you have any other questions. ", "a": "", "cat": "TRT"}, {"n": "Frozen Testosterone Cypionate Vial TPH", "c": "Hi there, if you receive a frozen vial of testosterone cypionate that was shipped from our partner pharmacy, The Pharmacy Hub, and would like a replacement you may notify us here. Once notified our team will relay this to the pharmacy to obtain a shipping label. You must print this label out and ship the vial that was frozen back to the pharmacy with this label. Once the pharmacy notates that the return shipment has been initiated, they should ship a replacement directly to the address we have on file for you.\n\nWe apologize for any inconvenience this may cause and are committed to getting you a replacement as swiftly as possible if this is the outcome you prefer. ", "a": "", "cat": "General"}, {"n": "GL Order", "c": "RNs: After the lab order has been generated, please send the ticket back to Daniel Raphael. We will need to provide Getlabs with the lab order. \n\u200b", "a": "", "cat": "General"}, {"n": "GLP 1 year Follow-up", "c": "Hello there!\n\nWe are thrilled to celebrate your one-year membership with Fountain GLP. The providers would like to schedule a quick re-evaluation with you.\nSimply use the link provided to arrange a brief follow-up visit at your convenience:\n\nWe look forward to speaking with you soon!", "a": "", "cat": "GLP"}, {"n": "GLP BMI requirement", "c": "Thank you for completing the pre-qualification form. After reviewing your health information, we've calculated your Body Mass Index (BMI) at xx. This is below the minimum BMI threshold of 27 required by our clinical prescribing guidelines for GLP-1 medications. We appreciate your interest in our services and wish you continued success on your health journey. Please let us know if you have any questions. Thank you! ", "a": "", "cat": "GLP"}, {"n": "GLP Billing: No Split Payments", "c": "While we truly want to support you in your weight loss journey, we cannot split payments up due to the way our subscription system works", "a": "", "cat": "GLP"}, {"n": "GLP Billing: Not moving forward after VV", "c": "If you don't want to move forward that's okay.\n\nIf at a later date, you would like to resume this process please just text us. Have a great day.", "a": "", "cat": "GLP"}, {"n": "GLP Billing: Plan Details", "c": "Our Semaglutide weight loss plan is billed at $950 every 12 weeks. All plans include medication, as well as ongoing monitoring by the Fountain medical team and customer support \u2014 and your fee stays the same, even if your dose goes up over time.\nAll plans are paid upfront and then are re-billed based on the subscription term. Members can cancel at any time by sending us a text. If you were to choose one of these plans and are not prescribed, you get a full refund.", "a": "", "cat": "GLP"}, {"n": "GLP Billing: Prorated Refund Confirmation", "c": "We canceled your subscription and processed a refund of: to account for the unused duration of your subscription. Please note the refund will take between 3-5 business days to go through.\nTake care and please just text us if you ever want to reconsider. You can resume treatment without having you go through the whole process again.", "a": "", "cat": "GLP"}, {"n": "GLP Billing: Refund", "c": "We canceled your subscription and processed a refund of: to account for the unused duration of your subscription. Please note the refund will take between 3-5 business days to go through.", "a": "", "cat": "GLP"}, {"n": "GLP Billing: Tirzepatide Plans", "c": "Our tirzepatide weight loss plan is billed at $950 every 12 weeks for injections and $749 every 12 weeks for Fast SL Semaglutide. All plans include medication, as well as ongoing monitoring by the Fountain medical team and customer support and your fee stays the same, even if your dose goes up over time.\n\u200b\nSignificant weight loss takes 12-24 weeks. Please reach out if you have any further questions. ", "a": "", "cat": "GLP"}, {"n": "GLP CS: Already on GLP", "c": "If you are already on a specific dose, you will be able to speak with a Fountain provider who will be able to prescribe based on your needs and where you are in your journey. Our membership fee covers prescribed medication. Your fee stays the same even if your dose increases.", "a": "", "cat": "GLP"}, {"n": "GLP CS: Check-in Form Link", "c": "It's time for your GLP-1 check-in! Click the link below to let the Fountain medical team know how you're feeling:\n\nThe team will review your responses as part of managing your customized treatment plan:\n\nhttps://fountaintrt.akutehealth.com/forms/64fae2a020b6430c2197295d\n\nHave a great day!", "a": "", "cat": "GLP"}, {"n": "GLP CS: Contact and Emergency Protocol", "c": "Our customer service team is available 24/7 to assist with general inquiries and we'll direct these to our medical team as needed. If you have any questions about your medication, please contact us through this number, and we'll be happy to pass them on to our providers. Please go directly to the nearest Emergency Room for medical emergencies, symptoms, or side effects.", "a": "", "cat": "GLP"}, {"n": "GLP CS: FastSL Semaglutide Info", "c": "We offer Fast Sublingual Semaglutide and it is a fantastic alternative to the injectable form! By simply placing the medication under your tongue, it bypasses the usual metabolic process and goes straight into your system through the mucous membranes. This not only makes it easier for your body to process, but also eliminates the need for injections. If you have any additional questions, please don't hesitate to let us know. We're here to help!", "a": "", "cat": "GLP"}, {"n": "GLP CS: Form Error", "c": "Hello,\n\u200b\nThe error you're encountering with the form could be due to the name you used for registration. According to our records, your name is registered as\n\nFirst name:\nLast name:\n\u200b\nWould you mind attempting to fill out the form again?", "a": "", "cat": "GLP"}, {"n": "GLP CS: Labs Turnaround Time", "c": "Hi there,\n\nLab results should be available within 24-48 hours. We'll notify you once we receive your results.", "a": "", "cat": "GLP"}, {"n": "GLP CS: Message to provider; Medical Emergency or Concerning symptoms", "c": "Sorry to hear about this. We'll notify our medical team. If you are experiencing a medical emergency or concerning symptoms or side effects, please go immediately to the closest Emergency Room.", "a": "", "cat": "GLP"}, {"n": "GLP CS: No signature requirement", "c": "The medication does not have a signature requirement.", "a": "", "cat": "GLP"}, {"n": "GLP Follow-up: Check-in (Needs labs)", "c": "Hey,\n\nHope you're doing
