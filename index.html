, {"n": "Shipping/Billing: Early Notification", "c": "Due to the way our current system is set up, we don't have a great way to notify you before a shipment is processed or before a payment is drawn. We recognize that this is not ideal, and we're working on creating a patient portal that will contain all of this information. Once this is set up, we will let you know. For now, if you have any questions regarding payments or shipments, text us at any time\u2014we have someone available 24/7 who will answer your questions. \n\n\n\n", "a": "", "cat": "Shipping"}, {"n": "Shipping: Confirming with new patients if they can receive deliveries at their home address", "c": "Hello this is: from Fountain. Hope you're doing well. Just wanted to let you know that if prescribed TRT we'll be sending your medication through a pharmacy that requires a signature upon delivery. Will you, or someone at your household be able to sign for the order? Please answer with YES if you expect to have someone sign or NO if you don't expect that someone would be home to sign. Signers can be anyone at your home who's at least 18 years old.", "a": "", "cat": "Shipping"}, {"n": "Shipping: DL Number", "c": "Before we can ship your medication, our pharmacy will require your driver's license ID number. Could you kindly provide the ID number?", "a": "", "cat": "Shipping"}, {"n": "Shipping: Extra meds sent accidentally", "c": "Your next medication shipment has arrived early. Please store it and begin using once you've finished your current supply. You won't receive another delivery at the usual time, but future shipments will follow your regular schedule. Questions? Let us know!", "a": "", "cat": "Shipping"}, {"n": "Shipping: How many days after payment do shipments go out?", "c": "Depending on the pharmacy used to process your order, it may take up to 8 business days for your order to go out. You will receive a tracking link when your order goes out.", "a": "", "cat": "Shipping"}, {"n": "Shipping: How many vials are in each order?", "c": "The specific number of vials depends on the treatment plan and will be determined once you meet up with a provider.", "a": "", "cat": "Shipping"}, {"n": "Shipping: If we reach out to FedEx to confirm if a delivery has been completed to Walgreens", "c": "We reached out to FedEx and the representative confirmed they successfully delivered your shipment to the Walgreens location at [address]. We'll reach out to the Walgreens location and confirm that your order is ready for pick-up.", "a": "", "cat": "Shipping"}, {"n": "Shipping: In transit to Walgreens", "c": "Hello - your package is in transit, and it should be delivered to the Walgreens located at [Walgreens address] on [Delivery date].", "a": "", "cat": "Shipping"}, {"n": "Shipping: Let the patient know we will process a replacement order at no cost (upon Dan's approval)", "c": "Hey - it looks like your package was delivered to the Walgreens at:   . The shipment can only be held at Walgreens for 5-7 days before it\u2019s sent back.", "a": "", "cat": "Shipping"}, {"n": "Shipping: Rerouting to Fedex Site", "c": "We can try to ask the carrier if they can hold the package - but we haven't had much success doing this. What we've found has worked is using the Fedex Delivery Manager, and asking Fedex to reroute the shipment to an alternative location. This would require you to handle this on your end though. Here's the link: https://www.fedex.com/en-us/delivery-manager.html Please let us know if we can help out.", "a": "", "cat": "Shipping"}, {"n": "Shipping: Rerouting to a UPS site", "c": "We can try to ask the carrier if they can hold the package - but we haven't had much success doing this. What we've found has worked is using the UPS Delivery Manager and asking them to reroute the shipment to an alternative location. This would require you to handle this on your end though. Here's the link: https://www.ups.com/us/en/track/ups-my-choice.page Please let us know if we can help out.", "a": "", "cat": "Shipping"}, {"n": "Shipping: Reship refill", "c": "We'll ask the pharmacy to reship at our own expense. Please note that since this is an early refill it may take the pharmacy a little longer to process the order, but you'll receive a tracking link within one week. Have a great day.", "a": "", "cat": "Shipping"}, {"n": "Shipping: TRT injections order content", "c": "Hi - The order should contain needles, a TRT vial, and alcohol prep pads. The order does not include the needle case. The needle case ('sharps container'), to dispose of used needles is available at most local pharmacies.", "a": "", "cat": "Shipping"}, {"n": "Shipping: Walgreens Pickup Fees", "c": "You should not need to pay anything to pick up the order.", "a": "", "cat": "Shipping"}, {"n": "Shipping: Walgreens confirmation", "c": "Great! You\u2019ll know when the shipment arrives at Walgreens based on the tracking link in the text you\u2019ll receive whenever your shipments go out. Once a shipment arrives at Walgreens you\u2019ll have 7 days to pick it up - ask for the FedEx package area (not the pharmacy) within the store.", "a": "", "cat": "Shipping"}, {"n": "Shipping: Walgreens/Fedex Hold Time", "c": "Once a shipment arrives at Walgreens you\u2019ll have 7 days to pick it up - ask for the FedEx package area (not the pharmacy) within the store.", "a": "", "cat": "Shipping"}, {"n": "Shipping: When is my next order due?", "c": "Your next order is set to begin processing on:", "a": "", "cat": "Shipping"}, {"n": "Shipping: Will I receive the medication all at once?", "c": "Depending on what treatment and subscription plan you choose the cadence of deliveries will vary. For instance, if you prescribed TRT cream and chose the monthly plan you would receive deliveries every month.", "a": "", "cat": "Shipping"}, {"n": "Should TRT be held for initial labs if already utilizing testosterone replacement? (prescribed versus not prescribed) RN", "c": "Hi there, our TRT team lead provider has advised the following. \nThere is no need to hold your current testosterone in preparation for the initial set of lab work if you currently have a prescribed TRT regimen. Please provide a photo/copy of your most recent prescription including your name, date prescribed, and dosage displayed on the label. To avoid treatment gaps, you may continue to utilize your current regimen until you begin TRT regimen prescribed by Fountain or advised otherwise by our provider. \nIf you are using a form of TRT that has not been prescribed we request you please discontinue use for two months prior to having your labs drawn. This time frame will allow recovery, so your production may return to baseline. ", "a": "", "cat": "TRT"}, {"n": "Spanish interpreter has been requested, please stay connected", "c": "Hola, gracias por conectarse a la visita por video. He solicitado un int\u00e9rprete para que se una a la visita. Es posible que el v\u00eddeo se vuelva a cargar durante unos segundos mientras el int\u00e9rprete se une. \u00a1Mant\u00e9ngase conectado y comenzaremos con su visita en breve!", "a": "", "cat": "General"}, {"n": "Spironolactone Add-on Plan", "c": "We just set up your add-on plan! This subscription is normally billed at $25 every 12 weeks. Unless you indicate that you need to pause/cancel the charge will be run automatically going forward. Please let us know if you have any questions. ", "a": "", "cat": "General"}, {"n": "Start Subscription $1799/48 weeks  DO NOT SEND TO ANY HRT PATIENTS THAT SIGNED UP AFTER 1/21/26, OR NY HRT PT WHO START 12/17-> AFTER", "c": "Great! We're glad to have you here with us. Your subscription is billed at $1799 every 48 weeks. If you need to make any changes to your plan, please get in touch with us before your next charge date. \u200b\nThe subscription covers the cost of medication, shipping, consultation, support, and lab fees (in most states.)\nYou\u2019ll receive a tracking link via text once your order ships. Most orders are shipped within a week.\n\u200b\nPlease let us know if you have any questions!", "a": "", "cat": "HRT"}, {"n": "Start Subscription $499/12 weeks  DO NOT SEND TO ANY HRT PATIENTS THAT SIGNED UP AFTER 1/21/26, OR NY HRT PT WHO START 12/17-> AFTER", "c": "Great! We're glad to have you here with us. Your subscription is billed at $499 every 12 weeks. If you need to make any changes to your plan, please contact us before your next charge date. \n\u200b\nThe subscription covers the cost of medication, shipping, consultation, support, and lab fees (in most states.)  \nYou\u2019ll receive a tracking link via text once your order ships. Most orders are shipped within a week.\n\u200b\nPlease let us know if you have any questions!", "a": "", "cat": "HRT"}, {"n": "Start Subscription: $199/4 weeks DO NOT SEND TO ANY HRT PATIENTS THAT SIGNED UP AFTER 1/21/26, OR NY HRT PT WHO START 12/17-> AFTER", "c": "Great! We're glad to have you here with us. Your subscription is billed at $199 every 4 weeks. If you need to make any changes to your plan, please get in touch with us before your next charge date. \u200b\nThe subscription covers the cost of medication, shipping, consultation, support, and lab fees (in most states.)\nYou\u2019ll receive a tracking link via text once your order ships. Most orders are shipped within a week.\n\u200b\nPlease let us know if you have any questions!", "a": "", "cat": "HRT"}, {"n": "Start Subscription: Anastrozole Plan $30", "c": "We just set up your subscription! Please note that this subscription is billed at $30 every 12 weeks.\n\nYou\u2019ll receive a tracking link via text once your order ships. Most orders are shipped within a week.\n\u200b\nPlease let us know if you have any questions!", "a": "", "cat": "General"}, {"n": "Start Subscription: Any GLP Plan (Need labs)", "c": "Great! We're glad to have you here with us. We just set up your subscription. If you need to make any changes to your plan please get in touch with us before your next charge date.\n\u200b\nThe subscription covers medication, FedEx/UPS delivery, ongoing monitoring by the FountainGLP medical team, and 24/7 customer support. It's billed at $ every\n\u200b\nThe final step is labs. We\u2019ll schedule you an appointment at a convenient time, and we fully cover the cost. What days and times work best for you this week? If you already have lab results from the past year, you may be able to skip this. Let us know!\nResults take about 24 hours and will be promptly reviewed. If we have any concerns we'll contact you to discuss next steps. Otherwise, if results are normal, the medication will be on its way!", "a": "", "cat": "GLP"}, {"n": "Start Subscription: Any GLP Plan (No labs needed)", "c": "Great! We're glad to have you here with us. If you need to make any changes to your plan please get in touch with us before your next charge date.\n\u200b\nThe subscription covers medication, FedEx/UPS delivery, ongoing monitoring by the FountainGLP medical team, and 24/7 customer support. It's billed at $ every.\n\u200b\nHere's a quick video about what to expect with GLP-1 weight loss: https://fountaintrt.wistia.com/medias/he6o6uvl7n", "a": "", "cat": "GLP"}, {"n": "Start Subscription: Blush Cream(HRT) and ED Meds/Tadalafil (TRT) $99/12 Week", "c": "We just set up your subscription. It's billed at $99 every 12 weeks.  The subscription will recur unless you indicate you wish to cancel.  Please let us know if you have any questions!\nYou\u2019ll receive a tracking link via text once your order ships. \n\u200b\nPlease let us know if you have any questions!", "a": "", "cat": "HRT"}, {"n": "Start Subscription: Face Cream", "c": "We just set up your subscription. It's billed at $149 every 12 weeks. Please let us know if you have any questions!\nYou\u2019ll receive a tracking link via text once your order ships. \nPlease let us know if you have any questions!", "a": "", "cat": "General"}, {"n": "Start Subscription: HCG Plan $399", "c": "We just set up your subscription! Please note that this subscription is billed at $399 every eight weeks. Unless you indicate that you need to pause/cancel the charge will be run automatically going forward. \nYou\u2019ll receive a tracking link via text once your order ships. \n\u200b\nPlease let us know if you have any questions!", "a": "", "cat": "General"}, {"n": "Start Subscription: Hair Growth $119 every 6 weeks", "c": "We just set up your plan! It's billed at $119 every 6 weeks. Please let us know if you have any questions. \nYou\u2019ll receive a tracking link via text once your order ships. \n\u200b\nPlease let us know if you have any questions!", "a": "", "cat": "General"}, {"n": "Start Subscription: Hair Growth $129/8 weeks", "c": "We just set up your plan! It's billed at 129 every 8 weeks. Please let us know if you have any questions. \nYou\u2019ll receive a tracking link via text once your order ships. \n\u200b\nPlease let us know if you have any questions!", "a": "", "cat": "General"}, {"n": "Start Subscription: Hair Growth $89/8 weeks", "c": "We just set up your plan! It's billed at 89 every 8 weeks. Please let us know if you have any questions. \nYou\u2019ll receive a tracking link via text once your order ships. \n\u200b\nPlease let us know if you have any questions!", "a": "", "cat": "General"}, {"n": "Start Subscription: Med Clear", "c": "Hey - this is Fountain. Our medical team has indicated you're interested in starting treatment, but will need medical clearance before we can proceed. Please let us know when you're able to obtain medical clearance, so we can help you set up your subscription. Thank you!", "a": "", "cat": "General"}, {"n": "Start Subscription: Resume treatment", "c": "We're glad to hear you'd like to resume treatment! You'll need to speak with a provider to resume your subscription. Please use this link to schedule a visit with them: Have a great day!", "a": "", "cat": "General"}, {"n": "Start Subscription: Spironolactone", "c": "We just set up your subscription! This subscription is billed at $25 every 12 weeks. Please let us know if you have any questions. ", "a": "", "cat": "General"}, {"n": "Start add-on", "c": "I'm glad to hear you're interested in an add-on plan! We just sent the link over so you can set up that plan. ", "a": "", "cat": "General"}, {"n": "Summer Denny", "c": "- Summer Denny, NP", "a": "", "cat": "General"}, {"n": "Support Email", "c": "Our email is: support@fountain.net", "a": "", "cat": "General"}, {"n": "System Error causing lab scheduling message to send to HRT sign ups after 1/21/26", "c": "Hi there, we apologize for the confusion\u2014our system sent the previous message regarding lab scheduling in error.\nAt this time, the next step is to schedule your initial video visit with one of our providers. If you haven\u2019t already done so, please use the link below to book your appointment:\n[Insert scheduling link]\n\nWe look forward to speaking with you soon!", "a": "", "cat": "HRT"}, {"n": "T Cyp 10ml - extra vials", "c": "Our partner pharmacy ships the medication every ten weeks based on their recommendation. They indicated that patients should always have a fresh vial of medication (in other words, a vial that was first punctured fewer than 10 weeks ago). Based on their recommendation, we suggest you dispose of the vial you currently have and use the new one. Please let us know if you have any questions.", "a": "", "cat": "General"}, {"n": "T cyp vial shipping, billing, timing. Payment timing is separate from medication shipments", "c": "Hi {{first_name}}. Payment timing is separate from medication shipments (except for the very first payment and shipment). Your membership fee covers video visits, labs (in most states), shipping, taxes, customer service, and medication costs. Since testosterone is a controlled substance, the pharmacy cannot legally ship the next vial until there are 7-10 days left in your current one. If your dose changes mid-vial, we notify the pharmacy in writing so they can ship the next vial based on the updated usage timeline. We offer membership plans with payments every 4 weeks, 12 weeks, or 48 weeks. With longer plans, each payment is bigger but you pay less overall compared to the 4-week plan. All plans keep the same medication shipping schedule regardless of payment frequency. I'd be happy to discuss further if you'd like. Thanks - {{message.author.name}}", "a": "", "cat": "Billing"}, {"n": "T-Supplements", "c": "Welcome to Fountain, we appreciate you reaching out. It is generally recommended to stop any T-boosting supplements or medications that could affect testosterone levels at least 2-4 weeks before testing as this allows sufficient time for the body to clear these substances and for hormone levels to stabilize.\nAlternatively, you can have your levels checked while on the supplements but you may need to have the tests repeated again depending on your results.\nPlease let us know if you have any other questions or concerns", "a": "", "cat": "General"}, {"n": "T-booster labs", "c": "If you are currently on a T-booster, you can proceed with having the labs completed, and also provide your prior Testosterone levels for review. The provider may ask for repeat labs off of the T-boosters depending on the results. Please let us know if you have any further questions. Have a great day! ", "a": "", "cat": "Labs"}, {"n": "T-cream 3rd party testing", "c": "With regards to 3rd party testing of our testosterone cream product, our partner pharmacy Curexa reports: \"We do always use FDA approved ingredients and compound with the greatest of care. We do conduct 3rd party potency testing approximately every 3 months.\"", "a": "", "cat": "General"}, {"n": "T-cream ingredients, % strength, detailed info MALE PATIENT'S ONLY", "c": "Our partner pharmacy has indicated: \"The Fountain testosterone cream is compounded with: testosterone powder, ethoxy diglycol and HRT cream base.\nThe percentage breakdown would be: Testosterone ~ 22%, Ethoxy diglycol - 15%, HRT cream base - 63%.\u201d\n***This is based on the 50 mg/0.25ml strength testosterone cream", "a": "", "cat": "General"}, {"n": "T-cyp 40mg", "c": "Please view this link to review your prescribed dose:  https://blog.fountaintrt.com/tcyp40mg2xperweek/", "a": "", "cat": "General"}, {"n": "THUGHES", "c": "-Taylor Hughes, RN", "a": "", "cat": "General"}, {"n": "TP/BD ticket info", "c": "HCT when ordered:\nDid a dose reduction occur/was patient advised to hold:\nStatus of BD/TP:\nIf TP, status of order (preparing, sent to provider for signature, uploaded to chart, faxed to facility):\nDid the HCT decrease below 54 on follow up lab work:\n", "a": "", "cat": "General"}, {"n": "TPH: Early Refill Requests", "c": "Thank you for your request. I\u2019ve shared this with the Refills and Clarifications team, and we\u2019ll update you as soon as we have more information.\n\u200b", "a": "", "cat": "General"}, {"n": "TPH: GLP Temperature Guidelines", "c": "Our partner pharmacy has conducted stability and temperature excursion studies to ensure the medication can be shipped in temperature conditions up to 104\u00b0F for up to 5 days. If you experience any issues with the package upon receipt, please inform us immediately.", "a": "", "cat": "GLP"}, {"n": "TPH: Missing Needles", "c": "Hello - shipments from TPH should contain 30 needles. Do you think the pharmacy filled the order incorrectly? If so, we'll contact them and get that addressed.", "a": "", "cat": "General"}, {"n": "TPH: Replacement for delivered controlled substance order", "c": "Unfortunately, the pharmacy that filled your prior prescription has informed us they can't legally process an early refill for any controlled substance med without a police report documenting the missing package.\nThe pharmacy is required follow DEA regulations for controlled medications. Without this documentation they'd be at risk of losing their license or even criminal charges. I'd be happy to connect you directly with the pharmacy to discuss further if you'd like. \nFiling a report with your local PD explaining what happened with your package is typically a straightforward and routine process. Once the report is forwarded, the pharmacy will immediately process the refill. If you'd prefer not to file a report, we completely understand and will process a full refund of your last TRT payment.\nPlease let us know how you'd like to proceed.", "a": "", "cat": "General"}, {"n": "TRT - Expanded labs", "c": "Great! We\u2019re happy to help with that. You can find details about our expanded lab packages with the following link:  https://blog.fountaintrt.com/fountaintrt-extra-labsets/ \n\u200b\nWhen using our lab scheduling link, you\u2019ll have the option to select from the expanded lab panels. Any associated charges will be applied at checkout, and your lab order will automatically include the additional tests you choose.\n\u200b\nIf you have any questions or need assistance along the way, please don\u2019t hesitate to reach out\u2014we\u2019re here to help.", "a": "", "cat": "TRT"}, {"n": "TRT AL - Follow-up visit", "c": "Hello - it's time to schedule your visit with a Fountain provider! Here's the link to schedule your follow-up visit. This will let you schedule with a provider licensed in your state. Please select the 'Follow-up Visit' option: https://go.oncehub.com/FountainTRTAL\nIf you're traveling outside of your home state at the time of the visit please let us know, so we can make sure you see a provider licensed in that state.", "a": "", "cat": "TRT"}, {"n": "TRT AL - New patient visit", "c": "Hello - it's time to schedule your visit with a Fountain provider! Here's the link to schedule your visit. This will let you schedule with a provider licensed in your state. Please select the 'New Patient Visit' option: https://go.oncehub.com/FountainTRTAL\nIf you're traveling outside of your home state at the time of the visit please let us know, so we can make sure you see a provider licensed in that state.", "a": "", "cat": "TRT"}, {"n": "TRT AZ - Follow-up visit", "c": "Hello - it's time to schedule your visit with a Fountain provider! Here's the link to schedule your follow-up visit. This will let you schedule with a provider licensed in your state. Please select the 'Follow-up Visit' option: https://go.oncehub.com/FountainTRTAZ\nIf you're traveling outside of your home state at the time of the visit please let us know, so we can make sure you see a provider licensed in that state.", "a": "", "cat": "TRT"}, {"n": "TRT AZ - New patient visit", "c": "Hello - it's time to schedule your visit with a Fountain provider! Here's the link to schedule your visit. This will let you schedule with a provider licensed in your state. Please select the 'New Patient Visit' option: https://go.oncehub.com/FountainTRTAZ\nIf you're traveling outside of your home state at the time of the visit please let us know, so we can make sure you see a provider licensed in that state.", "a": "", "cat": "TRT"}, {"n": "TRT CA - Follow-up visit", "c": "Hello - it's time to schedule your visit with a Fountain provider! Here's the link to schedule your follow-up visit. This will let you schedule with a provider licensed in your state. Please select the 'Follow-up Visit' option: https://go.oncehub.com/FountainTRTCA\nIf you're traveling outside of your home state at the time of the visit please let us know, so we can make sure you see a provider licensed in that state.", "a": "", "cat": "TRT"}, {"n": "TRT CO - Follow-up visit", "c": "Hello - it's time to schedule your visit with a Fountain provider! Here's the link to schedule your follow-up visit. This will let you schedule with a provider licensed in your state. Please select the 'Follow-up Visit' option: https://go.oncehub.com/FountainTRTCO\nIf you're traveling outside of your home state at the time of the visit please let us know, so we can make sure you see a provider licensed in that state.", "a": "", "cat": "TRT"}, {"n": "TRT CO - New patient visit", "c": "Hello - it's time to schedule your visit with a Fountain provider! Here's the link to schedule your visit. This will let you schedule with a provider licensed in your state. Please select the 'New Patient Visit' option: https://go.oncehub.com/FountainTRTCO\nIf you're traveling outside of your home state at the time of the visit please let us know, so we can make sure you see a provider licensed in that state.", "a": "", "cat": "TRT"}, {"n": "TRT CT - Follow-up visit", "c": "Hello - it's time to schedule your visit with a Fountain provider! Here's the link to schedule your follow-up visit. This will let you schedule with a provider licensed in your state. Please select the 'Follow-up Visit' option: https://go.oncehub.com/FountainTRTCT\nIf you're traveling outside of your home state at the time of the visit please let us know, so we can make sure you see a provider licensed in that state.", "a": "", "cat": "TRT"}, {"n": "TRT CT - New patient visit", "c": "Hello - it's time to schedule your visit with a Fountain provider! Here's the link to schedule your visit. This will let you schedule with a provider licensed in your state. Please select the 'New Patient Visit' option: https://go.oncehub.com/FountainTRTCT\nIf you're traveling outside of your home state at the time of the visit please let us know, so we can make sure you see a provider licensed in that state.", "a": "", "cat": "TRT"}, {"n": "TRT Cream Delays", "c": "Hello, we contacted our partner pharmacy and asked for an update on your order. They just indicated that they are working on getting your order out, but it's been delayed due to a staffing issue. Please note we added a $50 credit to your account. I would expect the order to go out within the next few days.", "a": "", "cat": "TRT"}, {"n": "TRT Dosing Considerations Decision Making", "c": "The dose is determined based on the patient\u2019s medical history and test results. Adjustments are made based on treatment effectiveness, side effects, and safety considerations, including lab results. There is no specific target testosterone level, as individual responses vary\u2014some people feel best at 900, while others do at 500. Testosterone levels will fluctuate, with peaks and valleys, so lab results can vary by a few hundred points depending on when they are drawn. We recommend not getting caught up in the testosterone number, but focus more on how you are feeling and the goals you wish to achieve with treatment. ", "a": "", "cat": "TRT"}, {"n": "TRT Evaluation", "c": "If you're interested in our TRT program, please complete the assessment on our website at: https://fountain.net/trt. The evaluation will help us better understand your needs and enable our medical team to provide more appropriate recommendations when you speak with them.", "a": "", "cat": "TRT"}, {"n": "TRT Evaluation Video", "c": "Here's the link to the video patients are sent after they complete our online evaluation: https://join.fountaintrt.com/success?_ftn_id=Kg%3D%3D\n\nPlease let us know if we can help out with anything else!\n", "a": "", "cat": "TRT"}, {"n": "TRT FL - Follow-up visit", "c": "Hello - it's time to schedule your visit with a Fountain provider! Here's the link to schedule your follow-up visit. This will let you schedule with a provider licensed in your state. Please select the 'Follow-up Visit' option: https://go.oncehub.com/FountainTRTFL\nIf you're traveling outside of your home state at the time of the visit please let us know, so we can make sure you see a provider licensed in that state.", "a": "", "cat": "TRT"}, {"n": "TRT FL - New patient visit", "c": "Hello - it's time to schedule your visit with a Fountain provider! Here's the link to schedule your visit. This will let you schedule with a provider licensed in your state. Please select the 'New Patient Visit' option: https://go.oncehub.com/FountainTRTFL\nIf you're traveling outside of your home state at the time of the visit please let us know, so we can make sure you
