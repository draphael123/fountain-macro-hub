schedule your visit with a Fountain provider! Here's the link to schedule your follow-up visit. This will let you schedule with a provider licensed in your state. Please select the 'Follow-up Visit' option: https://go.oncehub.com/FountainTRTIN\nIf you're traveling outside of your home state at the time of the visit please let us know, so we can make sure you see a provider licensed in that state.", "a": "", "cat": "TRT"}, {"n": "TRT IN - New patient visit", "c": "Hello - it's time to schedule your visit with a Fountain provider! Here's the link to schedule your visit. This will let you schedule with a provider licensed in your state. Please select the 'New Patient Visit' option: https://go.oncehub.com/FountainTRTIN\nIf you're traveling outside of your home state at the time of the visit please let us know, so we can make sure you see a provider licensed in that state.", "a": "", "cat": "TRT"}, {"n": "TRT KY - Follow-up visit", "c": "Hello - it's time to schedule your visit with a Fountain provider! Here's the link to schedule your follow-up visit. This will let you schedule with a provider licensed in your state. Please select the 'Follow-up Visit' option: https://go.oncehub.com/FountainTRTKY\nIf you're traveling outside of your home state at the time of the visit please let us know, so we can make sure you see a provider licensed in that state.", "a": "", "cat": "TRT"}, {"n": "TRT KY - New patient visit", "c": "Hello - it's time to schedule your visit with a Fountain provider! Here's the link to schedule your visit. This will let you schedule with a provider licensed in your state. Please select the 'New Patient Visit' option: https://go.oncehub.com/FountainTRTKY\nIf you're traveling outside of your home state at the time of the visit please let us know, so we can make sure you see a provider licensed in that state.", "a": "", "cat": "TRT"}, {"n": "TRT Lead Scheduling VV before completed Assessment", "c": "Hi there, it seems a system error has occurred. You were scheduled for a video visit before first completing some very important steps include the assessment and intake.\n\u200b\nWe will need to cancel your visit at this time. Once the proper steps have been completed our team may assist you with scheduling. Please let us know if any questions regarding the assessment you may locate on this page: https://fountain.net/trt", "a": "", "cat": "TRT"}, {"n": "TRT MD - Follow-up visit", "c": "Hello - it's time to schedule your visit with a Fountain provider! Here's the link to schedule your follow-up visit. This will let you schedule with a provider licensed in your state. Please select the 'Follow-up Visit' option: https://go.oncehub.com/FountainTRTMD\nIf you're traveling outside of your home state at the time of the visit please let us know, so we can make sure you see a provider licensed in that state.", "a": "", "cat": "TRT"}, {"n": "TRT MD - New patient visit", "c": "Hello - it's time to schedule your visit with a Fountain provider! Here's the link to schedule your visit. This will let you schedule with a provider licensed in your state. Please select the 'New Patient Visit' option: https://go.oncehub.com/FountainTRTMD\nIf you're traveling outside of your home state at the time of the visit please let us know, so we can make sure you see a provider licensed in that state.", "a": "", "cat": "TRT"}, {"n": "TRT MED:  What dosages do you offer for tadalafil?", "c": "Per our medical team, we offer low-dose daily tadalafil at 2.5 mg or 5 mg tablets daily. We also offer doses of 10 mg and 20 mg tablets for on-demand (as needed) dosing. ", "a": "", "cat": "TRT"}, {"n": "TRT MED: \"What if I miss a dose?\" T-cyp/T-cream/enclomiphene \"", "c": "We apologize for the delay in shipment. You may experience some of the same Low-T symptoms you had prior to starting TRT treatment. Please let us know if you have any other questions. \n", "a": "", "cat": "TRT"}, {"n": "TRT MED: \"What is the starting dose for Enclomiphene?\"", "c": "Enclomiphene is available in 6.25 mg, 12.5 mg, and 25 mg doses. We typically start with 12.5 mg daily and recheck labs six weeks after initiating treatment to determine whether a dose adjustment is necessary.\n\u200b", "a": "", "cat": "TRT"}, {"n": "TRT MED: ALL State Based Scheduling Links", "c": "FountainAL - https://go.oncehub.com/FountainTRTAL\nFountainAZ - https://go.oncehub.com/FountainTRTAZ\nFountainCA - https://go.oncehub.com/FountainTRTCA\nFountainCO - https://go.oncehub.com/FountainTRTCO\nFountainCT - https://go.oncehub.com/FountainTRTCT\nFountainFL - https://go.oncehub.com/FountainTRTFL\nFountainGA - https://go.oncehub.com/FountainTRTGA\nFountainIL - https://go.oncehub.com/FountainTRTIL\nFountainIN - https://go.oncehub.com/FountainTRTIN\nFountainKY - https://go.oncehub.com/FountainTRTKY\nFountainMI - https://go.oncehub.com/FountainTRTMI\nFountainMO - https://go.oncehub.com/FountainTRTMO\nFountainNJ - https://go.oncehub.com/FountainTRTNJ\nFountainNY - https://go.oncehub.com/FountainTRTNY\nFountainNC - https://go.oncehub.com/FountainTRTNC\nFountainOH - https://go.oncehub.com/FountainTRTOH\nFountainPA - https://go.oncehub.com/FountainTRTPA\nFountainTN - https://go.oncehub.com/FountainTRTTN\nFountainTX - https://go.oncehub.com/FountainTRTTX\nFountainVA - https://go.oncehub.com/FountainTRTVA\nFountainWA - https://go.oncehub.com/FountainTRTWA\nFountainWI - https://go.oncehub.com/FountainTRTWI", "a": "", "cat": "TRT"}, {"n": "TRT MED: Acne prevention Treatment", "c": "Consider over-the-counter salicylic acid body wash products and use a clean washcloth or loofa when showering. There are also over the counter products such as benzyl peroxide (ie Panoxyl) that can be applied directly to the areas of acne to speed resolution. Avoid/reduce dairy, fried foods, and simple carbohydrates (sugar) from your diet. Eat whole foods and avoid processed foods. Reduce stress and get plenty of sleep. Shower immediately after workouts and sleep in clean clothing/bedding.", "a": "", "cat": "TRT"}, {"n": "TRT MED: Anastrozole 0.5 mg cut tablets instructions", "c": "Anastrozole requires you cut the tablets in half and take 1/2 tab twice a week. Sometimes it's a bit difficult to cut so you may want to use a pill cutter. It's acceptable if the pill isn't cut exactly into halves or quarters (according to your dose). Some potential side effect of anastrozole include upset stomach, joint discomfort, and hot flashes.", "a": "", "cat": "TRT"}, {"n": "TRT MED: Can I start my HCG while waiting on TRT to arrive?", "c": "Starting human chorionic gonadotropin (HCG) injections before testosterone cypionate (T-cyp) can be more effective at preserving sperm production, testicle size, and testicular consistency. You can begin taking HCG now while waiting for your T-cyp injections to arrive, as this may help optimize the benefits", "a": "", "cat": "TRT"}, {"n": "TRT MED: Cardiac concerns with TRT (TRAVERSE Info link) Afib, MACE", "c": "A recent study called the TRAVERSE trial, which was supported by an extensive prior literature, and found beyond any reasonable doubt that TRT in testosterone deficient individuals is not associated with increased risk of major adverse cardiovascular events (MACE).\nhttps://www.mayoclinicproceedings.org/action/showPdf?pii=S0025619624004087", "a": "", "cat": "TRT"}, {"n": "TRT MED: Changing the timing of injections", "c": "You can inject at whatever time of day works best for your schedule. The timing of testosterone injections can be flexible as long as the dosing schedule is maintained consistently. This approach helps achieve stable testosterone levels and effective symptom management.", "a": "", "cat": "TRT"}, {"n": "TRT MED: Complete TP", "c": "Pt reported He completed Therapeutic Phlebotomy on xxx (this date) (for documenting in Akute after the Pt has donated and now sent a message to report the donation date) \n", "a": "", "cat": "TRT"}, {"n": "TRT MED: Compressed cream", "c": "The vial may contain compressed air that needs to be released when starting a new bottle. To address this, they should repeatedly pump the bottle until all the compressed air is released, and then the cream will begin to dispense.", "a": "", "cat": "TRT"}, {"n": "TRT MED: DHEA general info", "c": "DHEA is the most abundant hormone in the body, though it naturally declines with age. It supports the immune system, enhances sex drive, and acts as a building block for testosterone and other hormones. Some studies suggest that higher DHEA levels may be linked to longevity, and it is also available over the counter. While not universally agreed upon in the medical community, we believe DHEA can be beneficial, though not essential.", "a": "", "cat": "TRT"}, {"n": "TRT MED: Do you offer a pill that increases T level?", "c": "Our providers can prescribe enclomiphene.", "a": "", "cat": "TRT"}, {"n": "TRT MED: Does T Cream need to be refrigerated?", "c": "Our medical team has indicated the following: T-cream does not need to be refrigerated. It should be stored at room temperature, (68\u00b0F to 77\u00b0F).", "a": "", "cat": "TRT"}, {"n": "TRT MED: Doron's Video Explaining Treatment Options and Side Effects", "c": "We are happy to answer any general questions you have about our program and can also pass on any specific medical questions to our medical team. With that being said, our medical director has created a video that discusses the available treatment options and provides additional information about the program: https://fountaintrt.wistia.com/medias/cfhv60f5iy ", "a": "", "cat": "TRT"}, {"n": "TRT MED: Dosage Increases", "c": "The subscription you are on covers the cost of any dosage changes.", "a": "", "cat": "TRT"}, {"n": "TRT MED: Dosing Image for T Cyp 100mg BIW", "c": "For testosterone cypionate 100 mg dose, this image shows exactly how much medication to draw in the syringe:\nhttps://blog.fountaintrt.com/tcyp100mg2xperweek/", "a": "", "cat": "TRT"}, {"n": "TRT MED: Dosing Image for T Cyp 50 mg BIW vial concentration 200mg/ml", "c": "This image shows exactly how much medication to draw in the syringe: https://blog.fountaintrt.com/tcyp50mg2xperweek/", "a": "", "cat": "TRT"}, {"n": "TRT MED: Dosing Image for T Cyp 60 mg BIW", "c": "For testosterone cypionate 60 mg dose, this image shows exactly how much medication to draw in the syringe:\nhttps://blog.fountaintrt.com/tcyp60mg2xperweek/\n\u200b", "a": "", "cat": "TRT"}, {"n": "TRT MED: Dosing Image for T Cyp 70 mg BIW", "c": "For testosterone cypionate 70 mg dose, this image shows exactly how much medication to draw in the syringe:\nhttps://blog.fountaintrt.com/tcyp70mg2xperweek/", "a": "", "cat": "TRT"}, {"n": "TRT MED: Dosing Image for T Cyp 76 mg BIW", "c": "For testosterone cypionate 76 mg dose, this image shows exactly how much medication to draw in the syringe:\nhttps://blog.fountaintrt.com/tcyp76mg2xperweek/", "a": "", "cat": "TRT"}, {"n": "TRT MED: Dosing Image for T Cyp 90mg BIW", "c": "For testosterone cypionate 90 mg dose, this image shows exactly how much medication to draw in the syringe:\nhttps://blog.fountaintrt.com/tcyp90mg2xperweek/", "a": "", "cat": "TRT"}, {"n": "TRT MED: EasyTouch 0.5 mL insulin syringes injections amazon link", "c": "These syringes are very similar to the ones our partner pharmacy ships with medication. These have 0.5 mL of capacity while our partner pharmacy ships 1 mL vials. Otherwise they\u2019re exactly the same.\nhttps://www.amazon.com/EasyTouch-Insulin-Syringe-Needle-2-Inch/dp/B081VV1PN3/ref=sr_1_1?crid=3JSBNF4TPCUCV&keywords=insulin+syringe+ez+27&qid=1697226980&s=hpc&sprefix=insulin+syringe+ez+27%2Chpc%2C65&sr=1-1", "a": "", "cat": "TRT"}, {"n": "TRT MED: Elevated PSA - continuing TRT", "c": "We discussed possible causes of elevated PSA including prostate cancer, BPH, UTI, inflammation, and lab error. I advised him to follow up with a local urologist to rule out prostate cancer. Further workup may include DRE, prostate ultrasound and/or MRI and/or biopsy. We extensively discussed the association between prostate cancer and TRT including the black box warning on FDA-approved testosterone products indicating that they shouldn't be used in men with a history of prostate cancer. The patient wants to continue to use TRT at least until he's potentially diagnosed, given that he does not have a diagnosis of prostate cancer.", "a": "", "cat": "TRT"}, {"n": "TRT MED: Elevated PSA continuing TRT", "c": "We discussed possible causes of elevated PSA including prostate cancer, BPH, UTI, inflammation, and lab error. I advised him to follow up with a local urologist to rule out prostate cancer. Further workup may include DRE, prostate ultrasound and/or MRI and/or biopsy. We extensively discussed the association between prostate cancer and TRT including the black box warning on FDA-approved testosterone products indicating that they shouldn't be used in men with a history of prostate cancer. The patient wants to continue to use TRT at least until he's potentially diagnosed, given that he does not have a diagnosis of prostate cancer.", "a": "", "cat": "TRT"}, {"n": "TRT MED: Emergency 911", "c": "If you are experiencing a medical emergency, call 911 or go to your nearest emergency room immediately. We have notified the medical provider of your current symptoms.", "a": "", "cat": "TRT"}, {"n": "TRT MED: Enclomiphene general info and side effects", "c": "Enclomiphene is a selective estrogen receptor modulator (SERM) that leads to stimulation of testicular production of testosterone.\nPotential benefits include increase in testosterone levels without testis atrophy, suppression of sperm or endogenous testosterone production, or potential reliance on exogenous testosterone.\nPotential risks include mood swings, anxiety, irritability, changes in libido, and gynecomastia. Phase II/III studies of enclomiphene show possible side effects of headache (3.3%), nausea (2.1%), diarrhea (1.9%), dizziness (1%), joint pain (1.2%), and hot flashes (1.7%). There have been possible accounts of visual disturbances such as floaters when using enclomiphene. Ocular symptoms such as floaters are not typically associated with enclomiphene, but any vision changes should be promptly reported to a healthcare provider.\nFood Interactions: Enclomiphene is typically taken orally, and it can be taken with or without food. There are no specific food interactions known to increase or decrease its effectiveness.\nTiming with Meals: Enclomiphene can be taken with or without meals. There is no specific requirement to take it with or after meals, but some individuals may find it more convenient to take with a meal to help with absorption or to reduce any potential stomach discomfort.\nExpect to feel a noticeable improvement in your low T symptoms within 2 to 3 months as your body reaches stable hormone levels.\nResearch article regarding enclomiphene:  https://pmc.ncbi.nlm.nih.gov/articles/PMC5009465/", "a": "", "cat": "TRT"}, {"n": "TRT MED: Enclomiphene oral or sublingual? (old)", "c": "Enclomiphene tablets from Belmar pharmacy are oral and should be swallowed. Please let us know if you have any questions about this.", "a": "", "cat": "TRT"}, {"n": "TRT MED: Extra Testosterone in Vial", "c": "Hello. Shipments may arrive early due to dosage increases or to prevent medication shortages. This can sometimes result in excess medication, especially if doses are missed or if they are close to expiration, medications are shipped early to avoid gaps in treatment. We are required to advise you to throw away old medication when the new shipment arrives. Thank you!", "a": "", "cat": "TRT"}, {"n": "TRT MED: Fertility pregnancy options on TRT", "c": "- He was re-educated on the effects of TRT reducing fertility. We discussed options of trying to conceive while on current regimen; increasing hCG dosage while on TRT to improve chances of conception; discontinue TRT and use hCG alone or in combination with enclomiphene for the best odds to conceive.", "a": "", "cat": "TRT"}, {"n": "TRT MED: GLP and TRT treatment at the same time?", "c": "Yes, You can do both TRT treatment and GLP treatment together. In fact, many of our patients have had great successes with both treatments. Please let us know if you have any questions about this. Thank you! Have a great day! \n", "a": "", "cat": "TRT"}, {"n": "TRT MED: HCG 0.6 mL BIW = 60 units on syringe = 600 IU biw dose and reconstitution instructions", "c": "For the hCG injections, please make sure you get a heavy-duty needle (aka \"sharps\") container to dispose of used needles - the containers are available at all pharmacies.\n- Your dosage for the hCG is 60 units (0.6 mL) on the syringe twice weekly.\nThis video will walk you through the process of doing reconstituting (mixing) your hCG medication. Should you need further assistance, text us to let us know and we will help guide you.\nhttps://fountaintrt.wistia.com/medias/l0czb9mqtr\nHere is a link to review your dosing information on the syringe: https://blog.fountaintrt.com/hcg-600-iu-twice-a-week/", "a": "", "cat": "TRT"}, {"n": "TRT MED: HCG 60 units 4x week", "c": "For the hCG injections, please make sure you get a heavy-duty needle (aka \"sharps\") container to dispose of used needles - the containers are available at all pharmacies.\n- Your dosage for the hCG is 60 units (0.6 mL) on the syringe 4 x weekly\nPlease watch this video on how to reconstitute (mix) the HCG: https://fountaintrt.wistia.com/medias/l0czb9mqtr\nPlease review this link to confirm the number of units on the syringe: https://blog.fountaintrt.com/hcg-600-iu-four-times-a-week/", "a": "", "cat": "TRT"}, {"n": "TRT MED: HCG Pregnyl name confusion", "c": "Apologies for any confusion with the medication names. The initials hCG stands for human chorionic gonadotropin. Pregnyl is the brand name for manufactured hCG. This is not a compounded medication. Let us know if you have any other questions or concerns.", "a": "", "cat": "TRT"}, {"n": "TRT MED: HCG declined", "c": "Patient declined using hCG. They indicate understanding the risks of infertility and testicular atrophy, and possible difficulty restoring HPTA without using this medication along with TRT.", "a": "", "cat": "TRT"}, {"n": "TRT MED: HCG dose change from 0.5 to 0.6 mL", "c": "We've adjusted the HCG dose from 0.5 mL to 0.6 mL to align with a more convenient 8-week supply schedule instead of 10 weeks. Both doses are therapeutically effective - we're simply streamlining the process while maintaining our high standard of care.", "a": "", "cat": "TRT"}, {"n": "TRT MED: HCG use and drawbacks", "c": "The reasons to use hCG along with TRT are:\n- It helps keep the testes functioning, allowing you to maintain some degree of fertility.\n- It helps maintain sperm production so you don't have a significant decrease in testicle size.\n- If you use hCG all along with TRT, it keeps the testes functioning. When/if you stop TRT in the future, it would be easier to regain testicular function more quickly and reliably.\n- The drawbacks with hCG: requires twice weekly injection; needs to be refrigerated; can affect your estrogen levels making it more likely you would need an additional medication to reduce estrogen; it costs $250 every 8 weeks.", "a": "", "cat": "TRT"}, {"n": "TRT MED: HCG video", "c": "Sure. Here's the link to the video with instructions on how to reconstitute (mix) the HCG: https://fountaintrt.wistia.com/medias/l0czb9mqtr", "a": "", "cat": "TRT"}, {"n": "TRT MED: Handling Sharps needle case when full", "c": "The FDA has indicated the following: Sharps disposal containers are marked with a line to indicate when the container is about three-fourths (3/4) full. Following the manufacturer\u2019s instructions, close and seal sharps disposal containers when about three-fourths (3/4) full. Follow the health care facility\u2019s policy and procedures, medical waste disposal vendor instructions, and local medical waste disposal guidelines. To prevent injury to health care personnel, do not open, empty, or manually clean full sharps disposal containers.", "a": "", "cat": "TRT"}, {"n": "TRT MED: How frequently are injections taken?", "c": "Our medical team generally recommends using injections twice a week, but special considerations for each case are reviewed during the evaluation.", "a": "", "cat": "TRT"}, {"n": "TRT MED: How to use Unodose", "c": "Here are instructions on how to use your Testosterone cream Unodose. Gently twist the protective cap counterclockwise at the top of the bottle and pull off the cap while keeping a firm grip on the main barrel.\n\nNext, rotate the dial at the bottom of the bottle in the indicated direction until you hear the prescribed number of clicks.\n\nCheck that the cream is coming through the openings at the top of the applicator tip.\n\nNext take your index finger to gather the cream and apply it to the shoulders as indicated. \nLet us know if you have any questions and please be sure to wash your hands after use and avoid direct contact with others directly after application.", "a": "", "cat": "TRT"}, {"n": "TRT MED: If a patient indicates they registered for the VV with the wrong email", "c": "Thanks for letting us know! We can't edit the appointment details after the visit has been booked, but the provider will text you at the number we have on file for the visit. They won't need to email you anything.", "a": "", "cat": "TRT"}, {"n": "TRT MED: Injection issues", "c": "Hi there, To help make your injections more comfortable, here are several important tips to follow.\nFirst, the speed of injection makes a big difference - try counting to 30 as you slowly push in the medication, which will help reduce pain, redness, and itching.\nWhen handling your skin, use a gentle touch rather than pinching tightly. Insert the needle at a 45-90 degree angle. If you're injecting in your stomach area, stay at least 4 inches away from your belly button, and aim closer to your sides (love handles).\nIf you're having discomfort, consider changing your injection site. Instead of your stomach, you can use the outer part of your upper buttocks or the outer part of your upper thighs. Just remember to maintain the same gentle technique and 45-90 degree angle at these locations too.\nKeep an eye out for any concerning symptoms. Please reach out if you notice the redness getting worse or spreading, develop a fever, or if you have any other injection concerns. Have a great day!", "a": "", "cat": "TRT"}, {"n": "TRT MED: Injection questions, or Injection site issues. redness, inflammation, discomfort, lumps", "c": "Inject the medication slowly and at an angle to reduce discomfort:\n-After inserting the needle, take at least 30 seconds to administer the medication.\n-Use a 45-degree angle when injecting.\n-This technique can help reduce pain, redness, and itching at the injection site.\n\nProper skin handling during injection:\n-Avoid pinching the skin too tightly when lifting it.\n-Tight pinching can trap blood, potentially causing bruising or a lumpy sensation.\n-Instead of injecting between your fingers, aim for 1-2 inches to the side where the skin is looser.\n-For abdominal injections, stay at least 4 inches away from the navel.\n-Target areas closer to the love handles rather than the belly button.\n\nConsider alternating injection sites:\n-Try rotating between the abdomen, upper-outer buttocks, and upper-outer thighs.\n\nAdditional support:\n-If you need more guidance, we can schedule a phone or video call.\n-We're here to provide further education as needed.", "a": "", "cat": "TRT"}, {"n": "TRT MED: Injection video - demonstration by Josh", "c": "Here is a video to explain the subcutaneous injection technique:\nhttps://fountaintrt.wistia.com/medias/uqystijfwc", "a": "", "cat": "TRT"}, {"n": "TRT MED: Injections storage", "c": "Our medical team has indicated that Injections should be stored at room temp out of direct sunlight. A bathroom medicine cabinet would be ideal.", "a": "", "cat": "TRT"}, {"n": "TRT MED: Intra-muscular injections", "c": "Hi - our medical team has advised us of the following: \nThe original FDA approval of the medication was based on intramuscular (IM) injections which is the reason for the label. \nHowever, using subcutaneous (subQ) fat has become an extremely common practice with studies showing it's just as effective as IM but safer (much smaller needles). \nSome studies have also shown that estradiol and hemoglobin/hematocrit levels are less likely to become as elevated with subQ injections compared to IM. Both IM and SQ are otherwise equally effective.", "a": "", "cat": "TRT"}, {"n": "TRT MED: Link to enclomiphene journal article", "c": "Medical journal paper on enclomiphene: https://www.ncbi.nlm.nih.gov/pmc/articles/PMC5009465/", "a": "", "cat": "TRT"}, {"n": "TRT MED: Local pharmacy request for prescription medication", "c": "The membership plan that you have bundles in multiple costs including the cost of testosterone medication, labs, doctor visits, taxes, shipping, supplies, etc. Your provider would be happy to prescribe testosterone medication to a local pharmacy, but I just want to make sure you know that it wouldn't lower the price since it's already priced in as mentioned above.\n If you want any prescriptions sent to a local pharmacy, please provide the pharmacy name, address, and phone number.", "a": "", "cat": "TRT"}, {"n": "TRT MED: Medication Timing", "c": "Our providers recommend that patients using T injections should get labs done on any day that works for them other the days they actually inject.\nFor patients using topical cream or enclomiphene, patients should apply the cream or take their enclomiphene at their usual time and have labs drawn at whatever time is most convenient.", "a": "", "cat": "TRT"}, {"n": "TRT MED: Medication or blood leaking from injection site", "c": "That is a common issue that can be resolved by:\n\n\n1 - Inject slowly over 20-30 seconds\n2 - Angle the entry of the needle closer to 45 degrees instead of 90 degrees. When injecting at 90 degrees (straight in) there is a direct track for fluid to be expelled. With an angle closer to 45 degrees, the track will collapse and less chance of medication leaking.\n3 - Gently hold the skin when injecting. If you squeeze too tightly, the medication and sometimes a bit of blood can leak from the entry point.\n\n\nPlease let me know if you have any further questions or would like a call to discuss more thoroughly.", "a": "", "cat": "TRT"}, {"n": "TRT MED: Medication or blood leaking from injection site", "c": "That is a common issue that can be resolved by:\n1 - Inject slowly over 20-30 seconds\n2 - Angle the entry of the needle closer to 45 degrees instead of 90 degrees. When injecting at 90 degrees (straight in) there is a direct track for fluid to be expelled. With an angle closer to 45 degrees, the track will collapse and less chance of medication leaking.\n3 - Gently hold the skin when injecting. If you squeeze too tightly, the medication and sometimes a bit of blood can leak from the entry point.\nPlease let me know if you have any further questions or would like a call to discuss more thoroughly.", "a": "", "cat": "TRT"}, {"n": "TRT MED: Medicine left in vial/10ml vial", "c": "Hi there, your vial is a 10ml vial which is for 10 weeks of treatment. You should receive a new shipment prior to running out of your current vial. If there is medication left in your vial after 10 weeks, we recommend to discard and start using your new vial. Please let us know if have any further questions or concerns.", "a": "", "cat": "TRT"}, {"n": "TRT MED: New patient video treatment options and side effects", "c": "This link is to a video explaining the treatment options and side effects.\nhttps://fountaintrt.wistia.com/medias/cfhv60f5iy", "a": "", "cat": "TRT"}, {"n": "TRT MED: No improvements or change with T-Cream", "c": "Thank you for reaching out about your concerns. Please share any symptoms you are having. It\u2019s not unusual for the medication to take some time to be effective. We typically check labs at around 6 weeks after starting treatment and then have patients schedule to meet with a provider when we get your lab results back. Customer service will reach out to you when you are due to have your labs checked. Please let us know if you have any further questions.", "a": "", "cat": "TRT"}, {"n": "TRT MED: PCP does not have", "c": "Does not have one at this time but seeking a new one.", "a": "", "cat": "TRT"}, {"n": "TRT MED: PDE5i warnings", "c": "Do not take tadalafil with similar medications (nitrates) i.e. other similar ED meds (Viagra), Nitroglycerin, Isosorbide.  Get an immediate in-person evaluation for an erection lasting longer than 4 hours or any sudden vision changes.", "a": "", "cat": "TRT"}, {"n": "TRT MED: PT not experiencing desired results of treatment", "c": "It\u2019s not unusual for the medication to take some time to be effective. We typically check labs at around 6 weeks after starting treatment and then have patients meet with a provider. We can move that process up for you and arrange your labs now. Is there a good day and time for you to get labs this week?", "a": "", "cat": "TRT"}, {"n": "TRT MED: Risk factors affecting low T levels", "c": "\u2022 Vitamin & Mineral deficiencies - Being deficient is associated with up to a 73% decrease\n\u2022 Stress - Being stressed (physically or mentally) with up to a 70% decrease\n\u2022 Obesity - Up to a 47% decrease\n\u2022 Endurance training - Up to a 50% decline though the implications of low testosterone here are complicated\n\u2022 Sleep - Up to a 40% decrease, particularly in younger men.\n\u2022 Overtraining - Up to a 38% decline\n\u2022 Calorie restriction at low body fat - Up to a 36% decline\n\u2022 Alcohol can reduce T 34% - \u2022 Sugar can reduce T 34%\n\u2022 Vit D deficiency can reduce T 21%\n\u2022 Magnesium deficiency can reduce T 15%", "a": "", "cat": "TRT"}, {"n": "TRT MED: Running Out of Medication Prior Video Visit", "c": "Hi - I understand your concern. Please know that your subscription recurs automatically, regardless of the next video visit with your provider. They can adjust your dose using the next order if needed. ", "a": "", "cat": "TRT"}, {"n": "TRT MED: Running out of medication early before next refill", "c": "Hey - I understand you need an early refill due to __. Since this is an early refill, we will credit you the amount for the remaining charge of your existing subscription. This will result in a charge of $\\_ instead of $\\_.\nWe will proceed with this arrangement once we receive your approval. Please let us know if this works.", "a": "", "cat": "TRT"}, {"n": "TRT MED: Sharps needles case", "c": "The needle case ('sharps container'), to dispose of used needles is available at most local pharmacies.", "a": "", "cat": "TRT"}, {"n": "TRT MED: Should I stop my T Cyp before my therapeutic phlebotomy?", "c": "Yes, stop T-cypionate until therapeutic phlebotomy and then restart T-cypionate injections at the dose you were last instructed.", "a": "", "cat": "TRT"}, {"n": "TRT MED: Side Effects Video", "c": "I'm not a medical provider, so I can't address that directly. However, our medical director has created a video discussing the treatment options and addressing that question. You can find a link to the video here: https://fountaintrt.wistia.com/medias/cfhv60f5iy \nIf you have any other medical questions, we're happy to relay those to our medical team.", "a": "", "cat": "TRT"}, {"n": "TRT MED: Skin redness", "c": "For redness relief, apply over-the-counter Benadryl or cortisone cream to the affected areas. When injecting, use a slow technique and avoid the tight skin between thumb and finger. Choose areas with looser skin, approximately 1-2 inches below where you pinch. Consider using the upper-outer buttocks or upper-outer thighs as alternative sites, since different fatty tissue areas may have varying responses.", "a": "", "cat": "TRT"}, {"n": "TRT MED: Subcutaneous subQ vs intramuscular IM injections - Pt wondering differences between IM vs SQ", "c": "Hi - our medical team has advised us of the following:\nThe original FDA approval of the medication was based on intramuscular (IM) injections which is the reason for the label. However, using subcutaneous (subQ) fat has become an extremely common practice because it's less likely to result in pain, scarring or nodules compared with IM. Some studies have also shown that estradiol and hemoglobin/hematocrit levels are less likely to become elevated with subQ injections. Both IM and SQ are otherwise equally effective.", "a": "", "cat": "TRT"}, {"n": "TRT MED: Symptoms of erythrocytosis", "c": "Are you experiencing increased blood pressure, headaches, vision changes (blurry), fatigue, becoming red-faced and flushed during exercise or exertion, dizziness, nosebleeds, and/or shortness of breath?", "a": "", "cat": "TRT"}, {"n": "TRT MED: Syringe air bubbles", "c": "There is no concern for small air bubbles with subcutaneous injections. A good idea is always to draw back more fluid into the syringe than you need, and while the needle is still in the vial to push the fluid back into the vial so that any air bubbles go out of the syringe and back into the vial - it's easiest if the syringe is held straight up towards the ceiling as you do this so that fluid pushes the bubble out of the syringe, instead of passing by it as it would if the syringe were held on an angle.", "a": "", "cat": "TRT"}, {"n": "TRT MED: Syringes our partner pharmacy sends", "c": "Our medical team has indicated that the syringes our partner pharmacy sends are: Easy Touch Syringe 27g X 1/2 1 ml. Please let us know if you have any questions!", "a": "", "cat": "TRT"}, {"n": "TRT MED: T Cream Content", "c": "Our partner pharmacy has indicated: \"The Fountain testosterone cream is compounded with: \nTestosterone Powder \nEthoxy Diglycol \nHRT Cream base \nThe percentage breakdown would be: \nTestosterone ~ 22% \nEthoxy diglycol - 15% \nHRT cream base - 63% \nThis is based on the 66 mg/0.3ml strength testosterone cream.", "a": "", "cat": "TRT"}, {"n": "TRT MED: T Cream base (Curexa) MALE PATIENT'S ONLY", "c": "Our partner pharmacy sent us this link: https://www.medisca.com/products/hrt-cream-base, which provides additional information about their cream base. Please let us know if you have any other questions. ", "a": "", "cat": "TRT"}, {"n": "TRT MED: T Cyp 60mg BIW Video + image 60 mg BIW", "c": "For the injections, please make sure you get a heavy-duty needle (aka \"sharps\") container to dispose of used needles - the containers are available at all pharmacies. \n\u200b\u200b\nThis video will walk you through the injection process. Please text us if you need assistance and we will help guide you. You should inject 60 mg on the same 2 days each week (for example, Mondays and Thursdays). To get 60 mg, you should draw up 0.3 mL of medication for each injection. \n\u200b\nUpon placing the needle under the skin, push the plunger VERY SLOWLY (over 30 seconds). This will prevent irritation at the area. \n\u200b\u200b\nHere is the video to walk you through the injection process:\nhttps://fountaintrt.wistia.com/medias/uqystijfwc\n\u200b\u200b\nThis image shows exactly how much medication to draw in the syringe:\nhttps://blog.fountaintrt.com/tcyp60mg2xperweek/\n\u200b", "a": "", "cat": "TRT"}, {"n": "TRT MED: T Cyp Injection Video", "c": "Here's the video we made going over injections: \nhttps://fountaintrt.wistia.com/medias/uqystijfwc\nPlease note that the doses shown in this video may not be your prescribed dose. Please check the instructions on your prescription to make sure you are injecting the correct dosage.", "a": "", "cat": "TRT"}, {"n": "TRT MED: T Cyp Oil", "c": "Orders processed by our partner pharmacies typically contain cottonseed oil. \n\n", "a": "", "cat": "TRT"}, {"n": "TRT MED: T Cyp supplies", "c": "The order should contain needles, a TRT vial, and alcohol prep pads. The order does not include the needle case. The needle case ('sharps container'), to dispose of used needles is available at most local pharmacies.", "a": "", "cat": "TRT"}, {"n": "TRT MED: T cyp  76 mg biw VIDEO + IMAGE injection instructions", "c": "For the injections, please make sure you get a heavy-duty needle (aka \"sharps\") container to dispose of used needles - the containers are available at all pharmacies.\nThis video will walk you through the injection process. Please text us if you need assistance and we will help guide you. You should inject 76 mg on the same 2 days each week (for example, Mondays and Thursdays). To get 76 mg, you should draw up 0.38 mL of medication for each injection.\nUpon placing the needle under the skin, push the plunger VERY SLOWLY (over 30 seconds). This will prevent irritation at the area.\nHere is the video to walk you through the injection process:\nhttps://fountaintrt.wistia.com/medias/uqystijfwc\nThis image shows exactly how much medication to draw in the syringe:\nhttps://blog.fountaintrt.com/tcyp76mg2xperweek/", "a": "", "cat": "TRT"}, {"n": "TRT MED: T cyp 100 mg biw VIDEO + IMAGE injection instructions", "c": "For the injections, please make sure you get a heavy-duty needle (aka \"sharps\") container to dispose of used needles - the containers are available at all pharmacies.\nThis video will walk you through the injection process. Please text us if you need assistance and we will help guide you. You should inject 100 mg on the same 2 days each week (for example, Mondays and Thursdays). To get 100 mg, you should draw up 0.5 mL of medication for each injection.\nUpon placing the needle under the skin, push the plunger VERY SLOWLY (over 30 seconds). This will prevent irritation at the area.\nHere is the video to walk you through the injection process:\nhttps://fountaintrt.wistia.com/medias/uqystijfwc\nThis image shows exactly how much medication to draw in the syringe:\nhttps://blog.fountaintrt.com/tcyp100mg2xperweek/", "a": "", "cat": "TRT"}, {"n": "TRT MED: T cyp 50 mg biw VIDEO + IMAGE injection instructions (new patients)", "c": "For the testosterone injections, please make sure you get a heavy-duty needle (aka \"sharps\") container to dispose of used needles - the containers are available at all pharmacies.\nThis video will walk you through the injection process. Please text us if you need assistance and we will help guide you. You should inject 50 mg on the same 2 days each week (for example, Mondays and Thursdays). To get 50 mg, you should draw up 0.25 mL of medication for each injection.\nUpon placing the needle under the skin, push the plunger VERY SLOWLY (over 30 seconds). This will prevent irritation at the area.\nHere is the video to walk you through the injection process:\nhttps://fountaintrt.wistia.com/medias/uqystijfwc\nThis image shows exactly how much medication to draw in the syringe:\nhttps://blog.fountaintrt.com/tcyp50mg2xperweek/", "a": "", "cat": "TRT"}, {"n": "TRT MED: T cyp 70 mg biw VIDEO + IMAGE injection instructions", "c": "For the injections, please make sure you get a heavy-duty needle (aka \"sharps\") container to dispose of used needles - the containers are available at all pharmacies.\nThis video will walk you through the injection process. Please text us if you need assistance and we will help guide you. You should inject 70 mg on the same 2 days each week (for example, Mondays and Thursdays). To get 70 mg, you should draw up 0.35 mL of medication for each injection.\nUpon placing the needle under the skin, push the plunger VERY SLOWLY (over 30 seconds). This will prevent irritation at the area.\nHere is the video to walk you through the injection process: https://fountaintrt.wistia.com/medias/uqystijfwc\nThis image shows exactly how much medication to draw in the syringe:\nhttps://blog.fountaintrt.com/tcyp70mg2xperweek/", "a": "", "cat": "TRT"}, {"n": "TRT MED: T cyp 90 mg biw VIDEO + IMAGE injection instructions", "c": "For the injections, please make sure you get a heavy-duty needle (aka \"sharps\") container to dispose of used needles - the containers are available at all pharmacies.\nThis video will walk you through the injection process. Please text us if you need assistance and we will help guide you. You should inject 90 mg on the same 2 days each week (for example, Mondays and Thursdays). To get 90 mg, you should draw up 0.45 mL of medication for each injection.\nUpon placing the needle under the skin, push the plunger VERY SLOWLY (over 30 seconds). This will prevent irritation at the area.\nHere is the video to walk you through the injection process:\nhttps://fountaintrt.wistia.com/medias/uqystijfwc\nThis image shows exactly how much medication to draw in the syringe:\nhttps://blog.fountaintrt.com/tcyp90mg2xperweek/", "a": "", "cat": "TRT"}, {"n": "TRT MED: TP order", "c": "Therapeutic Phlebotomy order", "a": "", "cat": "TRT"}, {"n": "TRT MED: TRT cream pump issues", "c": "The bottle has compressed air that needs to be let out at the start of a new bottle or periodically throughout its use. The way to manage that is to turn over the pump and push the top of the pump towards the palm of your hand (which pushes the cream to the top of the bottle and the air to the bottom). The T cream will start coming out afterwards once you are ready to use it again.", "a": "", "cat": "TRT"}, {"n": "TRT MED: TRT testosterone heat hot", "c": "There are no heat restrictions. We have asked the pharmacy in the past to confirm this - their instructions were to \"just have the patient bring back to room temperature before using the product.\"", "a": "", "cat": "TRT"}, {"n": "TRT MED: Tadalafil Low Dose Daily instructions warning PDE5i", "c": "Tadalafil (generic Cialis) is to be taken once a day. This is called 'low dose daily' treatment. Do not take more than 2 tablets in a day until we review at the follow-up meeting. Do not take tadalafil with similar medications (nitrates) i.e. other similar ED meds (Viagra), Nitroglycerin, Isosorbide.  Get an immediate in-person evaluation for an erection lasting longer than 4 hours or any sudden vision changes.", "a": "", "cat": "TRT"}, {"n": "TRT MED: Testosterone Propionate vs Testosterone Cypionate", "c": "We do not currently offer testosterone propionate because it is a short-acting and requires more frequent administration. In the long term, the majority of patients have difficulty maintaining that schedule.\n\u200b\nWe offer testosterone cypionate which has a longer half-life, requiring less frequent injections. If you would like to further discuss testosterone cypionate or one of our additional TRT treatment options please let us know here. We can then coordinate a visit where one of our providers can collaborate with you to determine what is the most suitable option for you.", "a": "", "cat": "TRT"}, {"n": "TRT MED: Testosterone Reference Ranges", "c": "Hello, reference ranges for total testosterone levels can vary from lab to lab. Our providers interpret results on a case-by-case basis as a certain testosterone level for one person can be adequate while the same level for another person can cause significant symptoms. They also take into account each patient's 'free' testosterone level.", "a": "", "cat": "TRT"}, {"n": "TRT MED: Testosterone Steroid", "c": "Testosterone is classified by the FDA as an anabolic androgenic steroid. Testosterone replacement therapy is used to treat conditions associated with a deficiency or absence of endogenous testosterone, such as hypogonadism. However, it is important to note that while testosterone is an anabolic steroid, its use in TRT is medically supervised to maintain therapeutic levels, not the supratherapeutic levels typically misused for athletic performance enhancement.", "a": "", "cat": "TRT"}, {"n": "TRT MED: Testosterone maximum dose", "c": "Fountain TRT has a maximum dosage of 200 mg/week. A dose up to 200mg/week would be included in the cost. The TRT injections subscription run at $399 every ten weeks which covers the costs of medication, shipping, supplies, consultation visits, and support. This is considered a chronic long-term treatment, and the goal is to use the lowest effective dose needed to control low T symptoms. The higher the dose, the more potential risk of side effects and adverse reactions. Most patients require much smaller doses than 200mg/week. Your specific dose is determined by your provider at the time of consultation with consideration of your symptoms, medical history, and lab results", "a": "", "cat": "TRT"}, {"n": "TRT MED: Texas compliance statement", "c": "\ud83c\udc30 COMPLIANCE \ud83c\udc30  \nIn accordance with Texas Administrative Code Rule \u00a7222.8, Schedule III controlled substance (Testosterone) is being prescribed in consultation with a delegating physician. Chart forwarded to delegating physician.", "a": "", "cat": "TRT"}, {"n": "TRT MED: These needles you sent are not long enough to inject into my muscle; you have longer needles", "c": "We recommend subcutaneous (subQ) injections over intramuscular (IM) for testosterone. While the FDA initially approved IM injections, subQ has become popular due to less pain, scarring, and nodule formation. Some studies suggest subQ may lead to fewer side effects like elevated estradiol and hematocrit levels. Both methods are equally effective for testosterone delivery. We provide needles suitable for subQ injections.", "a": "", "cat": "TRT"}, {"n": "TRT MED: Unused discard medication collection site", "c": "You can discard unused medication at an official collection site. You can search for a site using the following link:\nhttps://apps.deadiversion.usdoj.gov/NTBI/publicSearchLite.jsp?_flowExecutionKey=_c639413BC-7BD9-02F5-FC39-D062C48067CA_kAF38A658-1F3C-1E6D-E4A6-B283DD3BE58C", "a": "", "cat": "TRT"}, {"n": "TRT MED: Vial say IM intramuscular not subcutaneous", "c": "The vial says IM (intramuscular) because when this medication was first cleared by FDA decades ago, it was based on IM studies. Since that time, several studies have been done to show the medication is just as effective and actually safer using subcutaneous injections. The medication we are prescribing is from the manufacturing pharmacy, not compounded. The manufacturing company can't change the label unless they resubmit their application to FDA which doesn't seem likely any time soon. Let us know if you have any further questions or concerns.", "a": "", "cat": "TRT"}, {"n": "TRT MED: Video Instructions for Testosterone Cream Application and UnoDose instructions", "c": "Hello - here's a video link with instructions for testosterone cream application. Note: We now offer a more accurate UnoDose dispnense not seen in the video. Please video and UnoDose instructions below and reach out with any questions.\nVideo: https://fountaintrt.wistia.com/medias/x1zsw1mu2i\nUnodose container instructions:\nGently twist the protective cap counterclockwise at the top of the bottle and pull off the cap while keeping a firm grip on the main barrel.\nNext, rotate the dial at the bottom of the bottle in the indicated direction until you hear the prescribed number of clicks.\nCheck that the cream is coming through the openings at the top of the applicator tip.\nLastly take your index finger to gather the cream and apply it to the application site as indicated on your prescription. \nPlease be sure to wash your hands after use and avoid direct contact with others directly after application to avoid transference.\n\nLet us know if you have any questions.", "a": "", "cat": "TRT"}, {"n": "TRT MED: Wean off or can I stop my TRT treatment abruptly?", "c": "TRT suppresses testicular production of testosterone (T), so stopping abruptly means that levels will drop below baseline for a period of time before the body realizes it needs to kick in testicular production of T again. It's not dangerous but the you will likely feel irritable/sluggish. If you wish to minimize these symptoms, you can reduce your dose in half for one week and then in half again for one more week, then discontinue. ", "a": "", "cat": "TRT"}, {"n": "TRT MED: What is the next step for blood donation", "c": "Thank you for reaching out. I am happy to assist. The next step would be to find a blood donation location, such as the Red Cross, 1-800\u00ad-RED CROSS. Please tell them you \u201cwant to donate blood\". Donating blood is generally a free procedure to have done. You would want to donate red blood cells (whole blood) not plasma or platelets. If you are unable to donate blood for any reason, please let us know. An alternative is therapeutic phlebotomy which disposes of your blood after withdrawal.  Therapeutic Phlebotomy requires an order to be completed, possibly a location-specific order. Some places charge a fee for Therapeutic Phlebotomy. Please let us know if you have any other questions.", "a": "", "cat": "TRT"}, {"n": "TRT MED: What is the optimal T range?", "c": "Hello - here's a message from our medical team on this matter: \"We shoot for getting people to the level of testosterone that provides them with the most relief of symptoms while remaining safe. Each person is different and respond differently to treatment so there is no specific number. With that said, we do not exceed our maximum dosage of 200 mg/ week.\"", "a": "", "cat": "TRT"}, {"n": "TRT MED: What kind of needles are prescribed?", "c": "The needles are: 27G 1/2\" attached to 1 cc syringes.", "a": "", "cat": "TRT"}, {"n": "TRT MED: What kind of testosterone cream do you prescribe?", "c": "We typically prescribe testosterone cream that is compounded by our partner pharmacy so there is no brand name. The cream is designed to give the highest concentration of testosterone in a consistency that can be easily applied and absorbed. It dries quickly, has no odor, and looks and feels like moisturizer lotion. Each UnoDose click of the cream contains 50 mg of testosterone.", "a": "", "cat": "TRT"}, {"n": "TRT MED: When should I do my lab work t-cyp", "c": "Hi there, we do not recommend doing your injection on the same day/morning as having your lab work done as this can alter your overall results. If you wish to have your lab appointment on the same day an injection is due, simply have the labs drawn first and then perform the injection. Please let us know if you have any questions about this.", "a": "", "cat": "TRT"}, {"n": "TRT MED: Yellow vs Clear T-cypionate color - Perrigo", "c": "Hi- here's a message from our medical team on this matter: \"The pharmacy ships FDA-approved T cypionate medication from several different manufacturers. Vials manufactured by the company Perrigo has a clear, pale yellow color, while the appearance of medication from other manufacturers is more clear. The strength and effectiveness is equivalent between all manufacturers.\"", "a": "", "cat": "TRT"}, {"n": "TRT MED: crystalization of testosterone - how to resolve", "c": "This is appears to be crystallization of the medication. This is a relatively common occurrence caused by a small amount of medication precipitating. This causes a chain reaction leading to more medicine precipitating. The medication is perfectly fine but you can't inject medication that's not in solution. I suggest you turn warm/hot water on in your sink and run it over the bottle for a few minutes, and then swirl the bottle vigorously. This should help get the crystallized medication back into solution. If it doesn't clear up after trying this method multiple times, please let us know.", "a": "", "cat": "TRT"}, {"n": "TRT MED: enclomiphene research study information", "c": "Medical journal paper on enclomiphene: https://www.ncbi.nlm.nih.gov/pmc/articles/PMC5009465/", "a": "", "cat": "TRT"}, {"n": "TRT MED: how do I know if I'm a candidate for TRT", "c": "Once you have completed the lab work that is recommended we will get you scheduled with a provider for an initial evaluation. During the visit you and the provider will discuss your medical history, symptoms, labs and possible options available to you relating to TRT.", "a": "", "cat": "TRT"}, {"n": "TRT MED: increase T-cyp dosage elevated E2 and H+H", "c": "- Patient has had some improvement in symptoms but would like to trial further increase in T-cyp dosage to gain further improvement. He understands the risks of increasing estradiol and H+H levels associated with increasing their T-cyp dosage.", "a": "", "cat": "TRT"}, {"n": "TRT MED: is it okay if I\u2019m taking DHEA with labs (new patient)", "c": "DHEA can affect testosterone levels and is preferably discontinued for 1-2 weeks prior to labs. \n\u200b", "a": "", "cat": "TRT"}, {"n": "TRT MED: mental health relation to TRT depression PTSD anxiety", "c": "We discussed mental health conditions, notably elevated stress, depression, anxiety, and PTSD, may have correlations with low testosterone levels, and vice versa. We discussed that the symptoms of these conditions can overlap. We discussed how medications commonly prescribed for mental health, including antidepressants and anxiolytics, may contribute to decreased testosterone levels. We discussed the importance of treating mental health issues as potential underlying causes or symptoms of low testosterone.", "a": "", "cat": "TRT"}, {"n": "TRT MED: research article about enclomiphene", "c": "Enclomiphene (not to be confused with Clomid also known as clomiphene citrate).\nMedical journal paper on enclomiphene:  https://www.ncbi.nlm.nih.gov/pmc/articles/PMC5009465/ ", "a": "", "cat": "TRT"}, {"n": "TRT MED: specific to T Cyp bioidentical", "c": "Our partner pharmacy has indicated the following:\n\"The chemical formula for testosterone is C19H28O2 whereas the chemical formula for testosterone cypionate is C27H40O3. Testosterone cypionate is a prodrug that needs to be broken down in your body to be absorbed effectively. Once it IS broken down, it is bioidentical to testosterone. But not before.\"\nOur products contain bioidentical hormones that are chemically identical to those your body produces, triggering the same responses. These lab-produced hormones are not human-derived. Non-bioidentical hormones, in contrast, have a chemical structure that is different from your natural hormones.", "a": "", "cat": "TRT"}, {"n": "TRT MED: testicular aches pain while on enclomiphene", "c": "Thank you for alerting us to these symptoms. Testicle aching is a common problem in men but there is currently no supporting evidence of it being caused by enclomiphene. I would consider restarting at the original and see if the symptoms recur. If it does recur, then drop it down to 1/2 the dose. Some treatments for aching testicles include using ibuprofen, warm or cold compresses, and switching underwear from boxers to briefs or vice versa. If you get any severe pain, testicle swelling, fever, discharge, urinary symptoms such as burning or change in urine color, or have any concerns, you should get an in-person evaluation. Some testing may be needed such as urinalysis, urine culture, and/or ultrasound imaging to determine the exact cause.\n- I will move your labs back and we'll reach out in 6 weeks to set up the lab appointment. \n- Please keep me posted if you have any concerning changes in your condition or any questions.", "a": "", "cat": "TRT"}, {"n": "TRT MED: video link issues difficulty", "c": "Let me know if you are having any issues logging into the video link:", "a": "", "cat": "TRT"}, {"n": "TRT MED: when is the best time to inject testosterone", "c": "You can inject at whatever time of day works best for your schedule. The timing of testosterone injections can be flexible as long as the dosing schedule is maintained consistently. This approach helps achieve stable testosterone levels and effective symptom management.", "a": "", "cat": "TRT"}, {"n": "TRT MED: while I'm taking testosterone shots, to lose weight what do you recommend", "c": "The safest way is using a food log or an app like \u201closeit or \"myfitnesspal\u201d. These are free and will provide insight into the actual number of calories a person is ingesting. We ideally recommend you consume about 300-500 calories less per day, rather than burning calories through normal activity and exercise. Best to minimize highly processed foods, refined sugars, soft drinks, alcohol, and focus on green leafy vegetables and lean meats. \n\u200b", "a": "", "cat": "TRT"}, {"n": "TRT MI - Follow-up visit", "c": "Hello - it's time to schedule your visit with a Fountain provider! Here's the link to schedule your follow-up visit. This will let you schedule with a provider licensed in your state. Please select the 'Follow-up Visit' option: https://go.oncehub.com/FountainTRTMI\nIf you're traveling outside of your home state at the time of the visit please let us know, so we can make sure you see a provider licensed in that state.", "a": "", "cat": "TRT"}, {"n": "TRT MI - New patient visit", "c": "Hello - it's time to schedule your visit with a Fountain provider! Here's the link to schedule your visit. This will let you schedule with a provider licensed in your state. Please select the 'New Patient Visit' option: https://go.oncehub.com/FountainTRTMI\nIf you're traveling outside of your home state at the time of the visit please let us know, so we can make sure you see a provider licensed in that state.", "a": "", "cat": "TRT"}, {"n": "TRT MN - Follow-up visit", "c": "Hello - it's time to schedule your visit with a Fountain provider! Here's the link to schedule your follow-up visit. This will let you schedule with a provider licensed in your state. Please select the 'Follow-up Visit' option: https://go.oncehub.com/FountainTRTMN\nIf you're traveling outside of your home state at the time of the visit please let us know, so we can make sure you see a provider licensed in that state.", "a": "", "cat": "TRT"}, {"n": "TRT MN - Follow-up visit", "c": "Hello - it's time to schedule your visit with a Fountain provider! Here's the link to sc
